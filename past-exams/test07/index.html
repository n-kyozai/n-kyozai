<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>教採演習 公民（岡山県）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* ヘッダーやアクセントのカラー */
        .header-bg { background-color: #005b82; }
        
        /* タイマー枠の固定 */
        .timer-box {
            font-variant-numeric: tabular-nums;
        }

        /* 選択式のセレクトボックススタイル */
        .blank-select {
            border: 1px solid #cbd5e1;
            background-color: #fff;
            padding: 6px 32px 6px 12px;
            width: 100%;
            max-width: 120px; /* 数字選択用に幅を狭く調整 */
            border-radius: 4px;
            outline: none;
            font-size: 1rem;
            color: #333;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 16px;
            transition: border-color 0.2s;
        }
        .blank-select:focus {
            border-color: #005b82;
            box-shadow: 0 0 0 2px rgba(0, 91, 130, 0.2);
        }

        /* サイドバー用カスタムスクロールバー */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-[#e8ecef] text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- ドロワーメニュー用オーバーレイ (モバイル用) -->
    <div id="drawer-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-40 transition-opacity"></div>

    <!-- ドロワーメニュー本体 (モバイル用) -->
    <nav id="drawer-menu" class="fixed inset-y-0 left-0 w-64 bg-white shadow-2xl z-50 transform -translate-x-full transition-transform duration-300 ease-in-out flex flex-col md:hidden">
        <div class="header-bg text-white p-3 flex justify-between items-center">
            <span class="font-bold text-base">問題リスト</span>
            <button id="close-menu-btn" class="p-1 hover:bg-white hover:bg-opacity-20 rounded">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <ul id="drawer-list" class="flex-1 overflow-y-auto p-2">
            <!-- JSでリストを生成 -->
        </ul>
    </nav>

    <!-- メインコンテンツ領域 -->
    <main class="flex-1 py-4 md:py-8 px-2 md:px-8 max-w-5xl mx-auto w-full">
        
        <!-- ================= スタート画面 ================= -->
        <section id="start-screen" class="w-full mx-auto">
            
            <div class="bg-white border border-gray-300 w-full mb-6 text-sm md:text-base flex flex-col shadow-sm rounded overflow-hidden">
                <div class="flex border-b border-gray-300">
                    <div class="w-1/3 md:w-1/4 bg-[#005b82] text-white p-2.5 font-bold flex items-center">テスト名</div>
                    <div class="w-2/3 md:w-3/4 p-2.5 font-medium">教採演習 公民</div>
                </div>
                <div class="flex border-b border-gray-300">
                    <div class="w-1/3 md:w-1/4 bg-[#005b82] text-white p-2.5 font-bold flex items-center">テスト範囲</div>
                    <div class="w-2/3 md:w-3/4 p-2.5 leading-relaxed">中学社会 公民的分野</div>
                </div>
                <div class="flex border-b border-gray-300">
                    <div class="w-1/3 md:w-1/4 bg-[#005b82] text-white p-2.5 font-bold flex items-center">出典</div>
                    <div class="w-2/3 md:w-3/4 p-2.5 text-gray-700 font-bold">2026年度 岡山県</div>
                </div>
                <div class="flex border-b border-gray-300">
                    <div class="w-1/3 md:w-1/4 bg-[#005b82] text-white p-2.5 font-bold flex items-center">出題数</div>
                    <div class="w-2/3 md:w-3/4 p-2.5">全 10 問</div>
                </div>
                <div class="flex border-b border-gray-300">
                    <div class="w-1/3 md:w-1/4 bg-[#005b82] text-white p-2.5 font-bold flex items-center">満点</div>
                    <div class="w-2/3 md:w-3/4 p-2.5">10点</div>
                </div>
                <div class="flex border-b border-gray-300">
                    <div class="w-1/3 md:w-1/4 bg-[#005b82] text-white p-2.5 font-bold flex items-center">問題表示区分</div>
                    <div class="w-2/3 md:w-3/4 p-2.5">一問題表示</div>
                </div>
                <div class="flex">
                    <div class="w-1/3 md:w-1/4 bg-[#005b82] text-white p-2.5 font-bold flex items-center">問題出題形式</div>
                    <div class="w-2/3 md:w-3/4 p-2.5">ランダム</div>
                </div>
            </div>

            <div class="flex justify-center gap-4 mt-8">
                <a href="https://n-kyozai.github.io/n-kyozai/past-exams/index.html" class="bg-[#6c757d] hover:bg-gray-600 text-white font-bold py-3 px-8 rounded shadow-md transition active:scale-95 text-lg flex items-center justify-center">
                    戻る
                </a>
                <button id="start-btn" class="header-bg hover:bg-[#00476b] text-white font-bold py-3 px-12 rounded shadow-md transition active:scale-95 text-lg">
                    テスト開始
                </button>
            </div>
        </section>

        <!-- ================= テスト画面 ================= -->
        <section id="test-screen" class="hidden flex-col md:flex-row gap-3 lg:gap-6 items-start w-full">
            
            <!-- デスクトップ用 左サイドバー -->
            <div id="desktop-sidebar" class="hidden md:flex flex-col gap-2 w-40 shrink-0 max-h-[calc(100vh-6rem)] overflow-y-auto custom-scrollbar pr-2 sticky top-4">
                <!-- JSでサイドバーのボタンを生成 -->
            </div>

            <!-- 右側 メインエリア -->
            <div class="flex-1 w-full flex flex-col min-w-0">
                
                <!-- ヘッダーバー -->
                <div class="bg-[#e2e8f0] p-2 rounded border border-gray-300 mb-3 flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-2">
                        <!-- モバイル用メニューボタン -->
                        <button id="menu-btn" class="md:hidden p-1.5 rounded bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 transition" aria-label="メニューを開く">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                            </svg>
                        </button>
                        <span class="font-bold text-gray-700 text-sm md:text-base ml-1 truncate">教採演習 公民</span>
                    </div>
                </div>

                <!-- 問題枠 -->
                <div class="bg-white rounded border border-gray-300 shadow-sm flex flex-col mb-4">
                    <!-- タイトル -->
                    <div class="bg-[#e0f2fe] p-2.5 md:p-3 border-b border-gray-300">
                        <h2 id="question-number-title" class="text-sm md:text-base font-bold text-gray-800">
                            【問題 1】<span class="text-xs font-normal ml-2 text-gray-600">（1点）</span>
                        </h2>
                    </div>
                    <!-- 問題文と解答欄 -->
                    <div class="p-4 flex flex-col gap-4">
                        <!-- 問題文 (選択肢込み) -->
                        <div id="question-body" class="text-sm md:text-base text-gray-800 leading-normal min-h-[60px] whitespace-pre-wrap break-words">
                            <!-- JSで生成 -->
                        </div>
                        
                        <!-- 解答エリア (グレー枠) -->
                        <div class="bg-[#f8fafc] border border-gray-200 rounded p-3 flex flex-wrap items-center gap-3">
                            <p id="input-instruction" class="text-sm text-gray-700 font-medium m-0">正しい選択肢の番号：</p>
                            <div id="input-area" class="flex-1">
                                <!-- JSで input/select を挿入 -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- フッターナビゲーション -->
                <div class="flex justify-between items-center mt-1">
                    <button id="prev-btn" class="bg-[#94a3b8] hover:bg-[#64748b] text-white font-bold py-2 px-4 md:px-8 rounded shadow-sm transition disabled:opacity-50 disabled:cursor-not-allowed text-sm md:text-base">
                        前へ
                    </button>
                    <div class="flex items-center gap-4">
                        <span id="question-progress" class="text-gray-600 font-bold text-sm">1 / 10</span>
                        <button id="next-btn" class="bg-[#005b82] hover:bg-[#00476b] text-white font-bold py-2 px-4 md:px-8 rounded shadow-sm transition text-sm md:text-base">
                            次へ
                        </button>
                        <button id="submit-confirm-btn" class="bg-[#a17f1a] hover:bg-[#856814] text-white font-bold py-2 px-4 md:px-8 rounded shadow-sm transition hidden text-sm md:text-base">
                            提出
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- ================= 確認モーダル ================= -->
        <div id="submit-modal" class="hidden fixed inset-0 bg-black bg-opacity-40 z-50 flex justify-center items-center backdrop-blur-sm p-4">
            <div class="bg-white rounded p-6 md:p-8 max-w-sm w-full shadow-2xl text-center border border-gray-200">
                <p class="text-base md:text-lg font-bold text-gray-800 mb-6">テストを提出して採点しますか？</p>
                <div class="flex justify-center gap-3 md:gap-4">
                    <button id="modal-cancel-btn" class="bg-[#cbd5e1] hover:bg-[#94a3b8] text-gray-800 font-bold py-2 px-6 rounded transition">
                        いいえ
                    </button>
                    <button id="modal-submit-btn" class="bg-[#fbbf24] hover:bg-[#f59e0b] text-gray-900 font-bold py-2 px-6 rounded transition">
                        はい
                    </button>
                </div>
            </div>
        </div>

        <!-- ================= 結果画面 ================= -->
        <section id="result-screen" class="hidden">
            <div class="bg-white rounded shadow-sm p-6 text-center mb-6 border border-gray-200">
                <h2 class="text-xl md:text-2xl font-bold text-gray-800 mb-2">テスト結果</h2>
                <div class="text-4xl md:text-5xl font-bold text-[#005b82] mb-3" id="score-display">
                    -- / --
                </div>
            </div>

            <div class="bg-white rounded shadow-sm p-4 mb-6 border border-gray-200">
                <h3 class="font-bold text-base md:text-lg border-b border-gray-300 pb-2 mb-4">詳細</h3>
                <div id="result-details" class="flex flex-col gap-4">
                    <!-- JSで結果詳細を生成 -->
                </div>
            </div>

            <div class="flex justify-center pb-8">
                <button onclick="location.reload();" class="header-bg hover:bg-[#00476b] text-white font-bold py-3 px-8 rounded shadow transition">
                    もう一度挑戦する
                </button>
            </div>
        </section>

    </main>

    <script>
        // --- データ定義 (岡山県のPDF内容に基づく全10問) ---
        const baseQuestions = [
            {
                title: "核兵器に関する原則（一問一答）",
                text: "我が国が掲げている、「持たず、作らず、持ちこませず」という核兵器に関する原則のことを何というか。\n\n1. 非核三原則\n2. 専守防衛\n3. 集団的自衛権\n4. 文民統制",
                correctAnswer: "1",
                options: ["1", "2", "3", "4"],
                explanation: "非核三原則は、1960年代に佐藤栄作首相が唱えたのが最初で、これにより佐藤栄作はノーベル平和賞を受賞しました。一方、日本はアメリカの核の傘の下にあることから、核兵器禁止条約には参加していません。"
            },
            {
                title: "日本国憲法第25条（１）",
                text: "次の文は日本国憲法第25条の一部である。[　]に当てはまる語句を1つ選べ。\n\n「すべて国民は、[　]で文化的な最低限度の生活を営む権利を有する。」\n\n1. 安全\n2. 平和\n3. 健康\n4. 平等",
                correctAnswer: "3",
                options: ["1", "2", "3", "4"],
                explanation: "日本国憲法第25条では、社会権の中核となる生存権について「すべて国民は、健康で文化的な最低限度の生活を営む権利を有する。」と規定しています。"
            },
            {
                title: "日本国憲法第25条（２）",
                text: "次の文は日本国憲法第25条の一部である。[　]に当てはまる語句を1つ選べ。\n\n「すべて国民は、健康で文化的な[　]の生活を営む権利を有する。」\n\n1. 最高水準\n2. 一定水準\n3. 基礎的\n4. 最低限度",
                correctAnswer: "4",
                options: ["1", "2", "3", "4"],
                explanation: "日本国憲法第25条の条文です。生存権を保障する最後のとりでとして、我が国には生活保護の制度などがあります。"
            },
            {
                title: "衆議院の優越",
                text: "衆議院の優越が認められている事項として**適当でないもの**を、次の1～4から一つ選べ。\n\n1. 憲法改正の発議\n2. 内閣不信任の決議\n3. 法律案の議決\n4. 予算の先議",
                correctAnswer: "1",
                options: ["1", "2", "3", "4"],
                explanation: "憲法改正の発議には、衆議院と参議院でそれぞれ総議員の3分の2以上の賛成を要し、衆議院の優越は認められていません（両院対等）。内閣不信任の決議や予算の先議権は衆議院のみに認められており、法律案の議決でも衆議院の優越が認められています。"
            },
            {
                title: "裁判員制度",
                text: "裁判員制度について述べた文として**正しいもの**を、次の1～4から一つ選べ。\n\n1. 裁判員は、18歳以上の国民の中から、くじと面接によって選ばれる。\n2. 裁判員裁判の対象となるのは、軽犯罪や民事事件のみである。\n3. 裁判員裁判は、地方裁判所と高等裁判所の両方で行われる。\n4. 学生であっても、裁判員に選ばれた場合は辞退することができない。",
                correctAnswer: "1",
                options: ["1", "2", "3", "4"],
                explanation: "裁判員は、選挙権を有する18歳以上の者から選ばれます。対象は殺人などの重大な刑事事件の第一審（地方裁判所）のみです。また、学生であれば辞退できる場合があります。"
            },
            {
                title: "三権分立",
                text: "我が国が三権分立をとっている理由として最も適切なものを、次の1～4から一つ選べ。\n\n1. 地方公共団体に権力を分散させ、住民の意見を直接国政に反映させるため。\n2. 三つの権力を内閣に集中させることで、迅速で効率的な政治を行うため。\n3. 三つの権力が相互に抑制し、均衡を保つことで、権力の暴走から国民の権利を守るため。\n4. 三つの権力を完全に独立させ、互いに一切干渉できないようにするため。",
                correctAnswer: "3",
                options: ["1", "2", "3", "4"],
                explanation: "三権分立とは、国家権力を立法権や行政権や司法権に分け、互いの抑制・均衡（チェック・アンド・バランス）を保つことで、権力の暴走を防ぎ国民の権利を守る仕組みです。"
            },
            {
                title: "独占禁止法（一問一答）",
                text: "我が国において、独占禁止法に基づいて企業を監視したり、指導したりする機関を何というか。\n\n1. 金融庁\n2. 公正取引委員会\n3. 消費者庁\n4. 証券取引等監視委員会",
                correctAnswer: "2",
                options: ["1", "2", "3", "4"],
                explanation: "公正取引委員会は、独占禁止法を運用するために内閣府の外局として設置されている行政委員会です。他の行政機関から独立して職権を行使します。"
            },
            {
                title: "日本銀行",
                text: "日本銀行について述べた文として、**誤っているもの**を次の1～4から一つ選べ。\n\n1. 「銀行の銀行」として、個人や一般の企業から余ったお金を預かったり、貸し出したりする。\n2. 我が国で使用する紙幣（日本銀行券）を発行できる唯一の銀行である。\n3. 「政府の銀行」として、国庫金の出納を行う。\n4. 金融政策を通じて、物価の安定や経済の持続的な成長を図っている。",
                correctAnswer: "1",
                options: ["1", "2", "3", "4"],
                explanation: "日本銀行は「銀行の銀行」であって、個人や銀行以外の企業からの預金は受け入れず、融資も行いません。"
            },
            {
                title: "累進課税制度",
                text: "我が国の所得税において用いられている「累進課税」の説明として最も適切なものを1つ選べ。\n\n1. 所得の金額に関わらず、すべての人が同じ割合で税金を納める仕組み。\n2. 所得が低い人ほど、生活を保護するために高い税率を適用する仕組み。\n3. 商品やサービスを購入する際に、一律の税率が上乗せされる仕組み。\n4. 所得が高い人ほど、所得にかかる税率が高くなるという仕組み。",
                correctAnswer: "4",
                options: ["1", "2", "3", "4"],
                explanation: "累進課税とは、所得が高い人ほど高い税率が適用される仕組みです。これにより担税能力の高い人ほど税負担が高くなり、所得の再分配機能が働き、課税の垂直的公平が実現します。"
            },
            {
                title: "国際的な経済活動（一問一答）",
                text: "発展途上国の人々が生産した農作物や製品を、適正な価格で取り引きを行うことで、生産者の生活と自立を支える仕組みを何というか。\n\n1. マイクロクレジット\n2. ODA（政府開発援助）\n3. フェアトレード\n4. 保護貿易",
                correctAnswer: "3",
                options: ["1", "2", "3", "4"],
                explanation: "「公平貿易」とも訳されるフェアトレードのことです。カカオ豆やコーヒー豆など、発展途上国で劣悪な労働条件で生産されることを防ぎ、生産者の生活と自立を支援する活動として進められています。"
            }
        ];

        // --- グローバル変数 ---
        let parsedQuestions = [];     
        let userAnswers = [];         
        let currentQuestionIndex = 0; 

        // --- DOM要素 ---
        const screens = {
            start: document.getElementById('start-screen'),
            test: document.getElementById('test-screen'),
            result: document.getElementById('result-screen')
        };
        const els = {
            menuBtn: document.getElementById('menu-btn'),
            drawerOverlay: document.getElementById('drawer-overlay'),
            drawerMenu: document.getElementById('drawer-menu'),
            drawerList: document.getElementById('drawer-list'),
            closeMenuBtn: document.getElementById('close-menu-btn'),
            
            desktopSidebar: document.getElementById('desktop-sidebar'),
            qNumberTitle: document.getElementById('question-number-title'),
            qBody: document.getElementById('question-body'),
            inputArea: document.getElementById('input-area'),
            qProgress: document.getElementById('question-progress'),
            
            prevBtn: document.getElementById('prev-btn'),
            nextBtn: document.getElementById('next-btn'),
            submitConfirmBtn: document.getElementById('submit-confirm-btn'),
            
            submitModal: document.getElementById('submit-modal'),
            modalCancelBtn: document.getElementById('modal-cancel-btn'),
            modalSubmitBtn: document.getElementById('modal-submit-btn'),
            
            scoreDisplay: document.getElementById('score-display'),
            resultDetails: document.getElementById('result-details')
        };

        // --- 初期化 ---
        function initApp() {
            // イベントリスナー登録
            document.getElementById('start-btn').addEventListener('click', startTest);
            
            els.prevBtn.addEventListener('click', () => navigateQuestion(-1));
            els.nextBtn.addEventListener('click', () => navigateQuestion(1));
            
            els.submitConfirmBtn.addEventListener('click', () => {
                els.submitModal.classList.remove('hidden');
            });
            els.modalCancelBtn.addEventListener('click', () => {
                els.submitModal.classList.add('hidden');
            });
            els.modalSubmitBtn.addEventListener('click', () => {
                els.submitModal.classList.add('hidden');
                finishTest();
            });
            
            els.menuBtn.addEventListener('click', openDrawer);
            els.closeMenuBtn.addEventListener('click', closeDrawer);
            els.drawerOverlay.addEventListener('click', closeDrawer);
        }

        // --- テスト開始処理 ---
        function startTest() {
            generateQuestions();

            screens.start.classList.add('hidden');
            screens.test.classList.remove('hidden');
            screens.test.classList.add('flex');

            currentQuestionIndex = 0;
            renderQuestion(currentQuestionIndex);
            updateNavigations();
        }

        // --- 問題データの生成 (全問ランダム) ---
        function generateQuestions() {
            parsedQuestions = [];
            userAnswers = [];

            // 問題をランダムにシャッフル
            const shuffledData = [...baseQuestions].sort(() => Math.random() - 0.5);

            shuffledData.forEach((q) => {
                parsedQuestions.push({
                    title: q.title,
                    text: q.text,
                    correctAnswer: q.correctAnswer,
                    options: q.options,
                    explanation: q.explanation
                });
                userAnswers.push(""); 
            });
        }

        // --- 問題の描画 ---
        function renderQuestion(index) {
            const q = parsedQuestions[index];
            
            els.qNumberTitle.innerHTML = `【問題 ${index + 1}】<span class="text-xs ml-2 font-normal text-gray-700">（1点）</span>`;
            
            // XSS対策を先に行い、その後に改行を反映
            let displayText = q.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            displayText = displayText.replace(/\n/g, '<br>');

            els.qBody.innerHTML = displayText;
            els.qProgress.textContent = `${index + 1} / ${parsedQuestions.length}`;

            // 解答枠の生成 (セレクトボックス強制)
            els.inputArea.innerHTML = '';
            
            const select = document.createElement('select');
            select.className = 'blank-select';
            
            const defaultOption = document.createElement('option');
            defaultOption.value = "";
            defaultOption.textContent = "-"; // 省スペース化
            select.appendChild(defaultOption);

            q.options.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt;
                option.textContent = opt;
                if (userAnswers[index] === opt) {
                    option.selected = true;
                }
                select.appendChild(option);
            });

            select.addEventListener('change', (e) => {
                userAnswers[index] = e.target.value;
                updateNavigations();
            });
            els.inputArea.appendChild(select);

            // ボタンの表示制御
            els.prevBtn.disabled = index === 0;
            if (index === parsedQuestions.length - 1) {
                els.nextBtn.classList.add('hidden');
                els.submitConfirmBtn.classList.remove('hidden');
            } else {
                els.nextBtn.classList.remove('hidden');
                els.submitConfirmBtn.classList.add('hidden');
            }
        }

        function navigateQuestion(step) {
            const newIndex = currentQuestionIndex + step;
            if (newIndex >= 0 && newIndex < parsedQuestions.length) {
                currentQuestionIndex = newIndex;
                renderQuestion(currentQuestionIndex);
                updateNavigations(); 
            }
        }

        // --- UIの更新 ---
        function updateNavigations() {
            updateSidebarList();
            updateDrawerList();
        }

        function updateSidebarList() {
            els.desktopSidebar.innerHTML = '';
            parsedQuestions.forEach((q, idx) => {
                const button = document.createElement('button');
                const isActive = idx === currentQuestionIndex;
                
                let baseClass = "text-center px-2 py-2 rounded font-medium transition border text-sm shadow-sm ";
                if (isActive) {
                    baseClass += "bg-[#bfdbfe] text-black border-[#93c5fd]"; 
                } else {
                    baseClass += "bg-[#e2e8f0] text-gray-700 border-[#cbd5e1] hover:bg-[#cbd5e1]";
                }
                
                button.className = baseClass;
                button.innerHTML = `【問${idx + 1}】`;
                
                button.addEventListener('click', () => {
                    currentQuestionIndex = idx;
                    renderQuestion(currentQuestionIndex);
                    updateNavigations();
                });
                
                els.desktopSidebar.appendChild(button);
            });
        }

        function updateDrawerList() {
            els.drawerList.innerHTML = '';
            parsedQuestions.forEach((q, idx) => {
                const li = document.createElement('li');
                const isActive = idx === currentQuestionIndex;
                
                li.className = `p-3 mb-1 rounded cursor-pointer transition text-sm ${isActive ? 'bg-[#bfdbfe] font-bold text-black border border-[#93c5fd]' : 'bg-[#e2e8f0] border border-[#cbd5e1] hover:bg-[#cbd5e1] text-gray-700'}`;
                li.innerHTML = `<div class="text-center">【問題${idx + 1}】</div>`;
                
                li.addEventListener('click', () => {
                    currentQuestionIndex = idx;
                    renderQuestion(currentQuestionIndex);
                    closeDrawer(); 
                    updateNavigations();
                });
                
                els.drawerList.appendChild(li);
            });
        }

        function openDrawer() {
            els.drawerMenu.classList.remove('-translate-x-full');
            els.drawerOverlay.classList.remove('hidden');
        }

        function closeDrawer() {
            els.drawerMenu.classList.add('-translate-x-full');
            els.drawerOverlay.classList.add('hidden');
        }

        // --- テスト終了・採点処理 ---
        function finishTest() {
            let correctCount = 0;
            els.resultDetails.innerHTML = '';

            parsedQuestions.forEach((q, idx) => {
                const userAnswer = userAnswers[idx];
                const isCorrect = userAnswer === q.correctAnswer;
                if (isCorrect) correctCount++;

                const resultCard = document.createElement('div');
                resultCard.className = `p-3 md:p-4 rounded border-l-4 ${isCorrect ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'} shadow-sm`;
                
                const icon = isCorrect 
                    ? `<span class="text-green-600 font-bold text-sm md:text-base">○ 正解</span>` 
                    : `<span class="text-red-600 font-bold text-sm md:text-base">× 不正解</span>`;

                let correctHtmlText = q.text.replace(/</g, "&lt;").replace(/>/g, "&gt;"); // XSS対策
                correctHtmlText = correctHtmlText.replace(/\n/g, '<br>');

                const explanationHtml = q.explanation 
                    ? `<div class="mt-3 p-2.5 bg-white border border-gray-200 rounded text-xs md:text-sm text-gray-700 leading-relaxed"><span class="font-bold text-gray-600 block mb-1">【解説】</span>${q.explanation.replace(/\n/g, '<br>')}</div>` 
                    : '';

                resultCard.innerHTML = `
                    <div class="flex justify-between items-center mb-2 border-b border-gray-200 pb-2">
                        <h4 class="font-bold text-gray-800 text-sm md:text-base">問 ${idx + 1}: <span class="text-xs md:text-sm font-normal text-gray-600">${q.title}</span></h4>
                        ${icon}
                    </div>
                    <div class="text-xs md:text-sm text-gray-700 bg-white p-3 rounded border border-gray-200 mb-2 whitespace-pre-wrap break-words">${correctHtmlText}</div>
                    <div class="grid grid-cols-2 gap-2 text-xs md:text-sm mt-2">
                        <div class="bg-white p-2 rounded border border-gray-100 shadow-sm flex flex-col items-center justify-center">
                            <span class="text-gray-500 block text-[10px] md:text-xs mb-1">あなたの解答</span>
                            <span class="font-bold ${isCorrect ? 'text-green-700' : 'text-red-700'} text-base md:text-lg">${userAnswer || '未解答'}</span>
                        </div>
                        <div class="bg-white p-2 rounded border border-gray-100 shadow-sm flex flex-col items-center justify-center">
                            <span class="text-gray-500 block text-[10px] md:text-xs mb-1">正解</span>
                            <span class="font-bold text-blue-700 text-base md:text-lg">${q.correctAnswer}</span>
                        </div>
                    </div>
                    ${explanationHtml}
                `;
                els.resultDetails.appendChild(resultCard);
            });

            els.scoreDisplay.textContent = `${correctCount} / ${parsedQuestions.length}`;
            
            screens.test.classList.add('hidden');
            screens.test.classList.remove('flex');
            screens.result.classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
