    <script>
        lucide.createIcons();

        // --- サイドバー制御 ---
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        const toggleSidebar = () => {
            const isActive = sidebar.classList.contains('active');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            menuToggle.innerHTML = isActive ? '<i data-lucide="menu"></i>' : '<i data-lucide="x"></i>';
            lucide.createIcons();
            document.body.style.overflow = isActive ? '' : 'hidden';
        };

        if (menuToggle) menuToggle.addEventListener('click', toggleSidebar);
        if (overlay) overlay.addEventListener('click', toggleSidebar);

        // --- 問題データ（全20問・形式混合） ---
        const quizData = [
            {
                type: "四肢択一",
                question: "古代の身分制度（五色の賤）のうち、家族を持つことができ、売買の対象とならなかった官有の賤民はどれか。",
                options: ["陵戸", "官戸", "公奴婢", "家人"],
                correct: 1,
                explanation: "五色の賤のうち、官戸（かんこ）と家人（けにん）は家族を持つことが許され、売買の対象にはなりませんでした。官戸は官有、家人は私有の賤民です。"
            },
            {
                type: "正誤問題",
                question: "古代の身分制度における「雑戸（ざっこ）」は、身分的には賤民であったが、実質的には良民と同じ扱いを受けた。",
                options: ["正しい", "誤り"],
                correct: 1,
                explanation: "誤りです。品部（しなべ）や雑戸（ざっこ）は特定の技術を持って朝廷に仕える人々で、身分的には「良民」でしたが、実質的な扱いは良民と賤民の中間的なものでした。"
            },
            {
                type: "四肢択一",
                question: "中世の身分制度において、武士や名主のもとで家内奴隷的に使役された下層農民を何と呼んだか。",
                options: ["凡下", "下人・所従", "水呑百姓", "名子"],
                correct: 1,
                explanation: "中世において、武士や荘官、名主などのもとで隷属的な立場で家内奴隷のように使役された人々を下人（げにん）や所従（しょじゅう）と呼びました。"
            },
            {
                type: "穴埋め",
                question: "1871年（明治4年）に明治政府が出した、えた・ひにんなどの称を廃止し、身分や職業を平民と同様とした法令を一般に【　　　】と呼ぶ。",
                options: ["四民平等令", "解放令", "廃藩置県", "壬申戸籍法"],
                correct: 1,
                explanation: "1871年に出された「穢多非人等廃止ノ布告」は、一般に「解放令」と呼ばれます。しかし、社会的な差別はその後も根強く残りました。"
            },
            {
                type: "四肢択一",
                question: "1871年の岩倉使節団に同行した日本最初の女子留学生の一人で、のちに女子英学塾（現在の津田塾大学）を創設したのは誰か。",
                options: ["大山捨松", "吉岡弥生", "津田梅子", "荻野吟子"],
                correct: 2,
                explanation: "津田梅子は、わずか満6歳で岩倉使節団とともに渡米し、帰国後に女子の高等教育の発展に尽力しました。"
            },
            {
                type: "四肢択一",
                question: "「元始、女性は実に太陽であった」という創刊の辞で知られる、1911年に創刊された女性の文芸雑誌はどれか。",
                options: ["『青鞜』", "『明星』", "『白樺』", "『婦人公論』"],
                correct: 0,
                explanation: "平塚らいてうらが中心となって創刊した『青鞜（せいとう）』は、当初は女性の文学的才能を伸ばす目的でしたが、やがて女性解放運動の拠点となっていきました。"
            },
            {
                type: "四肢択一",
                question: "1920年に平塚らいてう・市川房枝らが結成し、女性の政治集会参加を禁じた治安警察法第5条の改正などを求めた団体はどれか。",
                options: ["赤瀾会", "新婦人協会", "婦人参政権獲得期成同盟会", "青鞜社"],
                correct: 1,
                explanation: "新婦人協会は、女性の政治的・社会的権利の獲得を目指して活動し、1922年に治安警察法第5条の一部改正（女性の政治集会参加の合法化）を実現させました。"
            },
            {
                type: "四肢択一",
                question: "空海（弘法大師）が、貴族だけでなく庶民の教育のために京都に創設したとされる教育機関はどれか。",
                options: ["金沢文庫", "足利学校", "綜芸種智院", "勧学院"],
                correct: 2,
                explanation: "綜芸種智院（しゅげいしゅちいん）は、空海が828年に創設した私立の教育機関で、身分を問わず教育を行いました。"
            },
            {
                type: "穴埋め",
                question: "江戸時代、各藩が藩士の子弟を教育するために設立した学校を【　　　】という。",
                options: ["寺子屋", "郷学", "私塾", "藩校（藩学）"],
                correct: 3,
                explanation: "藩校（藩学）は、武士としての教養や朱子学などを教えるための学校です。長州藩の明倫館や、会津藩の明新館などが有名です。"
            },
            {
                type: "四肢択一",
                question: "1872年（明治5年）にフランスの教育制度に倣って公布され、全国を学区に分けて小学校から大学までの制度を定めた法令はどれか。",
                options: ["教育令", "学校令", "学制", "教育勅語"],
                correct: 2,
                explanation: "「学制」は、身分や性別に関わらず国民皆学を目指した日本初の近代的教育法令ですが、画一的で国民の負担が大きかったため、後にアメリカ風の「教育令」に改められました。"
            },
            {
                type: "四肢択一",
                question: "1428年、近江の馬借の蜂起を発端とし、惣を基盤とした土民が徳政（借金帳消し）を求めて起こした一揆はどれか。",
                options: ["嘉吉の土一揆", "山城の国一揆", "正長の土一揆", "加賀の一向一揆"],
                correct: 2,
                explanation: "正長の土一揆は、室町時代に起きた最初の大規模な土一揆です。奈良の柳生などに「正長元年」と刻まれた徳政碑文が残されています。"
            },
            {
                type: "正誤問題",
                question: "1485年に起きた山城の国一揆は、浄土真宗（一向宗）の門徒が中心となって守護大名を追い出し、自治を行ったものである。",
                options: ["正しい", "誤り"],
                correct: 1,
                explanation: "誤りです。山城の国一揆は、国人（在地領主）や地侍、惣の土民らが連合して守護大名（畠山氏）を追い出したものです。一向宗門徒が自治を行ったのは1488年の加賀の一向一揆です。"
            },
            {
                type: "穴埋め",
                question: "江戸時代後期の「惣百姓一揆」では、全村民が参加し、首謀者を隠すために【　　　】などの署名形式が用いられた。",
                options: ["起請文", "傘連判状", "目安箱", "越訴状"],
                correct: 1,
                explanation: "傘連判状（からかされんぱんじょう）は、円形に放射状に署名することで、誰が首謀者（筆頭者）であるか分からないように工夫されたものです。"
            },
            {
                type: "四肢択一",
                question: "1897年に高野房太郎や片山潜らによって結成され、日本の労働組合結成を促した組織はどれか。",
                options: ["日本労働総同盟", "労働組合期成会", "友愛会", "大日本産業報国会"],
                correct: 1,
                explanation: "労働組合期成会の結成を機に、鉄工組合や日本鉄道矯正会などが組織され、日本における初期の労働運動が本格化しました。"
            },
            {
                type: "四肢択一",
                question: "明治後期に発生した足尾銅山鉱毒事件で、被害民を救済するために衆議院議員を辞職し、1901年に天皇へ直訴を行った人物は誰か。",
                options: ["幸徳秋水", "田中正造", "横山源之助", "片山潜"],
                correct: 1,
                explanation: "田中正造は、古河市兵衛が経営する足尾銅山からの鉱毒被害を国会で追及しましたが解決せず、最終的に天皇への直訴を決行しました。"
            },
            {
                type: "画像問題",
                question: "「法を犯して鳳駕（ほうが）に近前する其罪実に万死に当れり...」という書き出しから始まる、田中正造の天皇への直訴状を起草したとされる社会主義者は誰か。",
                imageUrl: "",
                options: ["堺利彦", "大杉栄", "幸徳秋水", "安部磯雄"],
                correct: 2,
                explanation: "この直訴状は、当時ジャーナリストとして活動していた幸徳秋水が起草（代筆）したと伝えられています。幸徳秋水は後に大逆事件（1910年）で処刑されました。"
            },
            {
                type: "穴埋め",
                question: "1911年に公布された日本初の労働者保護法で、15人以上の工場を対象とし、年少者や女子の深夜業を禁止した法律は【　　　】である。",
                options: ["労働基準法", "治安警察法", "工場法", "労働組合法"],
                correct: 2,
                explanation: "工場法は労働環境の改善を目指して制定されましたが、資本家の反対が強く、施行は5年後の1916年となり、内容も不徹底なものでした。"
            },
            {
                type: "四肢択一",
                question: "1922年、被差別部落の人々が自主的な解放を目指して結成した組織はどれか。",
                options: ["全国水平社", "日本農民組合", "部落解放同盟", "青鞜社"],
                correct: 0,
                explanation: "全国水平社は西光万吉らが起草した「水平社宣言」を掲げて結成され、差別の撤廃と人間の尊厳の回復を求める運動を展開しました。"
            },
            {
                type: "四肢択一",
                question: "1920年代に頻発した小作争議を背景に、1922年に杉山元治郎や賀川豊彦らによって結成された日本初の全国的な小作人組織はどれか。",
                options: ["労働農民党", "日本農民組合", "全国農民組合", "大日本農会"],
                correct: 1,
                explanation: "日本農民組合は、小作料の減免などを求めて小作争議を指導し、大正デモクラシー期の農民運動の中心となりました。"
            },
            {
                type: "四肢択一",
                question: "高度経済成長期に深刻化した四大公害病のうち、熊本県で発生し、化学工場から排出されたメチル水銀（有機水銀）が原因となった公害病はどれか。",
                options: ["イタイイタイ病", "四日市ぜんそく", "新潟水俣病", "水俣病"],
                correct: 3,
                explanation: "チッソ水俣工場からのメチル水銀を含んだ廃水が魚介類を汚染し、それを食した人々に深刻な健康被害をもたらしました。イタイイタイ病の原因はカドミウム、四日市ぜんそくは亜硫酸ガスです。"
            }
        ];

        // --- エンドレス復習モード用 状態管理変数 ---
        let totalQuestions = quizData.length;
        let activeQueue = []; // 現在出題する問題のインデックス配列
        let nextQueue = [];   // 間違えて次回（復習）に回すインデックス配列
        let queueIndex = 0;   // activeQueue内の現在の位置
        
        let attempts = [];    // 各問題の挑戦回数（0なら初見）
        let firstPassScore = 0; // 1回目で正解した数
        let isAnswered = false;

        const appDiv = document.getElementById('quiz-app-container');

        // クイズ初期化（ロード時に直接開始）
        function startQuiz() {
            activeQueue = quizData.map((_, i) => i);
            nextQueue = [];
            queueIndex = 0;
            firstPassScore = 0;
            attempts = new Array(totalQuestions).fill(0);
            renderQuestionScreen();
        }

        // 1. 問題画面の描画
        function renderQuestionScreen() {
            isAnswered = false;
            const qIndex = activeQueue[queueIndex];
            const q = quizData[qIndex];
            const isReview = attempts[qIndex] > 0; // 2回目以降なら復習モード

            // 進行度の計算 (残り何問正解すれば完全クリアか)
            const remaining = (activeQueue.length - queueIndex) + nextQueue.length;
            const progress = ((totalQuestions - remaining) / totalQuestions) * 100;

            let optionsHtml = '';
            q.options.forEach((opt, index) => {
                optionsHtml += `
                    <button onclick="checkAnswer(${index})" id="opt-${index}" class="quiz-option-btn">
                        <span class="option-label">${index + 1}</span>
                        <span class="option-text">${opt}</span>
                        <span class="option-icon" id="opt-icon-${index}"></span>
                    </button>
                `;
            });

            let imageHtml = '';
            if (q.imageUrl) {
                imageHtml = `
                    <div class="quiz-image-box">
                        <i data-lucide="image" style="width: 24px; height: 24px; margin-bottom: 4px;"></i>
                        <span style="font-weight: bold;">${q.imageUrl}</span>
                    </div>
                `;
            }

            // ヘッダーテキストの出し分け（初見か復習か）
            const headerText = isReview 
                ? `<span class="text-red-500 mr-2 flex items-center gap-1"><i data-lucide="refresh-cw" style="width: 16px; height: 16px;"></i>復習モード</span>` 
                : `問題 ${queueIndex + 1} / ${totalQuestions}`;
            const subHeaderText = isReview ? `<span class="text-slate-400 text-sm font-normal">（残り ${remaining} 問）</span>` : ``;

            appDiv.innerHTML = `
                <div class="quiz-container">
                    <div class="quiz-header">
                        <div class="quiz-title-text">
                            ${!isReview ? `<i data-lucide="file-question" style="width: 18px; height: 18px;"></i>` : ''}
                            ${headerText} ${subHeaderText}
                        </div>
                        <div class="quiz-score">
                            初回スコア: ${firstPassScore}
                        </div>
                    </div>
                    <div class="quiz-progress-bar">
                        <div class="quiz-progress-fill" style="width: ${progress}%"></div>
                    </div>
                    <div class="quiz-body">
                        <div><span class="quiz-question-type">${q.type}</span></div>
                        <h3 class="quiz-question">${q.question}</h3>
                        ${imageHtml}
                        <div class="quiz-options">
                            ${optionsHtml}
                        </div>
                        <div id="explanation-box" class="quiz-explanation">
                            <!-- 解説がここに表示されます -->
                        </div>
                        <button onclick="nextQuestion()" id="next-btn" class="quiz-next-btn">
                            次の問題へ <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
                        </button>
                    </div>
                </div>
            `;
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 2. 答え合わせ
        function checkAnswer(selectedIndex) {
            if (isAnswered) return;
            isAnswered = true;

            const qIndex = activeQueue[queueIndex];
            const q = quizData[qIndex];
            const isCorrect = selectedIndex === q.correct;

            // 初回正解時のみスコア加算
            if (attempts[qIndex] === 0 && isCorrect) {
                firstPassScore++;
            }
            
            // 挑戦回数を増やす
            attempts[qIndex]++;

            // 間違えた場合は、復習キューに追加
            if (!isCorrect) {
                nextQueue.push(qIndex);
            }

            // 選択肢のUI更新
            for (let i = 0; i < q.options.length; i++) {
                const btn = document.getElementById(`opt-${i}`);
                const icon = document.getElementById(`opt-icon-${i}`);
                btn.disabled = true;
                
                if (i === q.correct) {
                    btn.classList.add('correct');
                    icon.innerHTML = '<i data-lucide="check-circle" style="width: 20px; height: 20px;"></i>';
                } else if (i === selectedIndex && !isCorrect) {
                    btn.classList.add('wrong');
                    icon.innerHTML = '<i data-lucide="x-circle" style="width: 20px; height: 20px;"></i>';
                } else {
                    btn.classList.add('disabled-fade');
                }
            }

            // スコアの更新
            document.querySelector('.quiz-score').innerText = `初回スコア: ${firstPassScore}`;

            // 解説ボックスの表示
            const expBox = document.getElementById('explanation-box');
            expBox.classList.add('show');
            if (isCorrect) {
                expBox.classList.add('correct-exp');
                expBox.innerHTML = `
                    <div class="exp-title"><i data-lucide="check-circle-2" style="width: 20px; height: 20px;"></i> 正解！</div>
                    <p>${q.explanation}</p>
                `;
            } else {
                expBox.classList.add('wrong-exp');
                expBox.innerHTML = `
                    <div class="exp-title"><i data-lucide="alert-circle" style="width: 20px; height: 20px;"></i> 不正解...</div>
                    <p style="margin-bottom: 8px;"><strong>正解は「${q.options[q.correct]}」です。</strong></p>
                    <p>${q.explanation}</p>
                `;
            }

            // ボタンの文言調整（キューの最後で、かつ復習問題がない場合は「結果を見る」）
            const nextBtn = document.getElementById('next-btn');
            if (queueIndex >= activeQueue.length - 1 && nextQueue.length === 0) {
                nextBtn.innerHTML = `結果を見る <i data-lucide="award" style="width: 18px; height: 18px;"></i>`;
            }
            nextBtn.classList.add('show');
            lucide.createIcons();
        }

        // 次の問題へ遷移（エンドレス復習ロジック）
        function nextQuestion() {
            queueIndex++;
            
            // 現在のキューを最後まで解き終わったか？
            if (queueIndex >= activeQueue.length) {
                if (nextQueue.length > 0) {
                    // 間違えた問題がある場合、それを新しいキューとして復習ループ開始
                    activeQueue = [...nextQueue];
                    nextQueue = [];
                    queueIndex = 0;
                    renderQuestionScreen();
                } else {
                    // 間違えた問題がゼロになれば完全クリア！結果画面へ
                    renderResultScreen();
                }
            } else {
                // まだ現在のキューが残っている場合は次へ
                renderQuestionScreen();
            }
        }

        // 3. 結果画面（全問正解完了時）
        function renderResultScreen() {
            const percentage = Math.round((firstPassScore / totalQuestions) * 100);
            let message = '間違えた問題もすべてクリアしました！確実に実力がついています。';
            
            appDiv.innerHTML = `
                <div class="quiz-container">
                    <div class="quiz-progress-bar">
                        <div class="quiz-progress-fill" style="width: 100%"></div>
                    </div>
                    <div class="quiz-center-content">
                        <div class="quiz-icon-large" style="background-color: #fef08a; color: #a16207;">
                            <i data-lucide="award" style="width: 50px; height: 50px;"></i>
                        </div>
                        <h2 class="quiz-main-title">全問クリア達成！</h2>
                        
                        <div class="result-score">${firstPassScore} <span style="font-size: 2rem; color: var(--text-muted);">/ ${totalQuestions}</span></div>
                        <div style="font-size: 1.2rem; color: var(--text-muted); font-weight: bold; margin-bottom: 32px;">初回正答率: ${percentage}%</div>
                        
                        <div style="background: var(--bg-color); padding: 24px; border-radius: 12px; margin-bottom: 40px; max-width: 500px; width: 100%; border: 1px solid var(--border-color);">
                            <p style="font-size: 1.1rem; font-weight: bold; color: var(--text-color);">${message}</p>
                        </div>
                        
                        <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; width: 100%; max-width: 400px;">
                            <button onclick="startQuiz()" class="btn-primary" style="width: 100%; justify-content: center;">
                                <i data-lucide="rotate-ccw" style="width: 20px; height: 20px;"></i> はじめから挑戦する
                            </button>
                            <a href="/n-kyozai/index.html" class="btn-secondary" style="width: 100%; justify-content: center;">
                                <i data-lucide="home" style="width: 20px; height: 20px;"></i> ホームへ戻る
                            </a>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ロードと同時に開始
        startQuiz();
    </script>
</body>
</html>
