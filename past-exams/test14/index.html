            sectionSelect: document.getElementById('section-select'),
            countSelectContainer: document.getElementById('count-select-container'),
            countSelect: document.getElementById('count-select'),
            totalScore: document.getElementById('total-score'),
            
            menuBtn: document.getElementById('menu-btn'),
            drawerOverlay: document.getElementById('drawer-overlay'),
            drawerMenu: document.getElementById('drawer-menu'),
            drawerList: document.getElementById('drawer-list'),
            closeMenuBtn: document.getElementById('close-menu-btn'),
            fontSizeBtn: document.getElementById('font-size-btn'),
            
            desktopSidebar: document.getElementById('desktop-sidebar'),
            headerSectionTitle: document.getElementById('header-section-title'),
            questionsContainer: document.getElementById('questions-container'),
            sectionProgress: document.getElementById('section-progress'),
            
            prevBtn: document.getElementById('prev-btn'),
            nextBtn: document.getElementById('next-btn'),
            submitConfirmBtn: document.getElementById('submit-confirm-btn'),
            
            submitModal: document.getElementById('submit-modal'),
            modalCancelBtn: document.getElementById('modal-cancel-btn'),
            modalSubmitBtn: document.getElementById('modal-submit-btn'),
            
            scoreDisplay: document.getElementById('score-display'),
            resultDetails: document.getElementById('result-details')
        };

        // --- 初期化 ---
        function initApp() {
            // セクション選択プルダウンの初期化
            els.sectionSelect.innerHTML = '';
            masterData.forEach((sec, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = `【大問${idx + 1}】 ${sec.sectionTitle}`;
                els.sectionSelect.appendChild(opt);
            });

            // 出題形式プルダウンの処理
            els.modeSelect.addEventListener('change', (e) => {
                currentMode = e.target.value;
                if (currentMode === 'random') {
                    els.countSelectContainer.classList.remove('hidden');
                    els.sectionSelectContainer.classList.add('hidden');
                } else if (currentMode === 'specific') {
                    els.countSelectContainer.classList.add('hidden');
                    els.sectionSelectContainer.classList.remove('hidden');
                } else {
                    els.countSelectContainer.classList.add('hidden');
                    els.sectionSelectContainer.classList.add('hidden');
                }
                updateTotalScore();
            });

            // 出題数プルダウンの処理
            els.countSelect.addEventListener('change', (e) => {
                const val = e.target.value;
                if (val === 'all') {
                    selectedRandomCount = totalQuestionsCount;
                } else {
                    selectedRandomCount = parseInt(val, 10);
                }
                updateTotalScore();
            });

            // セクション選択プルダウンの処理
            els.sectionSelect.addEventListener('change', () => {
                updateTotalScore();
            });

            // イベントリスナー登録
            document.getElementById('start-btn').addEventListener('click', startTest);
            
            els.prevBtn.addEventListener('click', () => navigateSection(-1));
            els.nextBtn.addEventListener('click', () => navigateSection(1));
            
            els.submitConfirmBtn.addEventListener('click', () => {
                els.submitModal.classList.remove('hidden');
            });
            els.modalCancelBtn.addEventListener('click', () => {
                els.submitModal.classList.add('hidden');
            });
            els.modalSubmitBtn.addEventListener('click', () => {
                els.submitModal.classList.add('hidden');
                finishTest();
            });
            
            els.menuBtn.addEventListener('click', openDrawer);
            els.closeMenuBtn.addEventListener('click', closeDrawer);
            els.drawerOverlay.addEventListener('click', closeDrawer);

            els.fontSizeBtn.addEventListener('click', () => {
                currentFontSizeLevel = (currentFontSizeLevel + 1) % fontSizeClasses.length;
                applyFontSize();
            });

            // 初期表示の満点を現在のモードに合わせる
            updateTotalScore();
        }

        function updateTotalScore() {
            if (currentMode === 'random') {
                els.totalScore.textContent = `${selectedRandomCount}点`;
            } else if (currentMode === 'specific') {
                const secIdx = parseInt(els.sectionSelect.value, 10);
                const qCount = masterData[secIdx].questions.length;
                els.totalScore.textContent = `${qCount}点`;
            } else {
                els.totalScore.textContent = `${totalQuestionsCount}点`;
            }
        }

        // --- フォントサイズ適用 (コンテナ内の全問題文に適用) ---
        function applyFontSize() {
            const bodies = document.querySelectorAll('.question-body-text');
            const baseClasses = "text-gray-800 leading-loose break-words question-body-text";
            bodies.forEach(body => {
                body.className = `${fontSizeClasses[currentFontSizeLevel]} ${baseClasses}`;
            });
        }

        // --- テスト開始処理 ---
        function startTest() {
            generateTestStructure();

            screens.start.classList.add('hidden');
            screens.test.classList.remove('hidden');
            screens.test.classList.add('flex');

            currentSectionIndex = 0;
            renderSection(currentSectionIndex);
            updateNavigations();
        }

        // --- 問題データの生成 (モードに応じたactiveSectionsの構築) ---
        function generateTestStructure() {
            activeSections = [];
            userAnswers = [];

            if (currentMode === 'sequential') {
                // 順番モード：masterDataをそのまま使う
                activeSections = JSON.parse(JSON.stringify(masterData));
            } else if (currentMode === 'specific') {
                // 指定項目モード：選ばれたセクションのみを抽出
                const secIdx = parseInt(els.sectionSelect.value, 10);
                activeSections.push(JSON.parse(JSON.stringify(masterData[secIdx])));
            } else if (currentMode === 'random') {
                // ランダムモード：全小問から指定数を抽出し、1つのセクションにまとめる
                let allQuestions = [];
                masterData.forEach(sec => {
                    allQuestions = allQuestions.concat(sec.questions);
                });
                
                // シャッフルして抽出
                allQuestions.sort(() => Math.random() - 0.5);
                const targetQuestions = allQuestions.slice(0, selectedRandomCount);
                
                // 表示用のIDを振り直す
                targetQuestions.forEach((q, idx) => {
                    q.id = `R-${idx + 1}`;
                });

                activeSections.push({
                    sectionId: "R",
                    sectionTitle: `ランダム出題（${selectedRandomCount}問）`,
                    questions: targetQuestions
                });
            }

            // userAnswers 配列の初期化
            activeSections.forEach((sec, sIdx) => {
                userAnswers[sIdx] = [];
                sec.questions.forEach((q, qIdx) => {
                    userAnswers[sIdx][qIdx] = new Array(q.blanks.length).fill("");
                });
            });
        }

        // --- セクションの描画 (縦に小問を並べる) ---
        function renderSection(sectionIndex) {
            const section = activeSections[sectionIndex];
            
            // ヘッダータイトルの更新
            let prefix = "";
            if (currentMode === 'sequential') {
                prefix = `【大問 ${sectionIndex + 1}】`;
            } else if (currentMode === 'specific') {
                prefix = `【選択項目】`;
            }
            els.headerSectionTitle.textContent = prefix + section.sectionTitle;
            
            els.questionsContainer.innerHTML = ''; // クリア

            // セクション内の各小問を生成
            section.questions.forEach((q, qIdx) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'border border-gray-300 rounded mb-6 bg-white overflow-hidden shadow-sm';
                
                // 小問タイトル
                const header = document.createElement('div');
                header.className = 'bg-[#f8fafc] border-b border-gray-300 p-3 font-bold text-gray-800 text-sm md:text-base flex justify-between';
                header.innerHTML = `<span>【問題 ${q.id}】</span><span class="text-xs font-normal text-gray-500">配点: 1点</span>`;
                qDiv.appendChild(header);

                // 小問ボディ
                const body = document.createElement('div');
                body.className = 'p-4 md:p-6';
                
                const inst = document.createElement('p');
                inst.className = 'text-sm text-gray-500 font-medium mb-3 border-l-4 border-[#005b82] pl-2';
                inst.textContent = '文中の空欄に当てはまる最も適切な語句を選択してください。';
                body.appendChild(inst);

                const textContainer = document.createElement('div');
                textContainer.className = 'question-body-text text-gray-800 leading-loose break-words';
                
                // XSS対策とプレースホルダー置換
                let safeText = q.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const parts = safeText.split(/\{(\d+)\}/);

                parts.forEach(part => {
                    if (/^\d+$/.test(part)) {
                        const blankIndex = parseInt(part, 10);
                        const blankData = q.blanks[blankIndex];

                        if (blankData) {
                            const select = document.createElement('select');
                            select.className = "inline-blank-select";
                            
                            const defaultOpt = document.createElement('option');
                            defaultOpt.value = "";
                            defaultOpt.textContent = "▼ 選択";
                            defaultOpt.disabled = true;
                            if (!userAnswers[sectionIndex][qIdx][blankIndex]) defaultOpt.selected = true;
                            select.appendChild(defaultOpt);

                            blankData.options.forEach(optText => {
                                const opt = document.createElement('option');
                                opt.value = optText;
                                opt.textContent = optText;
                                if (userAnswers[sectionIndex][qIdx][blankIndex] === optText) {
                                    opt.selected = true;
                                }
                                select.appendChild(opt);
                            });

                            if (userAnswers[sectionIndex][qIdx][blankIndex]) {
                                select.classList.add('answered');
                            }

                            select.addEventListener('change', (e) => {
                                userAnswers[sectionIndex][qIdx][blankIndex] = e.target.value;
                                if (e.target.value) {
                                    select.classList.add('answered');
                                } else {
                                    select.classList.remove('answered');
                                }
                                updateNavigations();
                            });

                            textContainer.appendChild(select);
                        }
                    } else {
                        if (part.length > 0) {
                            const span = document.createElement('span');
                            span.innerHTML = part.replace(/\n/g, '<br>');
                            textContainer.appendChild(span);
                        }
                    }
                });

                body.appendChild(textContainer);
                qDiv.appendChild(body);
                els.questionsContainer.appendChild(qDiv);
            });

            applyFontSize();
            
            // 進捗とボタンの表示制御
            els.sectionProgress.textContent = `${sectionIndex + 1} / ${activeSections.length}`;

            els.prevBtn.disabled = sectionIndex === 0;
            if (sectionIndex === activeSections.length - 1) {
                els.nextBtn.classList.add('hidden');
                els.submitConfirmBtn.classList.remove('hidden');
            } else {
                els.nextBtn.classList.remove('hidden');
                els.submitConfirmBtn.classList.add('hidden');
            }
            
            // スクロールをトップに戻す
            window.scrollTo(0, 0);
        }

        function navigateSection(step) {
            const newIndex = currentSectionIndex + step;
            if (newIndex >= 0 && newIndex < activeSections.length) {
                currentSectionIndex = newIndex;
                renderSection(currentSectionIndex);
                updateNavigations(); 
            }
        }

        // --- UIの更新 ---
        function updateNavigations() {
            updateSidebarList();
            updateDrawerList();
        }

        // セクション内の「すべての小問のすべての空欄」が埋まっているかチェック
        function isSectionFullyAnswered(sectionIndex) {
            const sectionAnswers = userAnswers[sectionIndex];
            return sectionAnswers.every(qAns => qAns.every(ans => ans !== ""));
        }

        function updateSidebarList() {
            els.desktopSidebar.innerHTML = '';
            activeSections.forEach((sec, idx) => {
                const button = document.createElement('button');
                const isActive = idx === currentSectionIndex;
                const isAnswered = isSectionFullyAnswered(idx);
                
                let baseClass = "text-left px-3 py-3 rounded font-medium transition border text-sm shadow-sm relative w-full mb-2 ";
                
                if (isActive) {
                    baseClass += "bg-[#bfdbfe] text-black border-[#93c5fd]"; 
                } else if (isAnswered) {
                    baseClass += "bg-[#f1f5f9] text-gray-600 border-[#cbd5e1] border-l-4 border-l-[#005b82]";
                } else {
                    baseClass += "bg-white text-gray-700 border-[#cbd5e1] hover:bg-gray-50";
                }
                
                button.className = baseClass;
                let titleText = "";
                if (currentMode === 'sequential') {
                    titleText = `【大問${idx + 1}】<br><span class="text-xs font-normal">${sec.sectionTitle.substring(0, 10)}...</span>`;
                } else if (currentMode === 'specific') {
                    titleText = `【選択項目】<br><span class="text-xs font-normal">${sec.sectionTitle.substring(0, 10)}...</span>`;
                } else {
                    titleText = sec.sectionTitle;
                }
                button.innerHTML = titleText;
                
                button.addEventListener('click', () => {
                    currentSectionIndex = idx;
                    renderSection(currentSectionIndex);
                    updateNavigations();
                });
                
                els.desktopSidebar.appendChild(button);
            });
        }

        function updateDrawerList() {
            els.drawerList.innerHTML = '';
            activeSections.forEach((sec, idx) => {
                const li = document.createElement('li');
                const isActive = idx === currentSectionIndex;
                const isAnswered = isSectionFullyAnswered(idx);
                
                let baseClass = "p-3 mb-2 rounded cursor-pointer transition text-sm border ";
                if (isActive) {
                    baseClass += "bg-[#bfdbfe] font-bold text-black border-[#93c5fd]";
                } else if (isAnswered) {
                    baseClass += "bg-[#f1f5f9] text-gray-600 border-[#cbd5e1] border-l-4 border-l-[#005b82]";
                } else {
                    baseClass += "bg-white text-gray-700 border-[#cbd5e1] hover:bg-gray-50";
                }

                li.className = baseClass;
                let titleText = "";
                if (currentMode === 'sequential') {
                    titleText = `【大問${idx + 1}】 ${sec.sectionTitle.substring(0, 15)}...`;
                } else if (currentMode === 'specific') {
                    titleText = `【選択項目】 ${sec.sectionTitle.substring(0, 15)}...`;
                } else {
                    titleText = sec.sectionTitle;
                }
                li.innerHTML = titleText;
                
                li.addEventListener('click', () => {
                    currentSectionIndex = idx;
                    renderSection(currentSectionIndex);
                    closeDrawer(); 
                    updateNavigations();
                });
                
                els.drawerList.appendChild(li);
            });
        }

        function openDrawer() {
            els.drawerMenu.classList.remove('-translate-x-full');
            els.drawerOverlay.classList.remove('hidden');
        }

        function closeDrawer() {
            els.drawerMenu.classList.add('-translate-x-full');
            els.drawerOverlay.classList.add('hidden');
        }

        // --- テスト終了・採点処理 ---
        function finishTest() {
            let totalCorrectCount = 0;
            let totalQuestionCount = 0;
            els.resultDetails.innerHTML = '';

            activeSections.forEach((sec, sIdx) => {
                // セクション見出しの作成
                const secHeader = document.createElement('h3');
                secHeader.className = 'font-bold text-[#005b82] text-base md:text-lg border-b border-[#005b82] pb-1 mt-4 mb-3';
                
                let titleText = "";
                if (currentMode === 'sequential') {
                    titleText = `【大問 ${sIdx + 1}】 ${sec.sectionTitle}`;
                } else if (currentMode === 'specific') {
                    titleText = `【選択項目】 ${sec.sectionTitle}`;
                } else {
                    titleText = '採点結果';
                }
                secHeader.textContent = titleText;
                els.resultDetails.appendChild(secHeader);

                sec.questions.forEach((q, qIdx) => {
                    totalQuestionCount++;
                    let isAllCorrect = true;
                    const blanksHtml = [];

                    q.blanks.forEach((blank, bIdx) => {
                        const userAnswer = userAnswers[sIdx][qIdx][bIdx];
                        const isBlankCorrect = userAnswer === blank.correctAnswer;
                        if (!isBlankCorrect) isAllCorrect = false;

                        const mark = isBlankCorrect 
                            ? `<span class="text-green-600 font-bold">○</span>` 
                            : `<span class="text-red-600 font-bold">×</span>`;
                        
                        const uAnsText = userAnswer ? userAnswer : '<span class="text-gray-400">未解答</span>';
                        const answerStyle = isBlankCorrect ? 'text-green-700' : 'text-red-600';

                        blanksHtml.push(`
                            <div class="flex items-center gap-2 mb-1 pb-1 border-b border-gray-100 last:border-0 last:pb-0 last:mb-0">
                                <div class="w-6 text-center">${mark}</div>
                                <div class="text-[11px] md:text-xs text-gray-500 w-12 shrink-0">空欄${bIdx + 1}:</div>
                                <div class="flex-1 flex flex-col md:flex-row md:items-center gap-1 md:gap-4 text-xs md:text-sm">
                                    <div class="w-full md:w-1/2 break-words">あなたの解答: <span class="font-bold ${answerStyle}">${uAnsText}</span></div>
                                    <div class="w-full md:w-1/2 break-words text-gray-600">正解: <span class="font-bold text-[#005b82]">${blank.correctAnswer}</span></div>
                                </div>
                            </div>
                        `);
                    });

                    if (isAllCorrect) totalCorrectCount++;

                    const resultCard = document.createElement('div');
                    resultCard.className = `p-3 md:p-4 rounded border-l-4 ${isAllCorrect ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'} shadow-sm mb-4`;
                    
                    const icon = isAllCorrect 
                        ? `<span class="text-green-600 font-bold text-sm md:text-base">1点 / 完全正解</span>` 
                        : `<span class="text-red-600 font-bold text-sm md:text-base">0点 / 不正解</span>`;

                    // 問題文の表示 (正解を埋め込んだ状態で見せる)
                    let correctHtmlText = q.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    q.blanks.forEach((blank, bIdx) => {
                        const regex = new RegExp(`\\{${bIdx}\\}`, 'g');
                        correctHtmlText = correctHtmlText.replace(regex, `<span class="font-bold text-[#005b82] border-b border-[#005b82] mx-1">${blank.correctAnswer}</span>`);
                    });
                    correctHtmlText = correctHtmlText.replace(/\n/g, '<br>');

                    const explanationHtml = q.explanation 
                        ? `<div class="mt-3 p-2.5 bg-white border border-gray-200 rounded text-xs md:text-sm text-gray-700 leading-relaxed"><span class="font-bold text-gray-600 block mb-1">【解説】</span>${q.explanation.replace(/\n/g, '<br>')}</div>` 
                        : '';

                    resultCard.innerHTML = `
                        <div class="flex justify-between items-center mb-2 border-b border-gray-200 pb-2">
                            <h4 class="font-bold text-gray-800 text-sm md:text-base">問題 ${q.id}</h4>
                            ${icon}
                        </div>
                        <div class="text-xs md:text-sm text-gray-700 bg-white p-3 rounded border border-gray-200 mb-3 leading-relaxed break-words">
                            ${correctHtmlText}
                        </div>
                        <div class="bg-white p-2 md:p-3 rounded border border-gray-200 shadow-sm">
                            ${blanksHtml.join('')}
                        </div>
                        ${explanationHtml}
                    `;
                    els.resultDetails.appendChild(resultCard);
                });
            });

            els.scoreDisplay.textContent = `${totalCorrectCount} / ${totalQuestionCount}`;
            
            screens.test.classList.add('hidden');
            screens.test.classList.remove('flex');
            screens.result.classList.remove('hidden');
            
            window.scrollTo(0, 0);
        }

        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
