    <script>
        lucide.createIcons();

        // --- サイドバー制御 ---
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        const toggleSidebar = () => {
            const isActive = sidebar.classList.contains('active');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            menuToggle.innerHTML = isActive ? '<i data-lucide="menu"></i>' : '<i data-lucide="x"></i>';
            lucide.createIcons();
            document.body.style.overflow = isActive ? '' : 'hidden';
        };

        if (menuToggle) menuToggle.addEventListener('click', toggleSidebar);
        if (overlay) overlay.addEventListener('click', toggleSidebar);

        // --- 問題データ（全20問・形式混合） ---
        const quizData = [
            {
                type: "四肢択一",
                question: "古代の土地制度について、743年に出された法令で、開墾した土地の永久私有を認めたものはどれか。",
                options: ["班田収授法", "三世一身法", "墾田永年私財法", "延喜の荘園整理令"],
                correct: 2,
                explanation: "743年に出された墾田永年私財法により、開墾地の永久私有が認められ、貴族や寺社による初期荘園の形成が進みました。"
            },
            {
                type: "穴埋め",
                question: "古代の税制で、絹・糸・綿などの特産物を納める税を【　　　】という。",
                options: ["租", "庸", "調", "雑徭"],
                correct: 2,
                explanation: "「調（ちょう）」は繊維製品などの特産物を納める税です。「租」は収穫の約3%の稲、「庸」は労役の代わりに布を納める税でした。"
            },
            {
                type: "正誤問題",
                question: "平安時代中期以降、国司から田地の耕作を請け負った有力な農民を「田堵（たと）」と呼んだ。",
                options: ["正しい", "誤り"],
                correct: 0,
                explanation: "正しい記述です。国衙領において、国司（受領）から名田（みょうでん）の耕作を請け負い、年貢などを納入した有力農民を田堵（たと）または負名（ふみょう）と呼びました。"
            },
            {
                type: "四肢択一",
                question: "豊臣秀吉が行った太閤検地に関する説明として誤っているものはどれか。",
                options: [
                    "土地の生産力を石高（玄米の量）で表した。",
                    "面積の単位を1段＝360歩とした。",
                    "検地帳に登録された農民に土地の耕作権と年貢負担の義務を負わせた。",
                    "全国で統一された枡（京升）を用いた。"
                ],
                correct: 1,
                explanation: "古代（律令制）では1段＝360歩でしたが、太閤検地では「1段＝300歩、1町＝10段」と改められました。一地一作人の原則や石高制は太閤検地の大きな特徴です。"
            },
            {
                type: "穴埋め",
                question: "江戸幕府は、本百姓の没落を防ぐため、1643年に【　　　】の禁令を出した。",
                options: ["分地制限令", "田畑勝手作", "田畑永代売買", "宗門人別改"],
                correct: 2,
                explanation: "富農への土地集中と本百姓の没落（小作人化）を防ぐため、1643年に田畑永代売買の禁令が出されました。"
            },
            {
                type: "四肢択一",
                question: "1873年（明治6年）に公布された地租改正条例で定められた税率は、地価の何％か。",
                options: ["1%", "2.5%", "3%", "5%"],
                correct: 2,
                explanation: "当初の税率は地価の3%でしたが、農民の激しい反対一揆（地租改正反対一揆）を受け、1877年に2.5%に引き下げられました。"
            },
            {
                type: "正誤問題",
                question: "地租改正によって、年貢はそれまでの収穫量に応じた現物納から、地価を基準とした金納へと変わった。",
                options: ["正しい", "誤り"],
                correct: 0,
                explanation: "正しい記述です。地租改正により、地価を課税標準とし、土地所有者（地券交付者）が金納で納める近代的税制が確立しました。"
            },
            {
                type: "穴埋め",
                question: "708年に鋳造された、日本で最初の流通貨幣とされるものは【　　　】である。",
                options: ["皇朝十二銭", "永楽通宝", "和同開珎", "寛永通宝"],
                correct: 2,
                explanation: "708年（和銅元年）に唐の開元通宝をモデルにして鋳造された和同開珎が、最初の流通貨幣とされています（最古の貨幣としては富本銭が見つかっています）。"
            },
            {
                type: "四肢択一",
                question: "中世の金融業者で、質物を担保に高利貸しを行った京都の業者は主に何と呼ばれたか。",
                options: ["借上", "土倉", "両替商", "蔵元"],
                correct: 1,
                explanation: "鎌倉時代には借上（かしあげ）と呼ばれましたが、室町時代には土蔵を構えて質物を保管したことから「土倉（どそう）」と呼ばれ、酒屋とともに幕府の重要な財源（土倉役・酒屋役）となりました。"
            },
            {
                type: "正誤問題",
                question: "鎌倉時代から室町時代にかけて、宋や明から輸入された銅銭が広く流通した。",
                options: ["正しい", "誤り"],
                correct: 0,
                explanation: "正しい記述です。日本では長く貨幣が鋳造されず、日宋貿易や日明貿易で輸入された宋銭（太平通宝など）や明銭（永楽通宝など）が全国に流通しました。"
            },
            {
                type: "穴埋め",
                question: "室町時代後期、流通する銭貨の中に悪銭が混じるようになり、取引で悪銭を嫌う「撰銭（えりぜに）」が行われたため、幕府や大名はこれを禁じる【　　　】を出した。",
                options: ["撰銭令", "徳政令", "棄捐令", "相対済令"],
                correct: 0,
                explanation: "撰銭による流通の混乱を防ぐため、幕府や戦国大名は一定の悪銭の混入割合を定めるなどした撰銭令を出しました。"
            },
            {
                type: "四肢択一",
                question: "江戸時代の三貨制度において、基本となる3つの貨幣の組み合わせとして正しいものはどれか。",
                options: ["金・銀・銅", "金・銀・銭", "金・銅・銭", "銀・銅・銭"],
                correct: 1,
                explanation: "江戸幕府は、金（計数貨幣）、銀（秤量貨幣）、銭（銅や鉄などの計数貨幣）からなる三貨制度を確立しました。"
            },
            {
                type: "穴埋め",
                question: "1871年（明治4年）に制定された【　　　】により、貨幣の単位が「円・銭・厘」となり、十進法が採用された。",
                options: ["新貨条例", "国立銀行条例", "日本銀行条例", "貨幣法"],
                correct: 0,
                explanation: "新貨条例により、円・銭・厘（1円＝100銭＝1000厘）の十進法による新しい統一通貨制度が定められました。"
            },
            {
                type: "四肢択一",
                question: "1882年に松方正義によって設立され、日本で唯一の紙幣発行権を持つ中央銀行となったのはどれか。",
                options: ["第一国立銀行", "日本勧業銀行", "日本銀行", "横浜正金銀行"],
                correct: 2,
                explanation: "不換紙幣の整理と通貨価値の安定のため、1882年に中央銀行として日本銀行が設立され、1885年から兌換銀行券（日本銀行券）を発行しました。"
            },
            {
                type: "正誤問題",
                question: "鎌倉時代、定期的に開かれる市場（定期市）は月に6回開かれる「六斎市」が一般的であった。",
                options: ["正しい", "誤り"],
                correct: 1,
                explanation: "誤りです。鎌倉時代の定期市は月に3回開かれる「三斎市」が一般的でした。室町時代になって月に6回開かれる「六斎市」が普及しました。"
            },
            {
                type: "四肢択一",
                question: "江戸時代、同業の商人や職人が結成し、幕府に運上や冥加を納めることで独占的な営業権を認められた組合を何というか。",
                options: ["座", "株仲間", "問屋", "組合"],
                correct: 1,
                explanation: "中世の「座」に代わり、江戸時代には「株仲間」が結成されました。田沼意次時代に積極的に公認・奨励され、幕府の財源となりましたが、天保の改革で一時解散させられました。"
            },
            {
                type: "穴埋め",
                question: "江戸時代、菱垣廻船や【　　　】などの定期船が、大坂と江戸を結んで大量の物資を輸送した。",
                options: ["樽廻船", "北前船", "南海廻船", "朱印船"],
                correct: 0,
                explanation: "大坂と江戸を結ぶ航路（南海路）では、日用品を運ぶ菱垣廻船や、酒荷などを早く運ぶ樽廻船が活躍しました。"
            },
            {
                type: "四肢択一",
                question: "明治時代に発展した産業で、官営模範工場である富岡製糸場などが建設され、日本の主要な輸出品となったのはどれか。",
                options: ["綿紡績業", "製糸業 (生糸)", "製鉄業", "造船業"],
                correct: 1,
                explanation: "生糸（製糸業）は、明治時代から昭和初期にかけて日本の最大の輸出品であり、外貨獲得に大きく貢献しました。"
            },
            {
                type: "正誤問題",
                question: "1901年に操業を開始した官営の八幡製鉄所は、日清戦争の賠償金の一部を用いて建設された。",
                options: ["正しい", "誤り"],
                correct: 0,
                explanation: "正しい記述です。日清戦争の賠償金を資金源として福岡県に建設され、日本の重工業（鉄鋼業）発展の基礎となりました。"
            },
            {
                type: "四肢択一",
                question: "江戸時代、日本海沿岸から下関を回り、瀬戸内海を経て大坂に至る航路を何と呼ぶか。",
                options: ["東廻り海運", "西廻り海運", "北前船航路", "南海航路"],
                correct: 1,
                explanation: "河村瑞賢によって整備された西廻り海運です。なお、日本海沿岸から津軽海峡を回り、太平洋岸を通って江戸に至るのが東廻り海運です。"
            }
        ];

        // --- エンドレス復習モード用 状態管理変数 ---
        let totalQuestions = quizData.length;
        let activeQueue = []; // 現在出題する問題のインデックス配列
        let nextQueue = [];   // 間違えて次回（復習）に回すインデックス配列
        let queueIndex = 0;   // activeQueue内の現在の位置
        
        let attempts = [];    // 各問題の挑戦回数（0なら初見）
        let firstPassScore = 0; // 1回目で正解した数
        let isAnswered = false;

        const appDiv = document.getElementById('quiz-app-container');

        // クイズ初期化（ロード時に直接開始）
        function startQuiz() {
            activeQueue = quizData.map((_, i) => i);
            nextQueue = [];
            queueIndex = 0;
            firstPassScore = 0;
            attempts = new Array(totalQuestions).fill(0);
            renderQuestionScreen();
        }

        // 1. 問題画面の描画
        function renderQuestionScreen() {
            isAnswered = false;
            const qIndex = activeQueue[queueIndex];
            const q = quizData[qIndex];
            const isReview = attempts[qIndex] > 0; // 2回目以降なら復習モード

            // 進行度の計算 (残り何問正解すれば完全クリアか)
            const remaining = (activeQueue.length - queueIndex) + nextQueue.length;
            const progress = ((totalQuestions - remaining) / totalQuestions) * 100;

            let optionsHtml = '';
            q.options.forEach((opt, index) => {
                optionsHtml += `
                    <button onclick="checkAnswer(${index})" id="opt-${index}" class="quiz-option-btn">
                        <span class="option-label">${index + 1}</span>
                        <span class="option-text">${opt}</span>
                        <span class="option-icon" id="opt-icon-${index}"></span>
                    </button>
                `;
            });

            let imageHtml = '';
            if (q.imageUrl) {
                imageHtml = `
                    <div class="quiz-image-box">
                        <i data-lucide="map" style="width: 24px; height: 24px; margin-bottom: 4px;"></i>
                        <span style="font-weight: bold;">${q.imageUrl}</span>
                    </div>
                `;
            }

            // ヘッダーテキストの出し分け（初見か復習か）
            const headerText = isReview 
                ? `<span class="text-red-500 mr-2 flex items-center gap-1"><i data-lucide="refresh-cw" style="width: 16px; height: 16px;"></i>復習モード</span>` 
                : `問題 ${queueIndex + 1} / ${totalQuestions}`;
            const subHeaderText = isReview ? `<span class="text-slate-400 text-sm font-normal">（残り ${remaining} 問）</span>` : ``;

            appDiv.innerHTML = `
                <div class="quiz-container">
                    <div class="quiz-header">
                        <div class="quiz-title-text">
                            ${!isReview ? `<i data-lucide="file-question" style="width: 18px; height: 18px;"></i>` : ''}
                            ${headerText} ${subHeaderText}
                        </div>
                        <div class="quiz-score">
                            初回スコア: ${firstPassScore}
                        </div>
                    </div>
                    <div class="quiz-progress-bar">
                        <div class="quiz-progress-fill" style="width: ${progress}%"></div>
                    </div>
                    <div class="quiz-body">
                        <div><span class="quiz-question-type">${q.type}</span></div>
                        <h3 class="quiz-question">${q.question}</h3>
                        ${imageHtml}
                        <div class="quiz-options">
                            ${optionsHtml}
                        </div>
                        <div id="explanation-box" class="quiz-explanation">
                            <!-- 解説がここに表示されます -->
                        </div>
                        <button onclick="nextQuestion()" id="next-btn" class="quiz-next-btn">
                            次の問題へ <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
                        </button>
                    </div>
                </div>
            `;
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 2. 答え合わせ
        function checkAnswer(selectedIndex) {
            if (isAnswered) return;
            isAnswered = true;

            const qIndex = activeQueue[queueIndex];
            const q = quizData[qIndex];
            const isCorrect = selectedIndex === q.correct;

            // 初回正解時のみスコア加算
            if (attempts[qIndex] === 0 && isCorrect) {
                firstPassScore++;
            }
            
            // 挑戦回数を増やす
            attempts[qIndex]++;

            // 間違えた場合は、復習キューに追加
            if (!isCorrect) {
                nextQueue.push(qIndex);
            }

            // 選択肢のUI更新
            for (let i = 0; i < q.options.length; i++) {
                const btn = document.getElementById(`opt-${i}`);
                const icon = document.getElementById(`opt-icon-${i}`);
                btn.disabled = true;
                
                if (i === q.correct) {
                    btn.classList.add('correct');
                    icon.innerHTML = '<i data-lucide="check-circle" style="width: 20px; height: 20px;"></i>';
                } else if (i === selectedIndex && !isCorrect) {
                    btn.classList.add('wrong');
                    icon.innerHTML = '<i data-lucide="x-circle" style="width: 20px; height: 20px;"></i>';
                } else {
                    btn.classList.add('disabled-fade');
                }
            }

            // スコアの更新
            document.querySelector('.quiz-score').innerText = `初回スコア: ${firstPassScore}`;

            // 解説ボックスの表示
            const expBox = document.getElementById('explanation-box');
            expBox.classList.add('show');
            if (isCorrect) {
                expBox.classList.add('correct-exp');
                expBox.innerHTML = `
                    <div class="exp-title"><i data-lucide="check-circle-2" style="width: 20px; height: 20px;"></i> 正解！</div>
                    <p>${q.explanation}</p>
                `;
            } else {
                expBox.classList.add('wrong-exp');
                expBox.innerHTML = `
                    <div class="exp-title"><i data-lucide="alert-circle" style="width: 20px; height: 20px;"></i> 不正解...</div>
                    <p style="margin-bottom: 8px;"><strong>正解は「${q.options[q.correct]}」です。</strong></p>
                    <p>${q.explanation}</p>
                `;
            }

            // ボタンの文言調整（キューの最後で、かつ復習問題がない場合は「結果を見る」）
            const nextBtn = document.getElementById('next-btn');
            if (queueIndex >= activeQueue.length - 1 && nextQueue.length === 0) {
                nextBtn.innerHTML = `結果を見る <i data-lucide="award" style="width: 18px; height: 18px;"></i>`;
            }
            nextBtn.classList.add('show');
            lucide.createIcons();
        }

        // 次の問題へ遷移（エンドレス復習ロジック）
        function nextQuestion() {
            queueIndex++;
            
            // 現在のキューを最後まで解き終わったか？
            if (queueIndex >= activeQueue.length) {
                if (nextQueue.length > 0) {
                    // 間違えた問題がある場合、それを新しいキューとして復習ループ開始
                    activeQueue = [...nextQueue];
                    nextQueue = [];
                    queueIndex = 0;
                    renderQuestionScreen();
                } else {
                    // 間違えた問題がゼロになれば完全クリア！結果画面へ
                    renderResultScreen();
                }
            } else {
                // まだ現在のキューが残っている場合は次へ
                renderQuestionScreen();
            }
        }

        // 3. 結果画面（全問正解完了時）
        function renderResultScreen() {
            const percentage = Math.round((firstPassScore / totalQuestions) * 100);
            let message = '間違えた問題もすべてクリアしました！確実に実力がついています。';
            
            appDiv.innerHTML = `
                <div class="quiz-container">
                    <div class="quiz-progress-bar">
                        <div class="quiz-progress-fill" style="width: 100%"></div>
                    </div>
                    <div class="quiz-center-content">
                        <div class="quiz-icon-large" style="background-color: #fef08a; color: #a16207;">
                            <i data-lucide="award" style="width: 50px; height: 50px;"></i>
                        </div>
                        <h2 class="quiz-main-title">全問クリア達成！</h2>
                        
                        <div class="result-score">${firstPassScore} <span style="font-size: 2rem; color: var(--text-muted);">/ ${totalQuestions}</span></div>
                        <div style="font-size: 1.2rem; color: var(--text-muted); font-weight: bold; margin-bottom: 32px;">初回正答率: ${percentage}%</div>
                        
                        <div style="background: var(--bg-color); padding: 24px; border-radius: 12px; margin-bottom: 40px; max-width: 500px; width: 100%; border: 1px solid var(--border-color);">
                            <p style="font-size: 1.1rem; font-weight: bold; color: var(--text-color);">${message}</p>
                        </div>
                        
                        <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; width: 100%; max-width: 400px;">
                            <button onclick="startQuiz()" class="btn-primary" style="width: 100%; justify-content: center;">
                                <i data-lucide="rotate-ccw" style="width: 20px; height: 20px;"></i> はじめから挑戦する
                            </button>
                            <a href="/n-kyozai/index.html" class="btn-secondary" style="width: 100%; justify-content: center;">
                                <i data-lucide="home" style="width: 20px; height: 20px;"></i> ホームへ戻る
                            </a>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ロードと同時に開始
        startQuiz();
    </script>
</body>
</html>
