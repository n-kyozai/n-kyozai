            ]
        };

        // 全体通し番号用のカウンター
        let globalCounter = 1;

        // 目次HTMLを生成してDOMに挿入する関数
        function renderContent(tabId, dataArray) {
            const container = document.getElementById(tabId);
            let html = '';

            dataArray.forEach(chapter => {
                let itemsHtml = chapter.items.map(item => {
                    let currentNumber = null;
                    let numHtml = '';

                    // 連番の生成（hideNumber: true の場合は振らない）
                    if (!item.hideNumber) {
                        currentNumber = globalCounter;
                        numHtml = `<span class="item-number">${String(currentNumber).padStart(3, '0')}</span>`;
                        globalCounter++;
                    }

                    // 公開状態の判定
                    // item.isPublished が明示的に true の場合（外部リンク等）は公開
                    // それ以外は、publishedItemNumbers 配列に現在の連番が含まれているかで判定
                    const isItemPublished = item.isPublished || (currentNumber !== null && publishedItemNumbers.includes(currentNumber));

                    // クラスとURLの設定（非公開ならdisabledクラス付与）
                    const disabledClass = isItemPublished ? "" : "disabled";
                    const targetUrl = isItemPublished ? item.url : "javascript:void(0)";
                    const targetAttr = (isItemPublished && item.isExternal) ? 'target="_blank" rel="noopener noreferrer"' : '';
                    const badgeHtml = isItemPublished ? '' : '<span class="status-badge">準備中</span>';
                    
                    return `
                        <a href="${targetUrl}" class="list-item ${disabledClass}" ${targetAttr}>
                            ${numHtml}
                            <span class="item-title">${item.title}</span>
                            ${badgeHtml}
                        </a>
                    `;
                }).join('');

                html += `
                    <div class="chapter-block">
                        <div class="chapter-header">${chapter.chapter}</div>
                        <div class="items-grid">
                            ${itemsHtml}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // 初期描画
        renderContent('systematic', geographyData.systematic);
        renderContent('regional', geographyData.regional);
        renderContent('links', geographyData.links);

        // タブ切り替え制御
        function switchTab(tabId) {
            // ボタンのアクティブ状態切り替え
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // コンテンツのアクティブ状態切り替え
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        // サイドバー制御（モバイル用）
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        const toggleSidebar = () => {
            const isActive = sidebar.classList.contains('active');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            menuToggle.innerHTML = isActive ? '<i data-lucide="menu"></i>' : '<i data-lucide="x"></i>';
            lucide.createIcons();
            document.body.style.overflow = isActive ? '' : 'hidden';
        };

        if(menuToggle) menuToggle.addEventListener('click', toggleSidebar);
        if(overlay) overlay.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
