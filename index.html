        body {

        .card-container {

            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
            text-decoration: none;
            color: var(--primary-color);
            font-weight: bold;
            transition: transform 0.2s;
        }
        .card:hover {
