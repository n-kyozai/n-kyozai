    <script>
        lucide.createIcons();

        // --- サイドバー制御 ---
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        const toggleSidebar = () => {
            const isActive = sidebar.classList.contains('active');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            menuToggle.innerHTML = isActive ? '<i data-lucide="menu"></i>' : '<i data-lucide="x"></i>';
            lucide.createIcons();
            document.body.style.overflow = isActive ? '' : 'hidden';
        };

        if (menuToggle) menuToggle.addEventListener('click', toggleSidebar);
        if (overlay) overlay.addEventListener('click', toggleSidebar);

        // --- 問題データ（全20問・形式混合） ---
        const quizData = [
            {
                type: "穴埋め",
                question: "大宝律令（701年）により、全国は畿内と七道からなる【　　　】に分けられ、地方行政機構が整備された。",
                options: ["国・郡・里", "五畿七道", "大区・小区", "廃藩置県"],
                correct: 1,
                explanation: "律令制下では、全国を五畿（畿内）と七道（東海道・東山道・北陸道・山陰道・山陽道・南海道・西海道）に区分しました。"
            },
            {
                type: "四肢択一",
                question: "律令制下の地方行政において、中央の貴族が赴任して地方行政を統括した「国」の長官を何と呼んだか。",
                options: ["国造", "郡司", "国司", "里長"],
                correct: 2,
                explanation: "国司は中央から派遣された官人（任期あり）で、地方行政の最高責任者でした。一方、郡司は旧国造などの在地首長が世襲で任じられました。"
            },
            {
                type: "正誤問題",
                question: "『日本書紀』の「改新の詔」には「初めて国司・郡司を置いた」とあるが、藤原京から出土した木簡などにより、大宝令以前は「郡」ではなく「評（こおり）」であったことが判明している。",
                options: ["正しい", "誤り"],
                correct: 0,
                explanation: "正しい記述です。これを「郡評論争」といい、7世紀後半の金石文や木簡にはすべて「評」の文字が使われており、『日本書紀』の編纂者が大宝令以降の制度に合わせて書き換えたことが分かっています。"
            },
            {
                type: "四肢択一",
                question: "律令期の特別行政機関のうち、外交や防衛、西海道（九州）諸国の統轄を担当し、「遠の朝廷（とおのみかど）」と呼ばれたのはどこか。",
                options: ["京職", "摂津職", "大宰府", "鎮守府"],
                correct: 2,
                explanation: "大宰府は九州の軍事・外交・行政を統括する重要な出先機関であり、「遠の朝廷」と呼ばれました。長官は帥（そち）です。"
            },
            {
                type: "四肢択一",
                question: "室町時代、東国を統治するために設置された最重要の地方行政機関はどれか。",
                options: ["六波羅探題", "奥州総奉行", "鎌倉府", "京都所司代"],
                correct: 2,
                explanation: "室町幕府は京都に置かれたため、東国を支配する機関として鎌倉府を設け、足利尊氏の四男である基氏を初代鎌倉公方としました。"
            },
            {
                type: "穴埋め",
                question: "江戸幕府の地方行政の中心であり、朝廷や公家の監視と西国大名の統制を行った役職は【　　　】である。",
                options: ["大坂城代", "京都所司代", "遠国奉行", "六波羅探題"],
                correct: 1,
                explanation: "京都所司代は、豊臣政権期の五奉行・前田玄以の役割を継承し、江戸幕府の西国支配の要として機能しました。"
            },
            {
                type: "四肢択一",
                question: "1878年（明治11年）、大久保利通暗殺後に地方統治を安定させるために制定された「三新法」に含まれないものはどれか。",
                options: ["郡区町村編制法", "府県会規則", "地方税規則", "市制・町村制"],
                correct: 3,
                explanation: "市制・町村制は、のちの1888年に山県有朋らがドイツ人モッセの助言を受けて制定した地方自治制の法律です。三新法は他の3つを指します。"
            },
            {
                type: "正誤問題",
                question: "1947年に制定された「地方自治法」により、都道府県知事や市町村長は住民による直接選挙（公選制）で選ばれるようになった。",
                options: ["正しい", "誤り"],
                correct: 0,
                explanation: "正しい記述です。戦前の官選（内務省からの派遣）から、日本国憲法の「地方自治の本旨」に基づき、住民の直接選挙による公選制へと改められました。"
            },
            {
                type: "四肢択一",
                question: "北海道の古代文化のうち、本土の弥生文化の時期に該当するが農耕を行わず、漁労や狩猟・採集を基盤とした文化を何というか。",
                options: ["オホーツク文化", "擦文文化", "続縄文文化", "アイヌ文化"],
                correct: 2,
                explanation: "北海道では稲作（弥生文化）が定着せず、縄文文化の生活様式を引き継ぐ「続縄文文化」が展開しました。"
            },
            {
                type: "穴埋め",
                question: "1457年、和人の不当な交易に抗議して蜂起したアイヌの首長は【　　　】である。",
                options: ["シャクシャイン", "コシャマイン", "アテルイ", "ツキノエ"],
                correct: 1,
                explanation: "コシャマインの蜂起は、客将の武田信広（のちの松前氏の祖）によって鎮圧されました。シャクシャインの蜂起は後の1669年です。"
            },
            {
                type: "四肢択一",
                question: "江戸時代初期、松前藩が上級家臣に対し、特定の漁場（商場）でのアイヌとの交易権を知行として与えた制度を何というか。",
                options: ["商場知行制", "場所請負制", "知行国制", "村請制"],
                correct: 0,
                explanation: "松前藩は米がとれないため、土地ではなく「アイヌとの交易権（商場）」を家臣に与える商場知行制（あきないばちぎょうせい）をとりました。"
            },
            {
                type: "四肢択一",
                question: "18世紀後期から19世紀初期にかけて、ロシアの南下などに危機感を抱いた幕府の対応として誤っているものはどれか。",
                options: ["近藤重蔵らが択捉島に「大日本恵登呂府」の標柱を建てた。", "間宮林蔵を探検させ、樺太が島であることを確認した。", "松前藩を陸奥国へ転封し、蝦夷地を幕府の直轄地とした。", "開拓使を設置し、屯田兵制度を導入した。"],
                correct: 3,
                explanation: "開拓使の設置（1869年）や屯田兵制度（1874年）は、明治維新後の近代政府（明治政府）による北海道開拓の施策です。"
            },
            {
                type: "穴埋め",
                question: "明治政府がアイヌの人々から土地や独自の生業を奪い、日本への同化を強制するために1899年に公布した法律は「北海道【　　　】保護法」である。",
                options: ["旧土人", "先住民", "アイヌ", "屯田兵"],
                correct: 0,
                explanation: "北海道旧土人保護法は、アイヌに農業を強制し同化を進めましたが、実質的には貧困と差別を生む結果となり、1997年のアイヌ文化振興法制定まで続きました。"
            },
            {
                type: "四肢択一",
                question: "12世紀頃から沖縄（琉球）の各地に出現した豪族を何と呼ぶか。",
                options: ["按司（あじ）", "祝女（のろ）", "地頭", "国人"],
                correct: 0,
                explanation: "按司（あじ）と呼ばれる豪族が各地にグスク（城・砦）を築いて勢力を争う「グスク時代」を迎えました。"
            },
            {
                type: "正誤問題",
                question: "1429年、中山王の尚巴志が北山・中山・南山の3王朝を統一し、琉球王国を建国した。",
                options: ["正しい", "誤り"],
                correct: 0,
                explanation: "正しい記述です。首里を都とし、那覇を外港として中継貿易（万国の津梁）で大いに繁栄しました。"
            },
            {
                type: "四肢択一",
                question: "1609年、琉球に侵攻して服属させ、以後の日本と中国（明・清）への「両属体制」のきっかけを作った大名家はどこか。",
                options: ["宗氏", "毛利氏", "島津氏（薩摩藩）", "大友氏"],
                correct: 2,
                explanation: "薩摩藩（島津家久）が琉球に出兵し尚寧王を捕らえ、実質的な支配下に置きました。"
            },
            {
                type: "画像問題",
                question: "1609年以降の琉球王国は、江戸幕府に対して将軍の代替わりごとに使節を派遣しました。この使節を何というか。",
                imageUrl: "",
                options: ["朝鮮通信使", "遣唐使", "慶賀使", "冊封使"],
                correct: 2,
                explanation: "将軍の代替わりごとに「慶賀使（けいがし）」を、琉球王の代替わりごとに「謝恩使（しゃおんし）」を江戸へ派遣しました。なお、中国から琉球へ来る使節が「冊封使」です。"
            },
            {
                type: "穴埋め",
                question: "1879年、明治政府が軍隊を派遣して琉球藩を廃止し、沖縄県を設置した一連の強権的な措置を【　　　】という。",
                options: ["台湾出兵", "琉球処分", "廃藩置県", "版籍奉還"],
                correct: 1,
                explanation: "1872年の琉球藩設置から1879年の沖縄県設置に至る、日本への帰属を強制したプロセスを「琉球処分」と呼びます。"
            },
            {
                type: "四肢択一",
                question: "沖縄県の近代化において、明治政府が清国の反発や県民の抵抗を抑えるために、人頭税などの古い制度をそのまま残した政策を何というか。",
                options: ["旧慣温存策", "同化政策", "皇民化教育", "地方自治制"],
                correct: 0,
                explanation: "「旧慣温存策」により、沖縄県は他県に比べて近代的な制度（地租改正や選挙制度など）の導入が大幅に遅れました。"
            },
            {
                type: "四肢択一",
                question: "1969年、日米共同声明を発表し、「1972年、核抜き・本土なみ」の沖縄返還に合意した日本の首相は誰か。",
                options: ["吉田茂", "岸信介", "佐藤栄作", "田中角栄"],
                correct: 2,
                explanation: "佐藤栄作首相とニクソン大統領の会談により合意され、1972年に沖縄の祖国復帰が実現しました（ただし広大な米軍基地は維持されました）。"
            }
        ];

        // --- エンドレス復習モード用 状態管理変数 ---
        let totalQuestions = quizData.length;
        let activeQueue = []; // 現在出題する問題のインデックス配列
        let nextQueue = [];   // 間違えて次回（復習）に回すインデックス配列
        let queueIndex = 0;   // activeQueue内の現在の位置
        
        let attempts = [];    // 各問題の挑戦回数（0なら初見）
        let firstPassScore = 0; // 1回目で正解した数
        let isAnswered = false;

        const appDiv = document.getElementById('quiz-app-container');

        // クイズ初期化（ロード時に直接開始）
        function startQuiz() {
            activeQueue = quizData.map((_, i) => i);
            nextQueue = [];
            queueIndex = 0;
            firstPassScore = 0;
            attempts = new Array(totalQuestions).fill(0);
            renderQuestionScreen();
        }

        // 1. 問題画面の描画
        function renderQuestionScreen() {
            isAnswered = false;
            const qIndex = activeQueue[queueIndex];
            const q = quizData[qIndex];
            const isReview = attempts[qIndex] > 0; // 2回目以降なら復習モード

            // 進行度の計算 (残り何問正解すれば完全クリアか)
            const remaining = (activeQueue.length - queueIndex) + nextQueue.length;
            const progress = ((totalQuestions - remaining) / totalQuestions) * 100;

            let optionsHtml = '';
            q.options.forEach((opt, index) => {
                optionsHtml += `
                    <button onclick="checkAnswer(${index})" id="opt-${index}" class="quiz-option-btn">
                        <span class="option-label">${index + 1}</span>
                        <span class="option-text">${opt}</span>
                        <span class="option-icon" id="opt-icon-${index}"></span>
                    </button>
                `;
            });

            let imageHtml = '';
            if (q.imageUrl) {
                imageHtml = `
                    <div class="quiz-image-box">
                        <i data-lucide="image" style="width: 24px; height: 24px; margin-bottom: 4px;"></i>
                        <span style="font-weight: bold;">${q.imageUrl}</span>
                    </div>
                `;
            }

            // ヘッダーテキストの出し分け（初見か復習か）
            const headerText = isReview 
                ? `<span class="text-red-500 mr-2 flex items-center gap-1"><i data-lucide="refresh-cw" style="width: 16px; height: 16px;"></i>復習モード</span>` 
                : `問題 ${queueIndex + 1} / ${totalQuestions}`;
            const subHeaderText = isReview ? `<span class="text-slate-400 text-sm font-normal">（残り ${remaining} 問）</span>` : ``;

            appDiv.innerHTML = `
                <div class="quiz-container">
                    <div class="quiz-header">
                        <div class="quiz-title-text">
                            ${!isReview ? `<i data-lucide="file-question" style="width: 18px; height: 18px;"></i>` : ''}
                            ${headerText} ${subHeaderText}
                        </div>
                        <div class="quiz-score">
                            初回スコア: ${firstPassScore}
                        </div>
                    </div>
                    <div class="quiz-progress-bar">
                        <div class="quiz-progress-fill" style="width: ${progress}%"></div>
                    </div>
                    <div class="quiz-body">
                        <div><span class="quiz-question-type">${q.type}</span></div>
                        <h3 class="quiz-question">${q.question}</h3>
                        ${imageHtml}
                        <div class="quiz-options">
                            ${optionsHtml}
                        </div>
                        <div id="explanation-box" class="quiz-explanation">
                            <!-- 解説がここに表示されます -->
                        </div>
                        <button onclick="nextQuestion()" id="next-btn" class="quiz-next-btn">
                            次の問題へ <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
                        </button>
                    </div>
                </div>
            `;
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 2. 答え合わせ
        function checkAnswer(selectedIndex) {
            if (isAnswered) return;
            isAnswered = true;

            const qIndex = activeQueue[queueIndex];
            const q = quizData[qIndex];
            const isCorrect = selectedIndex === q.correct;

            // 初回正解時のみスコア加算
            if (attempts[qIndex] === 0 && isCorrect) {
                firstPassScore++;
            }
            
            // 挑戦回数を増やす
            attempts[qIndex]++;

            // 間違えた場合は、復習キューに追加
            if (!isCorrect) {
                nextQueue.push(qIndex);
            }

            // 選択肢のUI更新
            for (let i = 0; i < q.options.length; i++) {
                const btn = document.getElementById(`opt-${i}`);
                const icon = document.getElementById(`opt-icon-${i}`);
                btn.disabled = true;
                
                if (i === q.correct) {
                    btn.classList.add('correct');
                    icon.innerHTML = '<i data-lucide="check-circle" style="width: 20px; height: 20px;"></i>';
                } else if (i === selectedIndex && !isCorrect) {
                    btn.classList.add('wrong');
                    icon.innerHTML = '<i data-lucide="x-circle" style="width: 20px; height: 20px;"></i>';
                } else {
                    btn.classList.add('disabled-fade');
                }
            }

            // スコアの更新
            document.querySelector('.quiz-score').innerText = `初回スコア: ${firstPassScore}`;

            // 解説ボックスの表示
            const expBox = document.getElementById('explanation-box');
            expBox.classList.add('show');
            if (isCorrect) {
                expBox.classList.add('correct-exp');
                expBox.innerHTML = `
                    <div class="exp-title"><i data-lucide="check-circle-2" style="width: 20px; height: 20px;"></i> 正解！</div>
                    <p>${q.explanation}</p>
                `;
            } else {
                expBox.classList.add('wrong-exp');
                expBox.innerHTML = `
                    <div class="exp-title"><i data-lucide="alert-circle" style="width: 20px; height: 20px;"></i> 不正解...</div>
                    <p style="margin-bottom: 8px;"><strong>正解は「${q.options[q.correct]}」です。</strong></p>
                    <p>${q.explanation}</p>
                `;
            }

            // ボタンの文言調整（キューの最後で、かつ復習問題がない場合は「結果を見る」）
            const nextBtn = document.getElementById('next-btn');
            if (queueIndex >= activeQueue.length - 1 && nextQueue.length === 0) {
                nextBtn.innerHTML = `結果を見る <i data-lucide="award" style="width: 18px; height: 18px;"></i>`;
            }
            nextBtn.classList.add('show');
            lucide.createIcons();
        }

        // 次の問題へ遷移（エンドレス復習ロジック）
        function nextQuestion() {
            queueIndex++;
            
            // 現在のキューを最後まで解き終わったか？
            if (queueIndex >= activeQueue.length) {
                if (nextQueue.length > 0) {
                    // 間違えた問題がある場合、それを新しいキューとして復習ループ開始
                    activeQueue = [...nextQueue];
                    nextQueue = [];
                    queueIndex = 0;
                    renderQuestionScreen();
                } else {
                    // 間違えた問題がゼロになれば完全クリア！結果画面へ
                    renderResultScreen();
                }
            } else {
                // まだ現在のキューが残っている場合は次へ
                renderQuestionScreen();
            }
        }

        // 3. 結果画面（全問正解完了時）
        function renderResultScreen() {
            const percentage = Math.round((firstPassScore / totalQuestions) * 100);
            let message = '間違えた問題もすべてクリアしました！確実に実力がついています。';
            
            appDiv.innerHTML = `
                <div class="quiz-container">
                    <div class="quiz-progress-bar">
                        <div class="quiz-progress-fill" style="width: 100%"></div>
                    </div>
                    <div class="quiz-center-content">
                        <div class="quiz-icon-large" style="background-color: #fef08a; color: #a16207;">
                            <i data-lucide="award" style="width: 50px; height: 50px;"></i>
                        </div>
                        <h2 class="quiz-main-title">全問クリア達成！</h2>
                        
                        <div class="result-score">${firstPassScore} <span style="font-size: 2rem; color: var(--text-muted);">/ ${totalQuestions}</span></div>
                        <div style="font-size: 1.2rem; color: var(--text-muted); font-weight: bold; margin-bottom: 32px;">初回正答率: ${percentage}%</div>
                        
                        <div style="background: var(--bg-color); padding: 24px; border-radius: 12px; margin-bottom: 40px; max-width: 500px; width: 100%; border: 1px solid var(--border-color);">
                            <p style="font-size: 1.1rem; font-weight: bold; color: var(--text-color);">${message}</p>
                        </div>
                        
                        <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; width: 100%; max-width: 400px;">
                            <button onclick="startQuiz()" class="btn-primary" style="width: 100%; justify-content: center;">
                                <i data-lucide="rotate-ccw" style="width: 20px; height: 20px;"></i> はじめから挑戦する
                            </button>
                            <a href="/n-kyozai/index.html" class="btn-secondary" style="width: 100%; justify-content: center;">
                                <i data-lucide="home" style="width: 20px; height: 20px;"></i> ホームへ戻る
                            </a>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ロードと同時に開始
        startQuiz();
    </script>
</body>
</html>
