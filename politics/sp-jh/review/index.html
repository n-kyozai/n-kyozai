<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>復習用学習コンテンツ - 教員採用試験対策</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #0ea5e9; /* 専門科目用アクセントカラー（SkyBlue） */
            --bg-color: #f8fafc;
            --text-color: #334155;
            --sidebar-width: 200px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- サイドバー --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: white;
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            border-right: 1px solid #e2e8f0;
            overflow-y: auto;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 14px 16px;
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--primary-color);
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-menu { padding: 6px 0; }
        .nav-category {
            padding: 8px 16px 2px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            font-weight: 600;
        }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 6px 16px;
            color: #64748b;
            text-decoration: none;
            transition: all 0.2s;
            font-size: 0.8rem;
        }
        .nav-item:hover { background-color: #f1f5f9; color: var(--accent-color); }
        .nav-item i { margin-right: 8px; width: 14px; height: 14px; }
        
        .nav-item.active {
            color: var(--accent-color);
            background-color: #e0f2fe;
            font-weight: bold;
            border-right: 3px solid var(--accent-color);
        }

        /* --- モバイル用トグルボタン --- */
        .mobile-toggle-btn {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 2000;
            width: 36px;
            height: 36px;
            background-color: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            color: var(--primary-color);
            align-items: center;
            justify-content: center;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 950;
            backdrop-filter: blur(2px);
        }
        .overlay.active { display: block; }

        /* --- メインコンテンツ --- */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s ease;
            min-width: 0;
        }

        .page-header {
            background-color: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 24px;
        }

        .breadcrumb {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 8px;
            white-space: normal;
            overflow-wrap: break-word;
        }
        .breadcrumb a { color: #94a3b8; text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 0;
            flex: 1;
        }

        /* --- タブUIのスタイル --- */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 2px solid #e2e8f0;
            overflow-x: auto; /* モバイルでタブが多い場合にスクロール */
            white-space: nowrap;
            /* スクロールバーを見えにくくする */
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            padding: 10px 16px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            font-size: 0.95rem;
            font-weight: bold;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: -2px; /* ボーダーを重ねる */
        }

        .tab-btn:hover {
            color: var(--primary-color);
        }

        .tab-btn.active {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- コンテンツリストスタイル --- */
        .chapter-details {
            background: white;
            border-radius: 10px;
            box-shadow: var(--shadow);
            border: 1px solid #e2e8f0;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .chapter-summary {
            padding: 16px 20px;
            font-weight: bold;
            font-size: 1.05rem;
            color: var(--primary-color);
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
        }

        .chapter-summary .icon-wrapper {
            margin-right: 12px;
            color: var(--accent-color);
            display: flex;
            align-items: center;
        }

        .chapter-content {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 12px;
            background-color: white;
        }

        .lesson-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.2s;
            background-color: #ffffff;
        }

        .lesson-link:hover {
            border-color: var(--accent-color);
            background-color: #f0f9ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .lesson-num {
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--accent-color);
            font-weight: bold;
            background: #e0f2fe;
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 12px;
            flex-shrink: 0;
            width: 44px; /* 番号の幅を固定 */
            text-align: center;
        }

        .lesson-title {
            flex: 1;
            font-size: 0.85rem;
            line-height: 1.4;
            font-weight: 500;
        }

        .lesson-arrow {
            width: 16px;
            height: 16px;
            color: #cbd5e1;
            transition: color 0.2s;
            flex-shrink: 0;
        }

        .lesson-link:hover .lesson-arrow {
            color: var(--accent-color);
        }

        /* --- 未公開リンク用のスタイル --- */
        .lesson-link.disabled {
            opacity: 0.7;
            cursor: default;
            background-color: #f8fafc;
            border-style: dashed;
            border-color: #cbd5e1;
        }
        
        .lesson-link.disabled:hover {
            transform: none;
            box-shadow: none;
            border-color: #cbd5e1;
            background-color: #f8fafc;
        }

        .lesson-link.disabled .lesson-num {
            background: #e2e8f0;
            color: #94a3b8;
        }

        .lesson-link.disabled .lesson-title {
            color: #94a3b8;
        }

        footer {
            background-color: white;
            border-top: 1px solid #e2e8f0;
            padding: 15px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.7rem;
            margin-top: auto;
        }

        /* --- レスポンシブ --- */
        @media (max-width: 768px) {
            .mobile-toggle-btn { display: flex; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; width: 100%; }
            .page-header { padding: 16px 16px 16px 60px; }
            .container { padding: 16px; width: 100%; }
            .chapter-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

                items: [

                    { id: 92, title: '日朝交渉史' },

        document.addEventListener('DOMContentLoaded', () => {
            const tabContainer = document.getElementById('tabContainer');
            const contentContainer = document.getElementById('contentContainer');

            reviewData.forEach((category, index) => {
                // 1. タブボタンの生成
                const tabBtn = document.createElement('button');
                tabBtn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
                tabBtn.setAttribute('data-target', category.categoryId);
                tabBtn.textContent = category.categoryName;
                tabContainer.appendChild(tabBtn);

                // 2. タブコンテンツエリアの生成
                const tabContent = document.createElement('div');
                tabContent.id = category.categoryId;
                tabContent.className = `tab-content ${index === 0 ? 'active' : ''}`;

                // 章の詳細コンテナ
                const chapterDiv = document.createElement('div');
                chapterDiv.className = 'chapter-details';

                // 章タイトル（見出し）
                const summary = document.createElement('div');
                summary.className = 'chapter-summary';
                summary.innerHTML = `
                    <div class="icon-wrapper"><i data-lucide="check-circle"></i></div>
                    ${category.categoryName}の日本
                `;
                if(category.categoryName === 'テーマ史') {
                     summary.innerHTML = `<div class="icon-wrapper"><i data-lucide="check-circle"></i></div>${category.categoryName}`;
                }
                chapterDiv.appendChild(summary);

                // リンク一覧のグリッド
                const itemsGrid = document.createElement('div');
                itemsGrid.className = 'chapter-content';

                // 各項目のリンクを生成
                category.items.forEach(item => {
                    const numStr = String(item.id).padStart(3, '0');
                    const isPublished = publishedLessons.includes(item.id);
                    // リンク先のパス設定（変更箇所: rev042.html -> rev042/index.html）
                    const linkHref = `/n-kyozai/politics/sp-jh/review/rev${numStr}/index.html`;
                    
                    const linkEl = document.createElement(isPublished ? 'a' : 'div');
                    if (isPublished) linkEl.href = linkHref;
                    
                    linkEl.className = 'lesson-link' + (isPublished ? '' : ' disabled');
                    
                    linkEl.innerHTML = `
                        <span class="lesson-num">${numStr}</span>
                        <span class="lesson-title">${item.title}</span>
                        ${isPublished ? '<i data-lucide="chevron-right" class="lesson-arrow"></i>' : '<i data-lucide="lock" class="lesson-arrow" style="width:14px; height:14px; opacity: 0.5;"></i>'}
                    `;
                    
                    itemsGrid.appendChild(linkEl);
                });

                chapterDiv.appendChild(itemsGrid);
                tabContent.appendChild(chapterDiv);
                contentContainer.appendChild(tabContent);
            });

            // アイコンの描画
            lucide.createIcons();

            // タブの切り替えロジック
            const tabBtns = document.querySelectorAll('.tab-btn');
            const tabContents = document.querySelectorAll('.tab-content');

            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    // 全てのアクティブクラスを解除
                    tabBtns.forEach(b => b.classList.remove('active'));
                    tabContents.forEach(c => c.classList.remove('active'));
                    
                    // クリックされたタブと対象コンテンツをアクティブに
                    btn.classList.add('active');
                    document.getElementById(btn.dataset.target).classList.add('active');
                });
            });
        });

        // サイドバーのトグル制御
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        const toggleSidebar = () => {
            const isActive = sidebar.classList.contains('active');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            menuToggle.innerHTML = isActive ? '<i data-lucide="menu"></i>' : '<i data-lucide="x"></i>';
            lucide.createIcons();
            document.body.style.overflow = isActive ? '' : 'hidden';
        };

        if(menuToggle) menuToggle.addEventListener('click', toggleSidebar);
        if(overlay) overlay.addEventListener('click', toggleSidebar);
    </script>
</body>
