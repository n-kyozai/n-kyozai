<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>世界史 - 教員採用試験対策</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: #334155; /* Slate 700 */
            --accent-color: #0369a1; /* Sky 700 (世界史用に青系) */
            --accent-dark: #075985;  /* Sky 800 */
            --accent-light: #e0f2fe; /* 修正: より自然なハイライト色に */
            --bg-color: #f8fafc;     /* Slate 50 */
            --sidebar-bg: #ffffff;
            --sidebar-width: 220px;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
            --chapter-bg: #ffffff;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        /* 全体のフォントサイズ調整 */
        html { font-size: 92.5%; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- サイドバー --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            z-index: 1000;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px; font-size: 1rem; font-weight: 800;
            color: var(--primary-color); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; gap: 10px;
            background: #fff;
        }
        .nav-menu { padding: 12px 0; flex: 1; }
        
        .nav-category { 
            padding: 12px 20px 4px; 
            font-size: 0.7rem; 
            color: #94a3b8; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
        }
        
        .nav-item {
            display: flex; align-items: center; padding: 10px 20px;
            color: #475569; text-decoration: none; font-size: 0.9rem; font-weight: 500;
            transition: all 0.2s; cursor: pointer; border-left: 3px solid transparent;
        }
        .nav-item:hover { background-color: var(--bg-color); color: var(--text-color); border-left-color: #cbd5e1; }
        .nav-item i { margin-right: 10px; width: 18px; height: 18px; color: #64748b; }
        .nav-item:hover i { color: var(--primary-color); }
        .nav-item.active { background-color: var(--accent-light); color: var(--accent-color); border-left-color: var(--accent-color); }
        .nav-item.active i { color: var(--accent-color); }

        /* --- モバイル用トグルボタン --- */
        .mobile-toggle-btn {
            display: none; position: fixed; 
            top: 10px; left: 10px; z-index: 2000;
            width: 40px; height: 40px; 
            background: white; border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15); 
            border: 1px solid var(--border-color); 
            cursor: pointer;
            align-items: center; justify-content: center; 
            color: #475569;
        }
        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 900; display: none; backdrop-filter: blur(2px); }
        .overlay.active { display: block; }

        /* --- メインコンテンツ --- */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s ease;
        }

        .page-header {
            background-color: white;
            border-bottom: 1px solid var(--border-color);
            padding: 20px 32px;
        }

        .breadcrumb { font-size: 0.8rem; color: #94a3b8; margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .breadcrumb a { color: #64748b; text-decoration: none; transition: color 0.2s; }
        .breadcrumb a:hover { color: var(--accent-color); text-decoration: underline; }
        .breadcrumb span { font-weight: bold; color: var(--primary-color); cursor: default; }
        .breadcrumb i { margin: 0 4px; color: #cbd5e1; width: 14px; height: 14px; }

        .main-title {
            font-size: 1.6rem; color: var(--primary-color);
            font-weight: 800; margin-bottom: 0;
            display: flex; align-items: center; gap: 12px;
        }
        .main-title i { color: var(--accent-color); width: 28px; height: 28px; }

        .container { 
            width: 95%;
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 32px 0;
            flex: 1;
        }

        /* --- アコーディオン・目次スタイル --- */
        .chapter-details {
            background: var(--chapter-bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
            overflow: hidden;
        }

        .chapter-summary {
            padding: 16px 20px;
            font-weight: bold;
            font-size: 1.05rem;
            color: var(--primary-color);
            background-color: var(--bg-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            list-style: none; /* デフォルトの三角を消す */
            transition: background-color 0.2s;
        }

        .chapter-summary::-webkit-details-marker {
            display: none;
        }

        .chapter-summary:hover {
            background-color: #f1f5f9;
        }

        .chapter-summary .icon-wrapper {
            margin-right: 12px;
            color: var(--accent-color);
            display: flex;
            align-items: center;
        }
        
        .chapter-summary .chevron {
            margin-left: auto;
            color: #94a3b8;
            transition: transform 0.3s ease;
        }

        details[open] .chapter-summary {
            border-bottom: 1px solid var(--border-color);
            background-color: #ffffff;
        }

        details[open] .chevron {
            transform: rotate(180deg);
        }

        .chapter-content {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 12px;
            background-color: white;
        }

        .lesson-link {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.2s;
            background-color: #ffffff;
        }

        .lesson-link:hover {
            border-color: var(--accent-color);
            background-color: #f0f9ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .lesson-num {
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--accent-color);
            font-weight: bold;
            background: var(--accent-light);
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 12px;
            flex-shrink: 0;
            width: 38px;
            text-align: center;
        }

        .lesson-title {
            flex: 1;
            font-size: 0.9rem;
            line-height: 1.4;
            font-weight: 500;
        }

        .lesson-arrow {
            width: 16px;
            height: 16px;
            color: #cbd5e1;
            transition: color 0.2s;
            flex-shrink: 0;
        }

        .lesson-link:hover .lesson-arrow {
            color: var(--accent-color);
        }

        /* --- 未公開リンク用のスタイル --- */
        .lesson-link.disabled {
            opacity: 0.7;
            cursor: default;
            background-color: var(--bg-color);
            border-style: dashed;
            border-color: #cbd5e1;
        }
        
        .lesson-link.disabled:hover {
            transform: none;
            box-shadow: none;
            border-color: #cbd5e1;
            background-color: var(--bg-color);
        }

        .lesson-link.disabled .lesson-num {
            background: #e2e8f0;
            color: #94a3b8;
        }

        .lesson-link.disabled .lesson-title {
            color: #94a3b8;
        }

        footer {
            background-color: white;
            border-top: 1px solid var(--border-color);
            padding: 20px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.8rem;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 220px; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .page-header { padding: 20px 20px 20px 64px; }
            .container { padding: 20px 16px; width: 100%; }
            .mobile-toggle-btn { display: flex; }
            .chapter-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <button class="mobile-toggle-btn" id="menuToggle"><i data-lucide="menu"></i></button>
    <div class="overlay" id="overlay"></div>

    <!-- サイドバー -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><i data-lucide="book-open"></i>メニュー</div>
        <nav class="nav-menu">
            <div class="nav-category">MAIN</div>
            <a href="/n-kyozai/index.html" class="nav-item"><i data-lucide="home"></i>ホーム</a>
            
            <div class="nav-category">教養・指導要領</div>
            <a href="/n-kyozai/general/index.html" class="nav-item"><i data-lucide="graduation-cap"></i>一般教養</a>
            <a href="/n-kyozai/pedagogy/index.html" class="nav-item"><i data-lucide="users"></i>教職教養</a>
            <a href="/n-kyozai/guidelines/index.html" class="nav-item"><i data-lucide="file-text"></i>指導要領</a>
            
            <div class="nav-category">専門科目</div>
            <a href="/n-kyozai/politics/index.html" class="nav-item active"><i data-lucide="book-open"></i>専門科目</a>
        </nav>
    </aside>

    <!-- メインコンテンツ -->
    <main class="main-content">
        <div class="page-header">
            <!-- パンくずリスト -->
            <div class="breadcrumb">
                <a href="/n-kyozai/index.html">ホーム</a> 
                <i data-lucide="chevron-right"></i>
                <a href="/n-kyozai/politics/index.html">専門科目</a> 
                <i data-lucide="chevron-right"></i>
                <span>世界史</span>
            </div>
            <h1 class="main-title"><i data-lucide="globe-2"></i> 世界史</h1>
        </div>

        <div class="container">
            <div id="syllabus-container">
                <!-- JavaScriptでここに目次データを動的生成します -->
            </div>
        </div>

        <footer>
            <p>COPYRIGHT 2026 © STUDY PORTAL. ALL RIGHTS RESERVED</p>
        </footer>
    </main>

    <script>
        // ==========================================
        // 【ページの公開手順】
        // 以下の配列 `publishedLessons` に公開するページの連番(wh1なら 1)を半角数字で追加してください。
        // （例：現在 1〜6 番までを公開中）
        // ==========================================
        const publishedLessons = [1, 2, 3, 4, 5, 6];

        // 世界史の目次データ
        const syllabusData = [
            {
                chapter: "第1章 古代オリエントと古代インド・東南アジアの文明",
                items: [
                    "先史時代", "古代オリエント世界（エジプト・メソポタミア）", "古代オリエント世界の統一", "古代インド", "東南アジアの諸王朝"
                ]
            },
            {
                chapter: "第2章 古代の地中海世界",
                items: [
                    "古代ギリシア世界①", "古代ギリシア世界②・ヘレニズム時代", "共和政ローマ", "帝政ローマ・キリスト教の成立", "古代地中海世界の文化"
                ]
            },
            {
                chapter: "第3章 東アジア文化圏の形成と発展",
                items: [
                    "中国文明の成立", "秦・漢", "魏晋南北朝時代", "隋・唐", "中央ユーラシア", "宋と北方王朝", "モンゴル帝国と元", "明", "清", "朝鮮とベトナム", "儒学史", "中国思想史（儒教を除く）", "中国文芸史"
                ]
            },
            {
                chapter: "第4章 イスラーム世界の形成と発展",
                items: [
                    "イスラーム世界の成立", "イスラーム世界の分裂", "イスラーム帝国の繁栄（ティムール・サファヴィー・ムガル）", "トルコ人王朝とオスマン帝国の繁栄", "アフリカ史（帝国主義以前）", "イスラームの社会と文化"
                ]
            },
            {
                chapter: "第5章 ヨーロッパ世界の形成と発展",
                items: [
                    "西ヨーロッパ中世世界の成立", "東ヨーロッパ中世世界の成立", "封建社会の成立", "西ヨーロッパ中世世界の発展", "中世各国史①（封建社会の崩壊・イギリスとフランス・教皇権の衰退）", "中世各国史②（イベリア半島・ドイツ・イタリア・北欧）", "中世ヨーロッパ文化史"
                ]
            },
            {
                chapter: "第6章 近世ヨーロッパ世界の形成と発展",
                items: [
                    "ラテンアメリカの古代文明・大航海時代", "ルネサンス", "宗教改革", "主権国家体制の成立①（スペイン・オランダ・イギリス）", "主権国家体制の成立②（フランス・ドイツ）", "主権国家体制の成立③（プロイセン・オーストリア・ロシア）"
                ]
            },
            {
                chapter: "第7章 近代ヨーロッパ・アメリカ世界の成立",
                items: [
                    "ヨーロッパ諸国の海外進出", "イギリス革命", "17・18世紀のヨーロッパ文化①（哲学・政治・経済）", "17・18世紀のヨーロッパ文化②（文学・美術・音楽・自然科学）", "産業革命", "アメリカ独立革命", "フランス革命", "ナポレオン時代"
                ]
            },
            {
                chapter: "第8章 近代国民国家の発展",
                items: [
                    "ウィーン体制", "ヨーロッパの再編", "アメリカ合衆国の発展", "ロシアの発展と東方問題", "19世紀のヨーロッパ文化①（哲学・経済・歴史・自然科学）", "19世紀のヨーロッパ文化②（文学・美術・音楽）"
                ]
            },
            {
                chapter: "第9章 アジア世界の動揺",
                items: [
                    "西アジア・南アジアへの列強の進出", "東南アジアの植民地化とロシアの進出", "清朝の動揺", "近代の朝鮮と中国分割"
                ]
            },
            {
                chapter: "第10章 帝国主義とアジアの民族運動",
                items: [
                    "帝国主義", "アフリカ分割", "アメリカの帝国主義と列強の展開", "日露戦争・韓国併合・辛亥革命"
                ]
            },
            {
                chapter: "第11章 二つの世界大戦",
                items: [
                    "第一次世界大戦", "ロシア革命", "ヴェルサイユ体制・ワシントン体制", "第一次世界大戦後の欧米諸国①", "第一次世界大戦後の欧米諸国②", "第一次世界大戦後の西アジア", "第一次世界大戦前後の南アジア・東南アジア", "第一次世界大戦後の中国", "世界恐慌", "ファシズムの台頭", "第二次世界大戦"
                ]
            },
            {
                chapter: "第12章 冷戦から現代の世界へ",
                items: [
                    "冷戦の展開", "「雪どけ」から冷戦終結へ", "第二次世界大戦後の欧米諸国①", "第二次世界大戦後の欧米諸国②", "第二次世界大戦後の中東諸国", "第二次世界大戦後のアフリカ", "第二次世界大戦後のインド・東南アジア①", "第二次世界大戦後の東南アジア②", "第二次世界大戦後の中国・朝鮮", "今日の世界"
                ]
            },
            {
                chapter: "第13章 テーマ史",
                items: [
                    "ラテンアメリカ史", "東西交渉史①（16〜17世紀）", "東西交渉史②（19世紀）"
                ]
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('syllabus-container');
            let globalCounter = 1; // 連番（1, 2, 3...）用カウンター

            syllabusData.forEach((chapterData, index) => {
                // アコーディオン要素の作成
                const details = document.createElement('details');
                details.className = 'chapter-details';
                if (index === 0) details.open = true; // 第1章だけ初期状態で開いておく

                // 見出し（章タイトル）の作成
                const summary = document.createElement('summary');
                summary.className = 'chapter-summary';
                summary.innerHTML = `
                    <div class="icon-wrapper"><i data-lucide="bookmark"></i></div>
                    ${chapterData.chapter}
                    <i data-lucide="chevron-down" class="chevron"></i>
                `;
                details.appendChild(summary);

                // コンテンツ部分（リンクカードのグリッド）の作成
                const contentDiv = document.createElement('div');
                contentDiv.className = 'chapter-content';

                chapterData.items.forEach((itemTitle) => {
                    const globalNumStr = String(globalCounter).padStart(3, '0'); // 全体を通した連番(001, 002...)
                    const linkHref = `/n-kyozai/politics/sp-wh/wh${globalCounter}/index.html`; // 連番の遷移先パス
                    const isPublished = publishedLessons.includes(globalCounter); // 公開設定の判定
                    
                    // 公開済なら <a> タグ、未公開なら <div> タグとして生成
                    const linkEl = document.createElement(isPublished ? 'a' : 'div');
                    if (isPublished) linkEl.href = linkHref;
                    
                    linkEl.className = 'lesson-link' + (isPublished ? '' : ' disabled');
                    
                    linkEl.innerHTML = `
                        <span class="lesson-num">${globalNumStr}</span>
                        <span class="lesson-title">${itemTitle}</span>
                        ${isPublished ? '<i data-lucide="chevron-right" class="lesson-arrow"></i>' : '<i data-lucide="lock" class="lesson-arrow" style="width:14px; height:14px; opacity: 0.5;"></i>'}
                    `;
                    
                    contentDiv.appendChild(linkEl);
                    globalCounter++; // 連番をカウントアップ
                });

                details.appendChild(contentDiv);
                container.appendChild(details);
            });

            // 生成したDOMに対してアイコンをレンダリング
            lucide.createIcons();
        });

        // モバイルメニューのトグル設定
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        const toggleSidebar = () => {
            const isActive = sidebar.classList.contains('active');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            if (menuToggle) {
                menuToggle.innerHTML = isActive ? '<i data-lucide="menu"></i>' : '<i data-lucide="x"></i>';
                lucide.createIcons();
            }
            document.body.style.overflow = isActive ? '' : 'hidden';
        };

        if (menuToggle) menuToggle.addEventListener('click', toggleSidebar);
        if (overlay) overlay.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
