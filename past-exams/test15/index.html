        /* 選択式のセレクトボックススタイル */

            border: 1px solid #cbd5e1;
            background-color: #fff;
            padding: 6px 32px 6px 12px;
            width: 100%;
            max-width: 120px; /* 数字選択用に幅を狭く調整 */
            border-radius: 4px;
            outline: none;
            font-size: 1rem;
            color: #333;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 16px;
            transition: border-color 0.2s;
        }
        .blank-select:focus {
            border-color: #005b82;
            box-shadow: 0 0 0 2px rgba(0, 91, 130, 0.2);
        }

    </main>

    <script>
        // --- データ定義 (全30問) ---
        const baseQuestions = [
            {
                title: "教育基本法第2条 (1)",
                text: "教育は、(略)同法第2条に掲げる次の目標を達成するよう行われなければならない。\n1 幅広い知識と教養を身に付け、真理を求める態度を養い、（　ア　）を培うとともに、健やかな身体を養うこと。\n\n1. 豊かな情操と道徳心\n2. 思考力、判断力、表現力\n3. 個性の伸長と自立の精神\n4. 学びに向かう力",
                correctAnswer: "1",
                options: ["1", "2", "3", "4"],
                explanation: "前文より。教育基本法第2条の第1号には「幅広い知識と教養を身に付け、真理を求める態度を養い、豊かな情操と道徳心を培うとともに、健やかな身体を養うこと」と規定されています。"
            },
            {
                title: "教育基本法第2条 (2)",
                text: "同法第2条に掲げる次の目標を達成するよう行われなければならない。\n2 個人の価値を尊重して、その能力を伸ばし、創造性を培い、自主及び自律の精神を養うとともに、職業及び生活との関連を重視し、（　ア　）を重んずる態度を養うこと。\n\n1. 公共\n2. 伝統\n3. 勤労\n4. 協働",
                correctAnswer: "3",
                options: ["1", "2", "3", "4"],
                explanation: "前文より。教育基本法第2条第2号は「勤労を重んずる態度を養うこと」が規定されています。"
            },
            {
                title: "教育基本法第2条 (3)",
                text: "同法第2条に掲げる次の目標を達成するよう行われなければならない。\n3 正義と責任、男女の平等、自他の敬愛と協力を重んずるとともに、（　ア　）の精神に基づき、主体的に社会の形成に参画し、その発展に寄与する態度を養うこと。\n\n1. 奉仕\n2. 公共\n3. 連帯\n4. 自立",
                correctAnswer: "2",
                options: ["1", "2", "3", "4"],
                explanation: "前文より。教育基本法第2条第3号は「公共の精神に基づき、主体的に社会の形成に参画し…」と規定されています。"
            },
            {
                title: "学習指導要領 前文：他者の尊重",
                text: "これからの学校には、(略)一人一人の生徒が、自分のよさや可能性を認識するとともに、あらゆる他者を（　ア　）として尊重し、多様な人々と協働しながら様々な社会的変化を乗り越え、豊かな人生を切り拓き、持続可能な社会の創り手となることができるようにすることが求められる。\n\n1. かけがえのない存在\n2. 価値のある存在\n3. 尊重すべき存在\n4. 共に生きる存在",
                correctAnswer: "2",
                options: ["1", "2", "3", "4"],
                explanation: "前文より。「あらゆる他者を価値のある存在として尊重し」と明記されています。"
            },
            {
                title: "第1の2(2) 道徳教育の目標",
                text: "道徳教育は、教育基本法及び学校教育法に定められた教育の根本精神に基づき、人間としての（　ア　）を考え、主体的な判断の下に行動し、自立した人間として他者と共によりよく生きるための基盤となる道徳性を養うことを目標とすること。\n\n1. 在り方生き方\n2. 尊厳\n3. 生き方\n4. 本質",
                correctAnswer: "3",
                options: ["1", "2", "3", "4"],
                explanation: "総則第1の2(2)より。道徳教育の目標は「人間としての生き方を考え、主体的な判断の下に行動し…」と規定されています。"
            },
            {
                title: "第1の2(3) 体育・健康に関する指導の基礎",
                text: "また、それらの指導(学校における体育・健康に関する指導等)を通して、家庭や地域社会との連携を図りながら、日常生活において適切な体育・健康に関する活動の実践を促し、（　ア　）を通じて健康・安全で活力ある生活を送るための基礎が培われるよう配慮すること。\n\n1. 学校生活\n2. 生涯\n3. 日常生活\n4. 義務教育",
                correctAnswer: "2",
                options: ["1", "2", "3", "4"],
                explanation: "総則第1の2(3)より。「生涯を通じて健康・安全で活力ある生活を送るための基礎が培われるよう配慮すること」とされています。"
            },
            {
                title: "第2の3(1)オ 選択教科の開設",
                text: "各学校においては、生徒や学校、地域の実態を考慮して、生徒の特性等に応じた多様な学習活動が行えるよう、第2章に示す各教科や、特に必要な教科を、（　ア　）として開設し生徒に履修させることができる。\n\n1. 総合的な学習の時間\n2. 補充的な学習\n3. 特別な教科\n4. 選択教科",
                correctAnswer: "4",
                options: ["1", "2", "3", "4"],
                explanation: "総則第2の3(1)オより。「選択教科として開設し生徒に履修させることができる」とされています。"
            },
            {
                title: "第2の3(2)ウ 1単位時間の設定",
                text: "各教科等のそれぞれの授業の1単位時間は、各学校において、各教科等の年間授業時数を確保しつつ、生徒の（　ア　）及び各教科等や学習活動の特質を考慮して適切に定めること。\n\n1. 発達の段階\n2. 興味・関心\n3. 学習の進度\n4. 実態",
                correctAnswer: "1",
                options: ["1", "2", "3", "4"],
                explanation: "総則第2の3(2)ウ(ア)より。「生徒の発達の段階及び各教科等や学習活動の特質を考慮して適切に定める」と規定されています。"
            },
            {
                title: "第3の1(4) 授業改善（見通しと振り返り）",
                text: "生徒が学習の（　ア　）を立てたり学習したことを（　イ　）活動を、計画的に取り入れるように工夫すること。\n\n1. ア: 予定　イ: 応用する\n2. ア: 見通し　イ: 振り返ったりする\n3. ア: 計画　イ: 発表する\n4. ア: 見通し　イ: 評価する",
                correctAnswer: "2",
                options: ["1", "2", "3", "4"],
                explanation: "総則第3の1(4)より。「学習の見通しを立てたり学習したことを振り返ったりする活動」を計画的に取り入れることが求められています。"
            },
            {
                title: "第3の1(6) 授業改善（自主的、自発的な学習）",
                text: "生徒が自ら学習課題や学習活動を（　ア　）機会を設けるなど、生徒の興味・関心を生かした自主的、自発的な学習が促されるよう工夫すること。\n\n1. 発見する\n2. 探究する\n3. 選択する\n4. 創造する",
                correctAnswer: "3",
                options: ["1", "2", "3", "4"],
                explanation: "総則第3の1(6)より。「生徒が自ら学習課題や学習活動を選択する機会を設けるなど」と規定されています。"
            },
            {
                title: "第3の2(2) 学習評価の充実",
                text: "創意工夫の中で学習評価の（　ア　）や（　イ　）が高められるよう、組織的かつ計画的な取組を推進するとともに、学年や学校段階を越えて生徒の学習の成果が円滑に接続されるように工夫すること。\n\n1. ア: 公平性　イ: 客観性\n2. ア: 妥当性　イ: 信頼性\n3. ア: 適格性　イ: 公正性\n4. ア: 効果　イ: 効率",
                correctAnswer: "2",
                options: ["1", "2", "3", "4"],
                explanation: "総則第3の2(2)より。学習評価の「妥当性や信頼性が高められるよう」組織的かつ計画的な取組を推進することが求められます。"
            },
            {
                title: "第4の1(1) 学級経営の充実",
                text: "学習や生活の基盤として、教師と生徒との（　ア　）及び生徒相互のよりよい人間関係を育てるため、日頃から（　イ　）の充実を図ること。\n\n1. ア: コミュニケーション　イ: 生徒指導\n2. ア: 信頼関係　イ: 学級経営\n3. ア: 信頼関係　イ: 特別活動\n4. ア: 相互理解　イ: 道徳教育",
                correctAnswer: "2",
                options: ["1", "2", "3", "4"],
                explanation: "総則第4の1(1)より。「教師と生徒との信頼関係及び生徒相互のよりよい人間関係を育てるため、日頃から学級経営の充実を図ること」とされています。"
            },
            {
                title: "第4の1(2) 生徒指導の充実",
                text: "生徒が、（　ア　）を実感しながら、よりよい人間関係を形成し、有意義で充実した学校生活を送る中で、現在及び将来における自己実現を図っていくことができるよう、生徒理解を深め、学習指導と関連付けながら、生徒指導の充実を図ること。\n\n1. 達成感\n2. 自己肯定感\n3. 有用感\n4. 自己の存在感",

        // --- グローバル変数 ---
        let parsedQuestions = [];

        // --- DOM要素 ---
        const screens = {
            start: document.getElementById('start-screen'),
            test: document.getElementById('test-screen'),

        // --- 初期化 ---
        function initApp() {
            // 問題数表示の更新
            els.totalQCount.textContent = `全 ${baseQuestions.length} 問`;
            els.totalScore.textContent = `${baseQuestions.length} 点`;

            // イベントリスナー登録
            document.getElementById('start-btn').addEventListener('click', startTest);
            
            els.prevBtn.addEventListener('click', () => navigateQuestion(-1));
            els.nextBtn.addEventListener('click', () => navigateQuestion(1));
            
            els.submitConfirmBtn.addEventListener('click', () => {
                els.submitModal.classList.remove('hidden');
            });
            els.modalCancelBtn.addEventListener('click', () => {
                els.submitModal.classList.add('hidden');
            });
            els.modalSubmitBtn.addEventListener('click', () => {
                els.submitModal.classList.add('hidden');
                finishTest();
            });
            
            els.menuBtn.addEventListener('click', openDrawer);
            els.closeMenuBtn.addEventListener('click', closeDrawer);
            els.drawerOverlay.addEventListener('click', closeDrawer);

            els.fontSizeBtn.addEventListener('click', () => {
                currentFontSizeLevel = (currentFontSizeLevel + 1) % fontSizeClasses.length;
                applyFontSize();
            });
        }

        // --- フォントサイズ適用 ---
        function applyFontSize() {
            const baseClasses = "text-gray-800 leading-normal min-h-[60px] whitespace-pre-wrap break-words";
            els.qBody.className = `${fontSizeClasses[currentFontSizeLevel]} ${baseClasses}`;
        }

        // --- テスト開始処理 ---
        function startTest() {
            generateQuestions();

            screens.start.classList.add('hidden');
            screens.test.classList.remove('hidden');
            screens.test.classList.add('flex');

            currentQuestionIndex = 0;
            renderQuestion(currentQuestionIndex);
            updateNavigations();
        }

        // --- 問題データの生成 (全問ランダム) ---
        function generateQuestions() {
            parsedQuestions = [];
            userAnswers = [];

            // 問題をランダムにシャッフル
            const shuffledData = [...baseQuestions].sort(() => Math.random() - 0.5);

            shuffledData.forEach((q) => {
                parsedQuestions.push({
                    title: q.title,
                    text: q.text,
                    correctAnswer: q.correctAnswer,
                    options: q.options,
                    explanation: q.explanation
                });
                userAnswers.push(""); 
            });
        }

        // --- 問題の描画 ---
        function renderQuestion(index) {
            const q = parsedQuestions[index];
            
            els.qNumberTitle.innerHTML = `【問題 ${index + 1}】<span class="text-xs ml-2 font-normal text-gray-700">（1点）</span>`;
            
            // XSS対策を先に行い、その後に改行を反映
            let displayText = q.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            displayText = displayText.replace(/\n/g, '<br>');

            els.qBody.innerHTML = displayText;
            applyFontSize(); // 問題切り替え時にも現在のフォントサイズを適用
            
            els.qProgress.textContent = `${index + 1} / ${parsedQuestions.length}`;

            // 解答枠の生成 (セレクトボックス強制)
            els.inputArea.innerHTML = '';
            
            const select = document.createElement('select');
            select.className = 'blank-select';
            
            const defaultOption = document.createElement('option');
            defaultOption.value = "";
            defaultOption.textContent = "-"; 
            select.appendChild(defaultOption);

            q.options.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt;
                option.textContent = opt;
                if (userAnswers[index] === opt) {
                    option.selected = true;
                }
                select.appendChild(option);
            });

            select.addEventListener('change', (e) => {
                userAnswers[index] = e.target.value;
                updateNavigations();
            });
            els.inputArea.appendChild(select);

            // ボタンの表示制御
            els.prevBtn.disabled = index === 0;
            if (index === parsedQuestions.length - 1) {
                els.nextBtn.classList.add('hidden');
                els.submitConfirmBtn.classList.remove('hidden');
            } else {
                els.nextBtn.classList.remove('hidden');
                els.submitConfirmBtn.classList.add('hidden');
            }
        }

        function navigateQuestion(step) {
            const newIndex = currentQuestionIndex + step;
            if (newIndex >= 0 && newIndex < parsedQuestions.length) {
                currentQuestionIndex = newIndex;
                renderQuestion(currentQuestionIndex);
                updateNavigations(); 
            }
        }

        // --- UIの更新 ---
        function updateNavigations() {
            updateSidebarList();
            updateDrawerList();
        }

        function updateSidebarList() {
            els.desktopSidebar.innerHTML = '';
            parsedQuestions.forEach((q, idx) => {
                const button = document.createElement('button');
                const isActive = idx === currentQuestionIndex;
                
                let baseClass = "text-center px-2 py-2 rounded font-medium transition border text-sm shadow-sm ";
                if (isActive) {
                    baseClass += "bg-[#bfdbfe] text-black border-[#93c5fd]"; 
                } else {
                    baseClass += "bg-[#e2e8f0] text-gray-700 border-[#cbd5e1] hover:bg-[#cbd5e1]";
                }
                
                button.className = baseClass;
                button.innerHTML = `【問${idx + 1}】`;
                
                button.addEventListener('click', () => {
                    currentQuestionIndex = idx;
                    renderQuestion(currentQuestionIndex);
                    updateNavigations();
                });
                
                els.desktopSidebar.appendChild(button);
            });
        }

        function updateDrawerList() {
            els.drawerList.innerHTML = '';
            parsedQuestions.forEach((q, idx) => {
                const li = document.createElement('li');
                const isActive = idx === currentQuestionIndex;
                
                li.className = `p-3 mb-1 rounded cursor-pointer transition text-sm ${isActive ? 'bg-[#bfdbfe] font-bold text-black border border-[#93c5fd]' : 'bg-[#e2e8f0] border border-[#cbd5e1] hover:bg-[#cbd5e1] text-gray-700'}`;
                li.innerHTML = `<div class="text-center">【問題${idx + 1}】</div>`;
                
                li.addEventListener('click', () => {
                    currentQuestionIndex = idx;
                    renderQuestion(currentQuestionIndex);
                    closeDrawer(); 
                    updateNavigations();
                });
                
                els.drawerList.appendChild(li);
            });
        }

        function openDrawer() {
            els.drawerMenu.classList.remove('-translate-x-full');
            els.drawerOverlay.classList.remove('hidden');
        }

        function closeDrawer() {
            els.drawerMenu.classList.add('-translate-x-full');
            els.drawerOverlay.classList.add('hidden');
        }

        // --- テスト終了・採点処理 ---
        function finishTest() {
            let correctCount = 0;
            els.resultDetails.innerHTML = '';

            parsedQuestions.forEach((q, idx) => {
                const userAnswer = userAnswers[idx];
                const isCorrect = userAnswer === q.correctAnswer;
                if (isCorrect) correctCount++;

                const resultCard = document.createElement('div');
                resultCard.className = `p-3 md:p-4 rounded border-l-4 ${isCorrect ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'} shadow-sm`;
                
                const icon = isCorrect 
                    ? `<span class="text-green-600 font-bold text-sm md:text-base">○ 正解</span>` 
                    : `<span class="text-red-600 font-bold text-sm md:text-base">× 不正解</span>`;

                let correctHtmlText = q.text.replace(/</g, "&lt;").replace(/>/g, "&gt;"); // XSS対策
                correctHtmlText = correctHtmlText.replace(/\n/g, '<br>');

                const explanationHtml = q.explanation 
                    ? `<div class="mt-3 p-2.5 bg-white border border-gray-200 rounded text-xs md:text-sm text-gray-700 leading-relaxed"><span class="font-bold text-gray-600 block mb-1">【解説】</span>${q.explanation.replace(/\n/g, '<br>')}</div>` 
                    : '';

                resultCard.innerHTML = `
                    <div class="flex justify-between items-center mb-2 border-b border-gray-200 pb-2">
                        <h4 class="font-bold text-gray-800 text-sm md:text-base">問 ${idx + 1}: <span class="text-xs md:text-sm font-normal text-gray-600">${q.title}</span></h4>
                        ${icon}
                    </div>
                    <div class="text-xs md:text-sm text-gray-700 bg-white p-3 rounded border border-gray-200 mb-2 whitespace-pre-wrap break-words">${correctHtmlText}</div>
                    <div class="grid grid-cols-2 gap-2 text-xs md:text-sm mt-2">
                        <div class="bg-white p-2 rounded border border-gray-100 shadow-sm flex flex-col items-center justify-center">
                            <span class="text-gray-500 block text-[10px] md:text-xs mb-1">あなたの解答</span>
                            <span class="font-bold ${isCorrect ? 'text-green-700' : 'text-red-700'} text-base md:text-lg">${userAnswer || '未解答'}</span>
                        </div>
                        <div class="bg-white p-2 rounded border border-gray-100 shadow-sm flex flex-col items-center justify-center">
                            <span class="text-gray-500 block text-[10px] md:text-xs mb-1">正解</span>
                            <span class="font-bold text-blue-700 text-base md:text-lg">${q.correctAnswer}</span>
                        </div>
                    </div>
                    ${explanationHtml}
                `;
                els.resultDetails.appendChild(resultCard);
            });

            els.scoreDisplay.textContent = `${correctCount} / ${parsedQuestions.length}`;
            
            screens.test.classList.add('hidden');
            screens.test.classList.remove('flex');
            screens.result.classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
