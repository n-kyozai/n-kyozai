    <style>
        :root {
            /* サイト共通カラー */
            --primary-color: #2c3e50;
            --accent-color: #4f46e5; /* Indigo */
            --bg-color: #f8fafc;
            --text-color: #334155;
            --sidebar-width: 200px;
            --header-height: 50px;

            /* クイズ固有カラー */
            --quiz-bg: #eef2ff;       /* 薄いIndigo */
            --card-bg: #ffffff;
            --correct-color: #16a34a; /* Green */
            --incorrect-color: #dc2626; /* Red */
            --border-radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            min-height: 100vh;
        }

        /* --- サイドバー --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: white;
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            border-right: 1px solid #e2e8f0;
            overflow-y: auto;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 14px 16px;
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--primary-color);
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 768px) {
            .sidebar-header { padding-left: 60px; }
        }

        .nav-menu { padding: 6px 0; }
        .nav-category {
            padding: 8px 16px 2px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            font-weight: 600;
        }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 6px 16px;
            color: #64748b;
            text-decoration: none;
            transition: all 0.2s;
            font-size: 0.8rem;
        }
        .nav-item:hover { background-color: #f1f5f9; color: var(--accent-color); }
        .nav-item i { margin-right: 8px; width: 14px; height: 14px; }
        
        .nav-item.active {
            color: var(--accent-color);
            background-color: #eef2ff;
            font-weight: bold;
            border-right: 3px solid var(--accent-color);
        }

        /* --- モバイル用トグルボタン --- */
        .mobile-toggle-btn {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 2000;
            width: 36px;
            height: 36px;
            background-color: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            color: var(--primary-color);
            align-items: center;
            justify-content: center;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 950;
            backdrop-filter: blur(2px);
        }
        .overlay.active { display: block; }

        /* --- メインコンテンツ --- */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s ease;
        }

        .page-header {
            background-color: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 24px;
        }

        .breadcrumb {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .breadcrumb a { color: #94a3b8; text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }

        .container {
            width: 95%;
            max-width: 800px;
            margin: 0 auto;
            padding: 24px 0;
            padding-bottom: 100px;
            flex: 1;
        }

        /* --- クイズスタイル --- */
        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid #e2e8f0;
            margin-bottom: 2rem;
            transition: transform 0.2s ease;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--quiz-bg);
        }

        #quiz-progress {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 1.1rem;
        }

        .quit-btn {
            background-color: transparent;
            border: 1px solid var(--incorrect-color);
            color: var(--incorrect-color);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .quit-btn:hover { background-color: var(--incorrect-color); color: white; }
        .quit-btn.confirming { background-color: var(--incorrect-color); color: white; font-weight: bold; }

        #question-text {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            white-space: pre-wrap;
            font-weight: 500;
            color: var(--primary-color);
        }

        /* 選択肢ボタン */
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        @media (min-width: 600px) {
            .options-container { flex-direction: row; flex-wrap: wrap; }
            .option-btn { flex: 1 1 calc(50% - 12px); }
        }

        .option-btn {
            background-color: white;
            border: 2px solid #cbd5e1;
            color: var(--text-color);
            padding: 1rem;
            border-radius: var(--border-radius);
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            background-color: var(--quiz-bg);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .option-btn:disabled { cursor: not-allowed; opacity: 0.7; }

        .option-btn.correct {
            background-color: #dcfce7;
            border-color: var(--correct-color);
            color: var(--correct-color);
            font-weight: bold;
            position: relative;
        }
        .option-btn.correct::after { content: "⭕"; position: absolute; right: 10px; }

        .option-btn.incorrect {
            background-color: #fee2e2;
            border-color: var(--incorrect-color);
            color: var(--incorrect-color);
            text-decoration: line-through;

            padding: 1.5rem;

            background-color: var(--quiz-bg);

            animation: fadeIn 0.5s;

        #feedback-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 0.5rem;
        }
        .feedback-correct { color: var(--correct-color); }
        .feedback-incorrect { color: var(--incorrect-color); }

        .action-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: opacity 0.2s ease;
            text-align: center;
        }
        .action-btn:hover { opacity: 0.9; }

        /* 結果画面 */
        #result-area { text-align: center; display: none; }
        #score-display {
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent-color);
            margin: 1rem 0;
        }

        /* 復習用穴埋めカード */
        #flashcards-section { margin-top: 3rem; text-align: left; }
        #flashcards-section h3 {
            color: var(--primary-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 0.5rem;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .flashcard {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-left: 4px solid #cbd5e1;
        }
        .flashcard h4 {
            margin-top: 0;
            color: var(--accent-color);
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }
        .flashcard-explanation {
            margin-top: 1rem !important;
            padding-top: 1rem;
            border-top: 1px dashed #e2e8f0;
            font-size: 0.9rem !important;
            color: #64748b;
            display: none;
        }

        .blank-spot {
            display: inline-block;
            background-color: #f1f5f9;
            color: transparent;
            border-bottom: 2px solid var(--incorrect-color); /* 赤線 */
            padding: 0 5px;
            margin: 0 2px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            user-select: none;
            transition: all 0.2s ease;
            min-width: 60px;
            text-align: center;
        }
        .blank-spot:hover { background-color: #e2e8f0; }
        .blank-spot.revealed {
            background-color: transparent;
            color: var(--incorrect-color);
            border-bottom: none;
        }

        .toggle-all-btn {
            background-color: white;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toggle-all-btn:hover { background-color: var(--quiz-bg); }

        /* スクロールトップ */
        #back-to-top {
            position: fixed; bottom: 30px; right: 30px;
            width: 50px; height: 50px;
            background-color: var(--primary-color);
            color: white;
            border: none; border-radius: 50%;
            font-size: 1.2rem; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: none; align-items: center; justify-content: center;
            z-index: 1000;
            transition: transform 0.2s;
        }
        #back-to-top:hover { transform: translateY(-5px); }

        /* フッター */
        footer {
            background-color: white;
            border-top: 1px solid #e2e8f0;
            padding: 20px;
            text-align: center; /* 中央配置 */
            color: #94a3b8;     /* 程よい濃さのグレー */
            font-size: 0.7rem;
            margin-top: auto;
        }
        
        footer p {
            margin: 0;
            opacity: 0.6; /* 薄さを調整 */
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .mobile-toggle-btn { display: flex; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .page-header { padding-left: 60px; }
            .container { padding: 16px; }
            .card { padding: 1.5rem; }
        }
    </style>

    <script>
        lucide.createIcons();

        // サイドバー制御
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        const toggleSidebar = () => {
            const isActive = sidebar.classList.contains('active');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            menuToggle.innerHTML = isActive ? '<i data-lucide="menu"></i>' : '<i data-lucide="x"></i>';
            lucide.createIcons();
            document.body.style.overflow = isActive ? '' : 'hidden';
        };

        if(menuToggle) menuToggle.addEventListener('click', toggleSidebar);
        if(overlay) overlay.addEventListener('click', toggleSidebar);

        // クイズデータ（地理歴史科）
        const quizData = [
            {
                question: "【第1款 目標】\n「社会的な（　　）を働かせ、課題を追究したり解決したりする活動を通して、広い視野に立ち、グローバル化する国際社会に主体的に生きる平和で民主的な国家及び社会の有為な形成者に必要な公民としての資質・能力を育成することを目指す。」",
                options: ["知識・技能", "思考・判断", "見方・考え方", "関心・意欲"],
                correctAnswer: 2,
                explanation: "正解は「見方・考え方」です。社会科、地理歴史科、公民科共通の重要なキーワードであり、「社会的な見方・考え方」を働かせることが求められます。"
            },
            {
                question: "【第1款 目標（知識・技能）】\n「現代世界の（　　）と日本及び世界の歴史の展開に関して理解するとともに、調査や諸資料から様々な情報を適切かつ効果的に調べまとめる技能を身に付けるようにする。」",
                options: ["政治的課題", "地域的特色", "経済的格差", "文化的背景"],
                correctAnswer: 1,
                explanation: "正解は「地域的特色」です。「現代世界の地域的特色」と「日本及び世界の歴史の展開」の理解が、地理歴史科の知識・技能の柱です。"
            },
            {
                question: "【第1款 目標（思考・判断・表現）】\n「地理や歴史に関わる事象の意味や意義、特色や相互の関連を、（　　）などを活用して多面的・多角的に考察したり、それらを基に議論したりする力を養う。」",
                options: ["知識", "技能", "資料", "概念"],
                correctAnswer: 3,
                explanation: "正解は「概念」です。「概念などを活用して多面的・多角的に考察」することが、思考力・判断力の育成において重視されています。"
            },
            {
                question: "【第1款 目標（主体的に学習に取り組む態度）】\n「我が国の国土や歴史に対する（　　）、他国や他国の文化を尊重することの大切さについての自覚を深める。」",
                options: ["誇り", "愛情", "責任", "関心"],
                correctAnswer: 1,
                explanation: "正解は「愛情」です。我が国の国土や歴史に対する「愛情」を深めることが、主体的に学習に取り組む態度の一要素として示されています。"
            },
            {
                question: "【第1 地理総合 目標】\n「地理に関わる諸事象に関して、世界の生活文化の多様性や、（　　）、地域や地球的課題への取組などを理解するとともに…」",
                options: ["経済発展", "観光開発", "防災", "都市化"],
                correctAnswer: 2,
                explanation: "正解は「防災」です。地理総合では、自然環境と人間生活の関わりの中で「防災」について理解することが重要視されています。"
            },
            {
                question: "【第1 地理総合 目標（思考・判断・表現）】\n「地理的な課題の解決に向けて（　　）したりする力や、考察、（　　）したことを効果的に説明したり、それらを基に議論したりする力を養う。」",
                options: ["分析", "推論", "計画", "構想"],
                correctAnswer: 3,
                explanation: "正解は「構想」です。課題解決に向けて「構想」する力が、新しい学習指導要領で強調されています。"
            },
            {
                question: "【第1 地理総合 内容A】\n大項目A「地図や（　　）で捉える現代世界」",
                options: ["統計データ", "地理情報システム", "衛星画像", "ビッグデータ"],
                correctAnswer: 1,
                explanation: "正解は「地理情報システム」です。GIS（地理情報システム）を活用して現代世界を捉えることが、地理総合の導入部分の核となります。"
            },
            {
                question: "【第1 地理総合 内容C】\n大項目C「（　　）地域づくりと私たち」",
                options: ["豊かな", "安全な", "グローバルな", "持続可能な"],
                correctAnswer: 3,
                explanation: "正解は「持続可能な」です。SDGsの視点も踏まえ、「持続可能な地域づくり」を主体的に考える学習が求められます。"
            },
            {
                question: "【第1 地理総合 内容の取扱い】\n「その際、教科用図書『（　　）』を十分に活用することとともに、…」",
                options: ["資料集", "統計", "地図", "年表"],
                correctAnswer: 2,
                explanation: "正解は「地図」です。地理の学習において、教科書とは別に教科用図書としての「地図（地図帳）」を十分に活用することが明記されています。"
            },
            {
                question: "【第1 地理総合 内容の取扱い】\n「学習過程では取り扱う内容の（　　）を踏まえることとし、政治的、経済的、生物的、地学的な事象なども必要に応じて扱うこともできるが…」",
                options: ["歴史的背景", "科学的根拠", "国際的影響", "地域的特性"],
                correctAnswer: 0,
                explanation: "正解は「歴史的背景」です。地理的事象の理解には、それが形成された「歴史的背景」を踏まえることが不可欠とされています。"
            },
            {
                question: "【第2 地理探究 目標】\n「世界の空間的な諸事象の規則性、（　　）や、世界の諸地域の地域的特色や課題などを理解するとともに…」",
                options: ["多様性", "普遍性", "傾斜性", "独自性"],
                correctAnswer: 2,
                explanation: "正解は「傾斜性」です。地理探究では、より専門的に空間的な規則性や「傾斜性」に着目します。"
            },
            {
                question: "【第2 地理探究 内容A】\n「現代世界の（　　）的考察」",
                options: ["地誌", "主題", "総合", "系統地理"],
                correctAnswer: 3,
                explanation: "正解は「系統地理」です。内容Aは「系統地理的考察」、内容Bは「地誌的考察」という構成になっています。"
            },
            {
                question: "【第3 歴史総合 目標】\n「（　　）の歴史の変化に関わる諸事象について、世界とその中の日本を広く相互的な視野から捉え…」",
                options: ["古代から現代", "中世以降", "近世以降", "近現代"],
                correctAnswer: 3,
                explanation: "正解は「近現代」です。歴史総合は、18世紀以降の「近現代」の歴史を、世界と日本の関わりの中で捉える科目です。"
            },
            {
                question: "【第3 歴史総合 目標】\n「（　　）とのつながりに着目して、概念などを活用して多面的・多角的に考察したり…」",
                options: ["未来", "過去", "現在", "自分"],
                correctAnswer: 2,
                explanation: "正解は「現在」です。歴史を学ぶ意義として、現在とのつながりを意識することが強調されています。"
            },
            {
                question: "【第3 歴史総合 内容構成】\n内容Cのタイトルは「国際秩序の変化や（　　）と私たち」である。",
                options: ["情報化", "民主化", "産業化", "大衆化"],
                correctAnswer: 3,
                explanation: "正解は「大衆化」です。歴史総合の構成は「近代化」「国際秩序の変化や大衆化」「グローバル化」の3つの柱からなります。"
            },
            {
                question: "【第4 日本史探究 目標】\n「我が国の歴史の展開に関わる諸事象について、地理的条件や世界の歴史と関連付けながら（　　）に捉えて理解するとともに…」",
                options: ["個別的", "網羅的", "総合的", "批判的"],
                correctAnswer: 2,
                explanation: "正解は「総合的」です。日本史を探究する際は、様々な要素を関連付けながら「総合的」に捉えることが求められます。"
            },
            {
                question: "【第4 日本史探究 内容A】\n「原始・古代の日本と（　　）」",
                options: ["中国", "大陸", "東アジア", "世界"],
                correctAnswer: 2,
                explanation: "正解は「東アジア」です。日本の歴史を、東アジア世界との関わりの中で捉える視点が重視されています。"
            },
            {
                question: "【第4 日本史探究 内容の取扱い】\n文化に関する指導に当たっては、衣食住や風習・信仰などの（　　）についても、時代の特色や地域社会の様子などと関連付け…扱うようにすること。",
                options: ["伝統文化", "生活文化", "精神文化", "芸術文化"],
                correctAnswer: 1,
                explanation: "正解は「生活文化」です。政治史だけでなく、人々の生活に根差した文化にも注目します。"
            },
            {
                question: "【第5 世界史探究 目標】\n「世界の歴史の（　　）と展開に関わる諸事象について、地理的条件や日本の歴史と関連付けながら理解するとともに…」",
                options: ["細かな事実", "大きな枠組み", "因果関係", "発展段階"],
                correctAnswer: 1,
                explanation: "正解は「大きな枠組み」です。詳細な知識の暗記よりも、歴史の大きな流れや枠組みを理解することが目標です。"
            },
            {
                question: "【第3款 指導計画の作成】\n「単元など内容や時間のまとまりを見通して，その中で育む資質・能力の育成に向けて，生徒の主体的・（　　）で深い学びの実現を図るようにすること。」",
                options: ["協働的", "活動的", "対話的", "実践的"],
                correctAnswer: 2,
                explanation: "正解は「対話的」です。いわゆる「アクティブ・ラーニング」の視点（主体的・対話的で深い学び）による授業改善が求められます。"
            },
            {
                question: "【第3款 指導計画の作成（履修構造）】\n必履修科目（全ての生徒に履修させる科目）の組み合わせとして正しいものはどれか。",
                options: [
                    "地理総合 と 歴史総合",
                    "地理総合 と 日本史探究",
                    "歴史総合 と 公共",
                    "地理総合 と 世界史探究"
                ],
                correctAnswer: 0,
                explanation: "正解は「地理総合 と 歴史総合」です。この2科目を履修した後に、探究科目を選択履修する構造になっています。"
            },
            {
                question: "【第3款 指導計画の作成（配慮事項）】\n「（　　）生徒などについては，学習活動を行う場合に生じる困難さに応じた指導内容や指導方法の工夫を計画的，組織的に行うこと。」",
                options: ["不登校の", "日本語指導が必要な", "障害のある", "学力に課題のある"],
                correctAnswer: 2,
                explanation: "正解は「障害のある」です。インクルーシブ教育システムの構築に向けた配慮事項です。"
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let currentQuizList = [];
        let reviewQueue = [];
        let isReviewMode = false;
        let isAnswered = false;
        let quitConfirmTimeout;

        // DOM要素
        const progressEl = document.getElementById('quiz-progress');
        const questionEl = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const feedbackArea = document.getElementById('feedback-area');
        const feedbackTitle = document.getElementById('feedback-title');
        const explanationText = document.getElementById('explanation-text');
        const nextBtn = document.getElementById('next-btn');
        const quizCard = document.getElementById('quiz-card');
        const resultArea = document.getElementById('result-area');
        const scoreDisplay = document.getElementById('score-display');
        const resultMessage = document.getElementById('result-message');
        const resultTitle = document.getElementById('result-title');
        const resultSubtitle = document.getElementById('result-subtitle');
        const actionContainer = document.getElementById('result-action-container');
        const backToTopBtn = document.getElementById('back-to-top');
        const quitBtn = document.getElementById('quit-btn');
        const flashcardsSection = document.getElementById('flashcards-section');

        // クイズの初期化
        function initQuiz() {
            currentQuizList = [...quizData];
            reviewQueue = [];
            isReviewMode = false;
            currentQuestionIndex = 0;
            score = 0;
            isAnswered = false;
            resetQuitButton();
            
            resultArea.style.display = 'none';
            flashcardsSection.style.display = 'none';
            quizCard.style.display = 'block';
            nextBtn.textContent = "次の問題へ";
            
            if (resultTitle && resultSubtitle) {
                resultTitle.textContent = "学習完了！お疲れ様でした。";
                resultSubtitle.style.display = "block";
            }

            loadQuestion();
        }

        // クイズの表示
        function loadQuestion() {
            const currentQuiz = currentQuizList[currentQuestionIndex];
            isAnswered = false;
            resetQuitButton();
            
            // 進捗表示
            if (isReviewMode) {
                progressEl.textContent = `復習モード：問題 ${currentQuestionIndex + 1} / ${currentQuizList.length}`;
            } else {
                progressEl.textContent = `問題 ${currentQuestionIndex + 1} / ${currentQuizList.length}`;
            }
            questionEl.textContent = currentQuiz.question;
            
            // 選択肢生成
            optionsContainer.innerHTML = '';
            currentQuiz.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.textContent = `${index + 1}. ${option}`;
                button.classList.add('option-btn');
                button.onclick = () => checkAnswer(index, button);
                optionsContainer.appendChild(button);
            });

            feedbackArea.style.display = 'none';
        }

        // 解答チェック
        function checkAnswer(selectedIndex, selectedButton) {
            if (isAnswered) return;
            isAnswered = true;

            const currentQuiz = currentQuizList[currentQuestionIndex];
            const optionButtons = document.querySelectorAll('.option-btn');
            
            optionButtons.forEach(btn => btn.disabled = true);

            if (selectedIndex === currentQuiz.correctAnswer) {
                selectedButton.classList.add('correct');
                feedbackTitle.textContent = "⭕ 正解！";
                feedbackTitle.className = "feedback-correct";
                if (!isReviewMode) score++;
            } else {
                selectedButton.classList.add('incorrect');
                optionButtons[currentQuiz.correctAnswer].classList.add('correct');
                feedbackTitle.textContent = "❌ 不正解...";
                feedbackTitle.className = "feedback-incorrect";
                reviewQueue.push(currentQuiz);
            }

            explanationText.textContent = currentQuiz.explanation;
            feedbackArea.style.display = 'block';

            if (currentQuestionIndex === currentQuizList.length - 1) {
                if (isReviewMode && reviewQueue.length > 0) {
                    nextBtn.textContent = "間違えた問題をもう一度復習する";
                } else {
                    nextBtn.textContent = "結果を見る";
                }
            } else {
                nextBtn.textContent = "次の問題へ";
            }
        }

        // 次の問題へ
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < currentQuizList.length) {
                loadQuestion();
            } else {
                if (isReviewMode) {
                    if (reviewQueue.length > 0) {
                        startReviewRound();
                    } else {
                        showPerfectResult();
                    }
                } else {
                    showResult();
                }
            }
        }

        // 復習ラウンド
        function startReviewRound() {
            isReviewMode = true;
            currentQuizList = [...reviewQueue];
            reviewQueue = [];
            currentQuestionIndex = 0;
            isAnswered = false;
            resetQuitButton();
            
            resultArea.style.display = 'none';
            flashcardsSection.style.display = 'none';
            quizCard.style.display = 'block';
            nextBtn.textContent = "次の問題へ";
            
            loadQuestion();
        }

        // 結果画面
        function showResult() {
            quizCard.style.display = 'none';
            resultArea.style.display = 'block';
            scoreDisplay.textContent = `${score} / ${quizData.length}`;
            
            actionContainer.innerHTML = '';

            let msg = "";
            const percentage = score / quizData.length;
            if (percentage === 1) {
                msg = "全問正解！学習指導要領の読み込みは完璧ですね！";
                const restartBtn = document.createElement('button');
                restartBtn.className = 'action-btn';
                restartBtn.textContent = "最初からやり直す";
                restartBtn.onclick = initQuiz;
                actionContainer.appendChild(restartBtn);
            } else {
                if (percentage >= 0.6) {
                    msg = "素晴らしい成績です！間違えた箇所を復習して本番に備えましょう。";
                } else {
                    msg = "学習指導要領をもう一度確認し、頻出キーワードを押さえましょう。";
                }
                
                const reviewBtn = document.createElement('button');
                reviewBtn.className = 'action-btn';
                reviewBtn.style.backgroundColor = 'var(--incorrect-color)';
                reviewBtn.textContent = `間違えた問題（${reviewQueue.length}問）を復習する`;
                reviewBtn.onclick = startReviewRound;
                actionContainer.appendChild(reviewBtn);

                const restartBtn = document.createElement('button');
                restartBtn.className = 'action-btn';
                restartBtn.style.marginTop = '1rem';
                restartBtn.textContent = "最初からやり直す";
                restartBtn.onclick = initQuiz;
                actionContainer.appendChild(restartBtn);
            }
            resultMessage.textContent = msg;
            generateFlashcards();
        }

        // 復習完了画面
        function showPerfectResult() {
            quizCard.style.display = 'none';
            resultArea.style.display = 'block';
            resultTitle.textContent = "復習完了！🎉";
            resultSubtitle.style.display = "none";
            scoreDisplay.textContent = "PERFECT";
            resultMessage.textContent = "間違えた問題をすべて正解できました。この調子で頑張りましょう！";
            
            actionContainer.innerHTML = '';
            const restartBtn = document.createElement('button');
            restartBtn.className = 'action-btn';
            restartBtn.textContent = "最初からやり直す";
            restartBtn.onclick = initQuiz;
            actionContainer.appendChild(restartBtn);

            generateFlashcards();
        }

        // 終了ボタン
        function handleQuitClick() {
            if (quitBtn.classList.contains('confirming')) {
                clearTimeout(quitConfirmTimeout);
                finishQuizEarly();
            } else {
                quitBtn.textContent = "本当に終了しますか？";
                quitBtn.classList.add('confirming');
                quitConfirmTimeout = setTimeout(resetQuitButton, 3000);
            }
        }

        function resetQuitButton() {
            if(quitBtn) {
                quitBtn.textContent = "途中で終了して結果へ";
                quitBtn.classList.remove('confirming');
            }
        }

        function finishQuizEarly() {
            let startIndex = isAnswered ? currentQuestionIndex + 1 : currentQuestionIndex;
            for (let i = startIndex; i < currentQuizList.length; i++) {
                if (!reviewQueue.includes(currentQuizList[i])) {
                    reviewQueue.push(currentQuizList[i]);
                }
            }
            if (isReviewMode && reviewQueue.length === 0) {
                showPerfectResult();
            } else {
                showResult();
            }
        }

        // 暗記カード
        function toggleBlank(el) {
            const card = el.closest('.flashcard');
            const explanation = card.querySelector('.flashcard-explanation');
            
            if (el.classList.contains('revealed')) {
                el.textContent = el.getAttribute('data-placeholder');
                el.classList.remove('revealed');
            } else {
                el.textContent = el.getAttribute('data-answer');
                el.classList.add('revealed');
            }

            const allBlanks = card.querySelectorAll('.blank-spot');
            const anyRevealed = Array.from(allBlanks).some(blank => blank.classList.contains('revealed'));
            if (anyRevealed) explanation.style.display = 'block';
            else explanation.style.display = 'none';
        }

        function toggleAllBlanks(show) {
            const blanks = document.querySelectorAll('.blank-spot');
            blanks.forEach(el => {
                if (show && !el.classList.contains('revealed')) {
                    el.textContent = el.getAttribute('data-answer');
                    el.classList.add('revealed');
                } else if (!show && el.classList.contains('revealed')) {
                    el.textContent = el.getAttribute('data-placeholder');
                    el.classList.remove('revealed');
                }
            });
            const explanations = document.querySelectorAll('.flashcard-explanation');
            explanations.forEach(exp => exp.style.display = show ? 'block' : 'none');
        }

        function generateFlashcards() {
            const container = document.getElementById('flashcards-container');
            container.innerHTML = '';
            
            quizData.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'flashcard';
                
                let qText = q.question;
                let titleMatch = qText.match(/^【(.*?)】/);
                let titleStr = titleMatch ? titleMatch[0] : `問題 ${index + 1}`;
                if (titleMatch) qText = qText.replace(titleMatch[0], '').trim();

                const correctAnswerText = q.options[q.correctAnswer];
                let htmlText = '';

                if (qText.includes('（　　）')) {
                    htmlText = qText.replace(/（　　）/g, `<span class="blank-spot" data-answer="${correctAnswerText}" data-placeholder="　　　" onclick="toggleBlank(this)">　　　</span>`);
                } else {
                    htmlText = `${qText}<br><br><strong>正解：</strong><span class="blank-spot" data-answer="${correctAnswerText}" data-placeholder="　　　" onclick="toggleBlank(this)">　　　</span>`;
                }

                card.innerHTML = `
                    <h4>${titleStr}</h4>
                    <p>${htmlText}</p>
                    <p class="flashcard-explanation"><strong>解説：</strong>${q.explanation}</p>
                `;
                container.appendChild(card);
            });
            flashcardsSection.style.display = 'block';
        }

        // スクロールトップ
        window.onscroll = function() {
            if (document.body.scrollTop > 100 || document.documentElement.scrollTop > 100) {
                backToTopBtn.style.display = "flex";
            } else {
                backToTopBtn.style.display = "none";
            }
        };

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        initQuiz();
    </script>
</body>
</html>
