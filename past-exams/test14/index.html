<!DOCTYPE html>

    <style>

        /* タイマー枠の固定 */
        .timer-box {
            font-variant-numeric: tabular-nums;
        }

        /* 選択式のセレクトボックススタイル */
        .blank-select {
            border: 1px solid #cbd5e1;
            background-color: #fff;
            padding: 6px 32px 6px 12px;
            width: 100%;
            max-width: 120px; /* 数字選択用に幅を狭く調整 */
            border-radius: 4px;
            outline: none;
            font-size: 1rem;
            color: #333;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23333' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 16px;
            transition: border-color 0.2s;
        }
        .blank-select:focus {
            border-color: #005b82;
            box-shadow: 0 0 0 2px rgba(0, 91, 130, 0.2);
        }

        /* サイドバー用カスタムスクロールバー */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-[#e8ecef] text-gray-800 font-sans min-h-screen flex flex-col">

            <div class="flex justify-center gap-4 mt-8">

                        <!-- 解答エリア (グレー枠) -->

                <!-- フッターナビゲーション -->

            </div>
        </section>

        <!-- ================= 確認モーダル ================= -->
        <div id="submit-modal" class="hidden fixed inset-0 bg-black bg-opacity-40 z-50 flex justify-center items-center backdrop-blur-sm p-4">

            <div class="flex justify-center pb-8">

                    もう一度挑戦する
                </button>
            </div>
        </section>

    </main>

    <script>
        // --- データ定義 (全30問) ---
        const baseQuestions = [
            {
                title: "教育の目的 (教育基本法第1条)",
                text: "教育は、教育基本法第1条に定めるとおり、（　ア　）を目指し、平和で民主的な国家及び社会の形成者として必要な資質を備えた心身ともに健康な国民の育成を期すという目的のもと、同法第2条に掲げる次の目標を達成するよう行われなければならない。\n\n1. 人格の完成\n2. 真理の探究\n3. 個性の伸長\n4. 豊かな人間性",
                correctAnswer: "1",
                options: ["1", "2", "3", "4"],
                explanation: "前文より。教育基本法第1条に定められている教育の目的は「人格の完成」です。"
            },
            {
                title: "学習指導要領 前文",
                text: "これからの学校には、(略)豊かな人生を切り拓き、（　ア　）となることができるようにすることが求められる。このために必要な教育の在り方を具体化するのが、各学校において教育の内容等を組織的かつ計画的に組み立てた教育課程である。\n教育課程を通して、これからの時代に求められる教育を実現していくためには、よりよい学校教育を通してよりよい社会を創るという理念を学校と社会とが共有し、(略)社会との連携及び協働によりその実現を図っていくという、（　イ　）の実現が重要となる。\n\n1. ア:平和で民主的な国家及び社会の形成者　イ:社会に開かれた教育課程\n2. ア:持続可能な社会の創り手　イ:カリキュラム・マネジメント\n3. ア:持続可能な社会の創り手　イ:社会に開かれた教育課程\n4. ア:平和で民主的な国家及び社会の形成者　イ:カリキュラム・マネジメント",
                correctAnswer: "3",
                options: ["1", "2", "3", "4"],
                explanation: "前文より。生徒には「持続可能な社会の創り手」となることが求められ、そのために「社会に開かれた教育課程」の実現が重要であると明記されています。"
            },
            {
                title: "第1 中学校教育の基本",
                text: "各学校においては、教育基本法及び学校教育法その他の法令並びにこの章以下に示すところに従い、生徒の人間として調和のとれた育成を目指し、生徒の（　ア　）や特性及び学校や（　イ　）の実態を十分考慮して、適切な教育課程を編成するものとし、これらに掲げる目標を達成するよう教育を行うものとする。\n\n1. ア: 心身の発達の段階　イ: 地域\n2. ア: 興味・関心　イ: 地域\n3. ア: 心身の発達の段階　イ: 家庭\n4. ア: 興味・関心　イ: 家庭",
                correctAnswer: "1",
                options: ["1", "2", "3", "4"],
                explanation: "総則第1の1より。生徒の「心身の発達の段階」や特性、学校や「地域」の実態を十分考慮して教育課程を編成します。"
            },
            {
                title: "第1の2(1) 基礎的・基本的な知識及び技能",
                text: "（　ア　）を確実に習得させ、これらを活用して課題を解決するために必要な（　イ　）等を育むとともに、主体的に学習に取り組む態度を養い、個性を生かし多様な人々との協働を促す教育の充実に努めること。\n\n1. ア: 基礎的・基本的な知識及び技能　イ: 思考力、判断力、表現力\n2. ア: 知識及び技能　イ: 思考力、判断力、表現力\n3. ア: 基礎的・基本的な知識及び技能　イ: 論理的思考力\n4. ア: 知識及び技能　イ: 論理的思考力",
                correctAnswer: "1",
                options: ["1", "2", "3", "4"],
                explanation: "総則第1の2(1)より。「基礎的・基本的な知識及び技能」を習得させ、「思考力、判断力、表現力」等を育むことが明記されています。"
            },
            {
                title: "第1の2(1) 学習の基盤と学習習慣",
                text: "その際、生徒の発達の段階を考慮して、生徒の（　ア　）など、学習の基盤をつくる活動を充実するとともに、家庭との連携を図りながら、生徒の（　イ　）が確立するよう配慮すること。\n\n1. ア: 言語活動　イ: 基本的生活習慣\n2. ア: 体験活動　イ: 学習習慣\n3. ア: 言語活動　イ: 学習習慣\n4. ア: 探究活動　イ: 基本的生活習慣",
                correctAnswer: "3",
                options: ["1", "2", "3", "4"],
                explanation: "総則第1の2(1)より。学習の基盤をつくる活動として「言語活動」を充実させ、家庭と連携して「学習習慣」が確立するよう配慮します。"
            },
            {
                title: "第1の2(2) 道徳教育",
                text: "学校における道徳教育は、特別の教科である道徳 (以下「道徳科」という。) を（　ア　）として学校の教育活動全体を通じて行うものであり、道徳科はもとより、各教科、総合的な学習の時間及び特別活動のそれぞれの特質に応じて、生徒の発達の段階を考慮して、適切な指導を行うこと。\n\n1. 中心\n2. 要\n3. 基盤\n4. 中核",
                correctAnswer: "2",
                options: ["1", "2", "3", "4"],
                explanation: "総則第1の2(2)より。学校における道徳教育は、道徳科を「要（かなめ）」として学校の教育活動全体を通じて行います。"
            },
            {
                title: "第1の2(3) 体育・健康に関する指導",
                text: "特に、学校における（　ア　）の推進並びに体力の向上に関する指導、安全に関する指導及び心身の健康の保持増進に関する指導については、保健体育科、技術・家庭科及び特別活動の時間はもとより、各教科、道徳科及び総合的な学習の時間などにおいてもそれぞれの特質に応じて適切に行うよう努めること。\n\n1. 食育\n2. 健康教育\n3. 防災教育\n4. キャリア教育",
                correctAnswer: "1",
                options: ["1", "2", "3", "4"],
                explanation: "総則第1の2(3)より。「食育の推進」並びに体力の向上、安全に関する指導等が明記されています。"
            },
            {
                title: "第1の3 資質・能力の3つの柱",
                text: "生きる力を育むことを目指すに当たっては、(略)どのような資質・能力の育成を目指すのかを明確にしながら、教育活動の充実を図るものとする。その際、生徒の発達の段階や特性等を踏まえつつ、次に掲げることが偏りなく実現できるようにするものとする。\n(1) （　ア　）が習得されるようにすること。\n(2) 思考力、判断力、表現力等を育成すること。\n(3) （　イ　）等を涵(かん)養すること。\n\n1. ア: 基礎的・基本的な知識及び技能　イ: 学びに向かう力、人間性\n2. ア: 知識及び技能　イ: 学びに向かう力、人間性\n3. ア: 基礎的・基本的な知識及び技能　イ: 豊かな情操と道徳心\n4. ア: 知識及び技能　イ: 豊かな情操と道徳心",
                correctAnswer: "2",
                options: ["1", "2", "3", "4"],
                explanation: "総則第1の3より。育成を目指す資質・能力の3つの柱は「(1)知識及び技能」「(2)思考力、判断力、表現力等」「(3)学びに向かう力、人間性等」です。"
            },
            {
                title: "第1の4 カリキュラム・マネジメント",
                text: "各学校においては、生徒や学校、地域の実態を適切に把握し、教育の目的や目標の実現に必要な教育の内容等を教科等横断的な視点で組み立てていくこと、教育課程の実施状況を評価してその改善を図っていくこと、教育課程の実施に必要な人的又は物的な体制を確保するとともにその改善を図っていくことなどを通して、教育課程に基づき組織的かつ計画的に各学校の教育活動の質の向上を図っていくこと（　ア　）に努めるものとする。\n\n1. スクール・マネジメント\n2. カリキュラム・マネジメント\n3. 学校評価\n4. 社会に開かれた教育課程",
                correctAnswer: "2",
                options: ["1", "2", "3", "4"],
                explanation: "総則第1の4より。教育活動の質を組織的・計画的に向上させる取組を「カリキュラム・マネジメント」といいます。"
            },
            {
                title: "第2の1 教育課程の編成方針の共有",
                text: "教育課程の編成に当たっては、(略)各学校の教育目標を明確にするとともに、教育課程の編成についての基本的な方針が（　ア　）や（　イ　）とも共有されるよう努めるものとする。その際、第4章総合的な学習の時間の第2の1に基づき定められる目標との関連を図るものとする。\n\n1. ア: 家庭　イ: 地域\n2. ア: 教職員　イ: 保護者\n3. ア: 生徒　イ: 保護者\n4. ア: 家庭　イ: 関係機関",

                    text: q.text,
                    correctAnswer: q.correctAnswer,
                    options: q.options,
                    explanation: q.explanation
                });
                userAnswers.push(""); 
            });
        }

        // --- 問題の描画 ---
        function renderQuestion(index) {
            const q = parsedQuestions[index];
            
            els.qNumberTitle.innerHTML = `【問題 ${index + 1}】<span class="text-xs ml-2 font-normal text-gray-700">（1点）</span>`;
            
            // XSS対策を先に行い、その後に改行を反映
            let displayText = q.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            displayText = displayText.replace(/\n/g, '<br>');

            els.qBody.innerHTML = displayText;
            applyFontSize(); // 問題切り替え時にも現在のフォントサイズを適用
            
            els.qProgress.textContent = `${index + 1} / ${parsedQuestions.length}`;

            // 解答枠の生成 (セレクトボックス強制)
            els.inputArea.innerHTML = '';
            
            const select = document.createElement('select');
            select.className = 'blank-select';
            
            const defaultOption = document.createElement('option');
            defaultOption.value = "";
            defaultOption.textContent = "-"; 
            select.appendChild(defaultOption);

            q.options.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt;
                option.textContent = opt;
                if (userAnswers[index] === opt) {
                    option.selected = true;
                }
                select.appendChild(option);
            });

            select.addEventListener('change', (e) => {
                userAnswers[index] = e.target.value;
                updateNavigations();
            });
            els.inputArea.appendChild(select);

            // ボタンの表示制御
            els.prevBtn.disabled = index === 0;
            if (index === parsedQuestions.length - 1) {
                els.nextBtn.classList.add('hidden');
                els.submitConfirmBtn.classList.remove('hidden');
            } else {
                els.nextBtn.classList.remove('hidden');
                els.submitConfirmBtn.classList.add('hidden');
            }
        }

        function navigateQuestion(step) {
            const newIndex = currentQuestionIndex + step;
            if (newIndex >= 0 && newIndex < parsedQuestions.length) {
                currentQuestionIndex = newIndex;
                renderQuestion(currentQuestionIndex);
                updateNavigations(); 
            }
        }

        // --- UIの更新 ---
        function updateNavigations() {
            updateSidebarList();
            updateDrawerList();
        }

        function updateSidebarList() {
            els.desktopSidebar.innerHTML = '';
            parsedQuestions.forEach((q, idx) => {
                const button = document.createElement('button');
                const isActive = idx === currentQuestionIndex;
                
                let baseClass = "text-center px-2 py-2 rounded font-medium transition border text-sm shadow-sm ";
                if (isActive) {
                    baseClass += "bg-[#bfdbfe] text-black border-[#93c5fd]"; 
                } else {
                    baseClass += "bg-[#e2e8f0] text-gray-700 border-[#cbd5e1] hover:bg-[#cbd5e1]";
                }
                
                button.className = baseClass;
                button.innerHTML = `【問${idx + 1}】`;
                
                button.addEventListener('click', () => {
                    currentQuestionIndex = idx;
                    renderQuestion(currentQuestionIndex);
                    updateNavigations();
                });
                
                els.desktopSidebar.appendChild(button);
            });
        }

        function updateDrawerList() {
            els.drawerList.innerHTML = '';
            parsedQuestions.forEach((q, idx) => {
                const li = document.createElement('li');
                const isActive = idx === currentQuestionIndex;
                
                li.className = `p-3 mb-1 rounded cursor-pointer transition text-sm ${isActive ? 'bg-[#bfdbfe] font-bold text-black border border-[#93c5fd]' : 'bg-[#e2e8f0] border border-[#cbd5e1] hover:bg-[#cbd5e1] text-gray-700'}`;
                li.innerHTML = `<div class="text-center">【問題${idx + 1}】</div>`;
                
                li.addEventListener('click', () => {
                    currentQuestionIndex = idx;
                    renderQuestion(currentQuestionIndex);
                    closeDrawer(); 
                    updateNavigations();
                });
                
                els.drawerList.appendChild(li);
            });
        }

        function openDrawer() {
            els.drawerMenu.classList.remove('-translate-x-full');
            els.drawerOverlay.classList.remove('hidden');
        }

        function closeDrawer() {
            els.drawerMenu.classList.add('-translate-x-full');
            els.drawerOverlay.classList.add('hidden');
        }

        // --- テスト終了・採点処理 ---
        function finishTest() {
            let correctCount = 0;
            els.resultDetails.innerHTML = '';

            parsedQuestions.forEach((q, idx) => {
                const userAnswer = userAnswers[idx];
                const isCorrect = userAnswer === q.correctAnswer;
                if (isCorrect) correctCount++;

                const resultCard = document.createElement('div');
                resultCard.className = `p-3 md:p-4 rounded border-l-4 ${isCorrect ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'} shadow-sm`;
                
                const icon = isCorrect 
                    ? `<span class="text-green-600 font-bold text-sm md:text-base">○ 正解</span>` 
                    : `<span class="text-red-600 font-bold text-sm md:text-base">× 不正解</span>`;

                let correctHtmlText = q.text.replace(/</g, "&lt;").replace(/>/g, "&gt;"); // XSS対策
                correctHtmlText = correctHtmlText.replace(/\n/g, '<br>');

                const explanationHtml = q.explanation 
                    ? `<div class="mt-3 p-2.5 bg-white border border-gray-200 rounded text-xs md:text-sm text-gray-700 leading-relaxed"><span class="font-bold text-gray-600 block mb-1">【解説】</span>${q.explanation.replace(/\n/g, '<br>')}</div>` 
                    : '';

                resultCard.innerHTML = `
                    <div class="flex justify-between items-center mb-2 border-b border-gray-200 pb-2">
                        <h4 class="font-bold text-gray-800 text-sm md:text-base">問 ${idx + 1}: <span class="text-xs md:text-sm font-normal text-gray-600">${q.title}</span></h4>
                        ${icon}
                    </div>
                    <div class="text-xs md:text-sm text-gray-700 bg-white p-3 rounded border border-gray-200 mb-2 whitespace-pre-wrap break-words">${correctHtmlText}</div>
                    <div class="grid grid-cols-2 gap-2 text-xs md:text-sm mt-2">
                        <div class="bg-white p-2 rounded border border-gray-100 shadow-sm flex flex-col items-center justify-center">
                            <span class="text-gray-500 block text-[10px] md:text-xs mb-1">あなたの解答</span>
                            <span class="font-bold ${isCorrect ? 'text-green-700' : 'text-red-700'} text-base md:text-lg">${userAnswer || '未解答'}</span>
                        </div>
                        <div class="bg-white p-2 rounded border border-gray-100 shadow-sm flex flex-col items-center justify-center">
                            <span class="text-gray-500 block text-[10px] md:text-xs mb-1">正解</span>
                            <span class="font-bold text-blue-700 text-base md:text-lg">${q.correctAnswer}</span>
                        </div>
                    </div>
                    ${explanationHtml}
                `;
                els.resultDetails.appendChild(resultCard);
            });

            els.scoreDisplay.textContent = `${correctCount} / ${parsedQuestions.length}`;
            
            screens.test.classList.add('hidden');
            screens.test.classList.remove('flex');
            screens.result.classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
