        // --- グローバル変数 ---
        let currentSectionIndex = 0; 
        let currentFontSizeLevel = 3; // 初期状態を「普通」（インデックス3）に設定
        let isAllRevealed = false; // 全体表示トグルの状態
        const fontSizeClasses = [
            'text-xs md:text-sm',     // 0: 小
            'text-[11px] md:text-xs', // 1: 小小
            'text-base md:text-lg',   // 2: 大
            'text-sm md:text-base'    // 3: 普通
        ];

        // --- DOM要素 ---
        const els = {
            menuBtn: document.getElementById('menu-btn'),
            drawerOverlay: document.getElementById('drawer-overlay'),
            drawerMenu: document.getElementById('drawer-menu'),
            drawerList: document.getElementById('drawer-list'),
            closeMenuBtn: document.getElementById('close-menu-btn'),
            fontSizeBtn: document.getElementById('font-size-btn'),
            toggleAllBtn: document.getElementById('toggle-all-btn'),
            
            desktopSidebar: document.getElementById('desktop-sidebar'),
            headerSectionTitle: document.getElementById('header-section-title'),
            notesContainer: document.getElementById('notes-container'),
            sectionProgress: document.getElementById('section-progress'),
            
            prevBtn: document.getElementById('prev-btn'),
            nextBtn: document.getElementById('next-btn')
        };

        // --- 初期化 ---
        function initApp() {
            // イベントリスナー登録
            els.prevBtn.addEventListener('click', () => navigateSection(-1));
            els.nextBtn.addEventListener('click', () => navigateSection(1));
            
            els.menuBtn.addEventListener('click', openDrawer);
            els.closeMenuBtn.addEventListener('click', closeDrawer);
            els.drawerOverlay.addEventListener('click', closeDrawer);

            els.fontSizeBtn.addEventListener('click', () => {
                currentFontSizeLevel = (currentFontSizeLevel + 1) % fontSizeClasses.length;
                applyFontSize();
            });

            els.toggleAllBtn.addEventListener('click', toggleAllTapes);

            // 初期レンダリング
            renderSection(currentSectionIndex);
            updateNavigations();
        }

        // --- 全テープ一括トグル ---
        function toggleAllTapes() {
            isAllRevealed = !isAllRevealed;
            const tapes = document.querySelectorAll('.mask-tape');
            tapes.forEach(tape => {
                if (isAllRevealed) {
                    tape.classList.add('revealed');
                } else {
                    tape.classList.remove('revealed');
                }
            });
        }

        // --- フォントサイズ適用 (コンテナ内の全問題文に適用) ---
        function applyFontSize() {
            const bodies = document.querySelectorAll('.note-body-text');
            const baseClasses = "text-gray-800 leading-loose break-words note-body-text";
            bodies.forEach(body => {
                body.className = `${fontSizeClasses[currentFontSizeLevel]} ${baseClasses}`;
            });
        }

        // --- セクションの描画 ---
        function renderSection(sectionIndex) {
            const section = masterData[sectionIndex];
            
            // ヘッダータイトルの更新
            els.headerSectionTitle.textContent = section.sectionTitle;
            els.notesContainer.innerHTML = ''; // クリア

            // 全体表示状態をリセット
            isAllRevealed = false;

            // セクション内の各段落を生成
            section.paragraphs.forEach((p) => {
                const pDiv = document.createElement('div');
                pDiv.className = 'bg-white border border-gray-200 rounded p-4 md:p-6 shadow-sm';
                
                const textContainer = document.createElement('div');
                textContainer.className = 'note-body-text text-gray-800 leading-loose break-words';
                
                // XSS対策とプレースホルダー置換
                let safeText = p.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                
                p.blanks.forEach((correctAnswer, bIdx) => {
                    const regex = new RegExp(`\\{${bIdx}\\}`, 'g');
                    const tapeHtml = `<span class="mask-tape" onclick="this.classList.toggle('revealed')">${correctAnswer}</span>`;
                    safeText = safeText.replace(regex, tapeHtml);
                });

                // 改行をbrに変換
                safeText = safeText.replace(/\n/g, '<br>');
                
                textContainer.innerHTML = safeText;
                pDiv.appendChild(textContainer);
                els.notesContainer.appendChild(pDiv);
            });

            applyFontSize();
            
            // 進捗とボタンの表示制御
            els.sectionProgress.textContent = `${sectionIndex + 1} / ${masterData.length}`;

            els.prevBtn.disabled = sectionIndex === 0;
            els.nextBtn.disabled = sectionIndex === masterData.length - 1;
            
            // スクロールをトップに戻す
            window.scrollTo(0, 0);
        }

        function navigateSection(step) {
            const newIndex = currentSectionIndex + step;
            if (newIndex >= 0 && newIndex < masterData.length) {
                currentSectionIndex = newIndex;
                renderSection(currentSectionIndex);
                updateNavigations(); 
            }
        }

        // --- UIの更新 ---
        function updateNavigations() {
            updateSidebarList();
            updateDrawerList();
        }

        function updateSidebarList() {
            els.desktopSidebar.innerHTML = '';
            masterData.forEach((sec, idx) => {
                const button = document.createElement('button');
                const isActive = idx === currentSectionIndex;
                
                let baseClass = "text-left px-3 py-3 rounded font-medium transition border text-sm shadow-sm w-full ";
                
                if (isActive) {
                    baseClass += "bg-[#bfdbfe] text-[#005b82] border-[#93c5fd]"; 
                } else {
                    baseClass += "bg-white text-gray-700 border-[#cbd5e1] hover:bg-gray-50";
                }
                
                button.className = baseClass;
                button.innerHTML = sec.sectionTitle;
                
                button.addEventListener('click', () => {
                    currentSectionIndex = idx;
                    renderSection(currentSectionIndex);
                    updateNavigations();
                });
                
                els.desktopSidebar.appendChild(button);
            });
        }

        function updateDrawerList() {
            els.drawerList.innerHTML = '';
            masterData.forEach((sec, idx) => {
                const li = document.createElement('li');
                const isActive = idx === currentSectionIndex;
                
                let baseClass = "p-3 mb-2 rounded cursor-pointer transition text-sm border ";
                if (isActive) {
                    baseClass += "bg-[#bfdbfe] font-bold text-[#005b82] border-[#93c5fd]";
                } else {
                    baseClass += "bg-white text-gray-700 border-[#cbd5e1] hover:bg-gray-50";
                }

                li.className = baseClass;
                li.innerHTML = sec.sectionTitle;
                
                li.addEventListener('click', () => {
                    currentSectionIndex = idx;
                    renderSection(currentSectionIndex);
                    closeDrawer(); 
                    updateNavigations();
                });
                
                els.drawerList.appendChild(li);
            });
        }

        function openDrawer() {
            els.drawerMenu.classList.remove('-translate-x-full');
            els.drawerOverlay.classList.remove('hidden');
        }

        function closeDrawer() {
            els.drawerMenu.classList.add('-translate-x-full');
            els.drawerOverlay.classList.add('hidden');
        }

        document.addEventListener('DOMContentLoaded', initApp);

    </script>
