<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教員採用試験対策まとめ - n-kyozai</title>
    <!-- Lucide Icons for sidebar -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8fafc;
            --text-color: #334155;
            --sidebar-width: 260px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
        }

        /* サイドバー */
        .sidebar {
            width: var(--sidebar-width);
            background-color: white;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            border-right: 1px solid #e2e8f0;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px;
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--primary-color);
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-menu {
            padding: 12px 0;
        }

        .nav-category {
            padding: 12px 24px 8px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            font-weight: 600;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 10px 24px;
            color: #64748b;
            text-decoration: none;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .nav-item:hover {
            background-color: #f1f5f9;
            color: var(--accent-color);
        }

        .nav-item i {
            margin-right: 12px;
            width: 18px;
        }

        /* メインコンテンツ */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* バナーセクション */
        .banner-container {
            width: 100%;
            height: 350px;
            overflow: hidden;
            position: relative;
        }

        .banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .banner-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.6));
            padding: 40px;
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px;
        }

        .site-title {
            font-size: 2rem;
            margin-bottom: 24px;
            color: var(--primary-color);
            border-left: 6px solid var(--accent-color);
            padding-left: 15px;
        }

        /* カテゴリーボタン（丸い枠） */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .cat-btn {
            display: block;
            padding: 15px;
            text-align: center;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 50px; /* 手書きラフに合わせた丸い形状 */
            text-decoration: none;
            color: var(--primary-color);
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: var(--shadow);
        }

        .cat-btn:hover {
            border-color: var(--accent-color);
            background-color: var(--accent-color);
            color: white;
            transform: translateY(-2px);
        }

        /* セクション枠 */
        .section-box {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            border: 1px solid #e2e8f0;
        }

        .section-title {
            font-size: 1.25rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-color);
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 8px;
        }

        .info-list {
            list-style: none;
        }

        .info-item {
            padding: 10px 0;
            border-bottom: 1px dashed #e2e8f0;
            display: flex;
            justify-content: space-between;
        }

        .info-date {
            color: #94a3b8;
            font-size: 0.85rem;
        }

        /* お役立ちリンク */
        .link-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .useful-link {
            color: var(--accent-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .useful-link:hover {
            text-decoration: underline;
        }

        /* スクロールボタン */
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background-color: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: none;
            opacity: 0.8;
            transition: 0.3s;
        }

        .scroll-top:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* モバイル対応 */
        @media (max-width: 768px) {
            .sidebar {
                display: none; /* スマホでは簡易化のため非表示、またはトグルが必要 */
            }
            .main-content {
                margin-left: 0;
            }
            .banner-container {
                height: 200px;
            }
            .site-title {
                font-size: 1.5rem;
            }
            .link-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
