    <script>
        lucide.createIcons();

        // --- サイドバー制御 ---
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        const toggleSidebar = () => {
            const isActive = sidebar.classList.contains('active');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            menuToggle.innerHTML = isActive ? '<i data-lucide="menu"></i>' : '<i data-lucide="x"></i>';
            lucide.createIcons();
            document.body.style.overflow = isActive ? '' : 'hidden';
        };

        if (menuToggle) menuToggle.addEventListener('click', toggleSidebar);
        if (overlay) overlay.addEventListener('click', toggleSidebar);

        // --- 問題データ（全20問・形式混合） ---
        const quizData = [
            {
                type: "穴埋め",
                question: "ヤマト政権において、大王（天皇）の直轄領を【　　　】といい、有力豪族の私有地を田荘という。",
                options: ["部曲", "名代", "屯倉", "品部"],
                correct: 2,
                explanation: "ヤマト政権の直轄領は「屯倉（みやけ）」、直轄民は名代・子代の部です。豪族の私有地は「田荘（たどころ）」、私有民は「部曲（かきべ）」とよばれました。"
            },
            {
                type: "四肢択一",
                question: "律令官制（二官八省）において、詔勅の作成や国史の編纂を担当した省はどれか。",
                options: ["式部省", "治部省", "民部省", "中務省"],
                correct: 3,
                explanation: "中務省（なかつかさしょう）は詔勅の作成や国史編纂などを担当し、八省の中で最も重要とされました。"
            },
            {
                type: "四肢択一",
                question: "鎌倉時代、1249年に執権北条時頼が設置した、裁判の公平と迅速化を図るための機関はどれか。",
                options: ["政所", "引付衆", "評定衆", "問注所"],
                correct: 1,
                explanation: "引付衆（ひきつけしゅう）は、所領関係の訴訟を迅速かつ公平に処理するために設置されました。"
            },
            {
                type: "穴埋め",
                question: "室町幕府において、将軍を補佐し幕政を統轄する最高の役職を【　　　】といい、斯波・細川・畠山の3氏が交代で任じられた。",
                options: ["執権", "管領", "大老", "所司"],
                correct: 1,
                explanation: "将軍を補佐する最高職を「管領（かんれい）」といい、斯波（しば）・細川・畠山の3氏が交代で就任したため「三管領」と呼ばれました。"
            },
            {
                type: "正誤問題",
                question: "江戸幕府の職制において、京都所司代は朝廷や公家の監視、西国大名の統制にあたった。",
                options: ["正しい", "誤り"],
                correct: 0,
                explanation: "正しい記述です。京都所司代は譜代大名から選ばれ、朝廷・公家の監視と西国支配の重要な役割を担いました。"
            },
            {
                type: "四肢択一",
                question: "701年に刑部親王や藤原不比等らによって編纂され、日本の律令制を本格的に成立させた法典はどれか。",
                options: ["飛鳥浄御原令", "近江令", "大宝律令", "養老律令"],
                correct: 2,
                explanation: "文武天皇の命で701年に編纂された大宝律令によって、日本における中央集権的な律令国家の体制が整いました。"
            },
            {
                type: "穴埋め",
                question: "平安時代前期（820年）、嵯峨天皇の時代に藤原冬嗣らが編纂した格式を【　　　】という。",
                options: ["貞観格式", "延喜格式", "弘仁格式", "養老格式"],
                correct: 2,
                explanation: "三大格式のうち最初に編纂されたのが「弘仁格式（こうにんきゃくしき）」です。その後、清和天皇の「貞観格式」、醍醐天皇の「延喜格式」と続きます。"
            },
            {
                type: "正誤問題",
                question: "鎌倉幕府の第3代執権北条泰時が制定した「御成敗式目」は、日本初の武家法である。",
                options: ["正しい", "誤り"],
                correct: 0,
                explanation: "正しい記述です。1232年に制定された御成敗式目（貞永式目）は、源頼朝以来の先例や道理を基準とした51カ条からなる日本初の武家法です。"
            },
            {
                type: "四肢択一",
                question: "江戸幕府第8代将軍・徳川吉宗の命によって編纂され、以後の裁判の基準となった基本法典はどれか。",
                options: ["武家諸法度", "公事方御定書", "禁中並公家諸法度", "慶安のお触書"],
                correct: 1,
                explanation: "公事方御定書（くじかたおさだめがき）の下巻（御定書百箇条）は、刑罰や裁判の基準を定めたもので、判例として用いられました。"
            },
            {
                type: "穴埋め",
                question: "自由民権運動期に立志社の植木枝盛が起草した、国民の抵抗権や革命権を認める急進的な私擬憲法案は『【　　　】』である。",
                options: ["私擬憲法案", "五日市憲法草案", "東洋大日本国国憲按", "日本国憲按"],
                correct: 2,
                explanation: "『東洋大日本国国憲按』は、当時の私擬憲法の中でも特に民主的で急進的な内容を含んでいました。"
            },
            {
                type: "四肢択一",
                question: "1889年に公布された最初の衆議院議員選挙法において、選挙権を持つための納税資格（直接国税）はいくら以上か。",
                options: ["3円以上", "10円以上", "15円以上", "納税資格なし"],
                correct: 2,
                explanation: "最初の選挙法では「直接国税15円以上を納める満25歳以上の男子」に選挙権が限られ、有権者は全人口の約1.1％でした。"
            },
            {
                type: "四肢択一",
                question: "1925年の「普通選挙法」制定時の内閣総理大臣は誰か。",
                options: ["原敬", "加藤高明", "若槻礼次郎", "浜口雄幸"],
                correct: 1,
                explanation: "護憲三派による加藤高明内閣の時に普通選挙法が成立し、納税資格が撤廃されました（同時に治安維持法も制定）。"
            },
            {
                type: "正誤問題",
                question: "1945年の選挙法改正によって女性参政権が実現し、翌年の総選挙で39名の女性議員が誕生した。",
                options: ["正しい", "誤り"],
                correct: 0,
                explanation: "正しい記述です。GHQの指令による改正で満20歳以上の男女に選挙権が与えられ、完全な普通選挙が実現しました。"
            },
            {
                type: "穴埋め",
                question: "1898年、自由党と進歩党が合同して結成され、日本初の政党内閣（隈板内閣）を組織した政党は【　　　】である。",
                options: ["立憲政友会", "立憲民政党", "憲政党", "愛国公党"],
                correct: 2,
                explanation: "憲政党の結成により、陸海軍大臣を除くすべての大臣を党員で占める第1次大隈重信内閣（隈板内閣）が成立しました。"
            },
            {
                type: "四肢択一",
                question: "1900年、伊藤博文が憲政党の主流派を糾合して結成し、大正時代にかけて政界の最大勢力となった政党はどれか。",
                options: ["立憲政友会", "立憲民政党", "日本自由党", "憲政本党"],
                correct: 0,
                explanation: "立憲政友会は伊藤博文を初代総裁として結成され、のちに原敬や犬養毅らも総裁を務めた戦前の有力政党です。"
            },
            {
                type: "穴埋め",
                question: "1918年、米騒動の後に首相となり、爵位を持たない「平民宰相」として本格的な政党内閣を組織したのは【　　　】である。",
                options: ["加藤高明", "原敬", "桂太郎", "西園寺公望"],
                correct: 1,
                explanation: "立憲政友会総裁の原敬は、陸海相・外相を除く全閣僚を党員で構成し、本格的な政党内閣を実現させました。"
            },
            {
                type: "四肢択一",
                question: "1924年の護憲三派内閣から1932年の犬養毅内閣まで続いた、衆議院の第一党が内閣を組織する慣例を何と呼ぶか。",
                options: ["超然主義", "政党の解消", "大政翼賛", "憲政の常道"],
                correct: 3,
                explanation: "「憲政の常道」と呼ばれ、立憲政友会と憲政会（のちの立憲民政党）による二大政党制の時代が続きました。"
            },
            {
                type: "四肢択一",
                question: "1940年、新体制運動のもとで既成政党がすべて解散し、合流して作られた組織はどれか。",
                options: ["大日本産業報国会", "大政翼賛会", "国民精神総動員本部", "日本社会党"],
                correct: 1,
                explanation: "第2次近衛文麿内閣のもとで結成された大政翼賛会により、日本の政党政治は一時消滅しました。"
            },
            {
                type: "正誤問題",
                question: "1955年に結成された自由民主党と、同じく1955年に左右両派が統一した日本社会党とが対立する政治体制を「1955年体制」と呼ぶ。",
                options: ["正しい", "誤り"],
                correct: 0,
                explanation: "正しい記述です。保守合同によって誕生した自民党と、再統一した社会党による「一強多弱」の二大政党体制が1993年まで続きました。"
            },
            {
                type: "穴埋め",
                question: "1993年、自民党が分裂し、非自民・非共産の8党派連立によって成立し、55年体制を崩壊させた内閣は【　　　】内閣である。",
                options: ["羽田孜", "村山富市", "細川護熙", "宮沢喜一"],
                correct: 2,
                explanation: "日本新党の細川護熙（ほそかわもりひろ）を首班とする連立政権が成立し、38年ぶりに自民党が政権の座から降りました（下野）。"
            }
        ];

        // --- エンドレス復習モード用 状態管理変数 ---
        let totalQuestions = quizData.length;
        let activeQueue = []; // 現在出題する問題のインデックス配列
        let nextQueue = [];   // 間違えて次回（復習）に回すインデックス配列
        let queueIndex = 0;   // activeQueue内の現在の位置
        
        let attempts = [];    // 各問題の挑戦回数（0なら初見）
        let firstPassScore = 0; // 1回目で正解した数
        let isAnswered = false;

        const appDiv = document.getElementById('quiz-app-container');

        // クイズ初期化（ロード時に直接開始）
        function startQuiz() {
            activeQueue = quizData.map((_, i) => i);
            nextQueue = [];
            queueIndex = 0;
            firstPassScore = 0;
            attempts = new Array(totalQuestions).fill(0);
            renderQuestionScreen();
        }

        // 1. 問題画面の描画
        function renderQuestionScreen() {
            isAnswered = false;
            const qIndex = activeQueue[queueIndex];
            const q = quizData[qIndex];
            const isReview = attempts[qIndex] > 0; // 2回目以降なら復習モード

            // 進行度の計算 (残り何問正解すれば完全クリアか)
            const remaining = (activeQueue.length - queueIndex) + nextQueue.length;
            const progress = ((totalQuestions - remaining) / totalQuestions) * 100;

            let optionsHtml = '';
            q.options.forEach((opt, index) => {
                optionsHtml += `
                    <button onclick="checkAnswer(${index})" id="opt-${index}" class="quiz-option-btn">
                        <span class="option-label">${index + 1}</span>
                        <span class="option-text">${opt}</span>
                        <span class="option-icon" id="opt-icon-${index}"></span>
                    </button>
                `;
            });

            let imageHtml = '';
            if (q.imageUrl) {
                imageHtml = `
                    <div class="quiz-image-box">
                        <i data-lucide="image" style="width: 24px; height: 24px; margin-bottom: 4px;"></i>
                        <span style="font-weight: bold;">${q.imageUrl}</span>
                    </div>
                `;
            }

            // ヘッダーテキストの出し分け（初見か復習か）
            const headerText = isReview 
                ? `<span class="text-red-500 mr-2 flex items-center gap-1"><i data-lucide="refresh-cw" style="width: 16px; height: 16px;"></i>復習モード</span>` 
                : `問題 ${queueIndex + 1} / ${totalQuestions}`;
            const subHeaderText = isReview ? `<span class="text-slate-400 text-sm font-normal">（残り ${remaining} 問）</span>` : ``;

            appDiv.innerHTML = `
                <div class="quiz-container">
                    <div class="quiz-header">
                        <div class="quiz-title-text">
                            ${!isReview ? `<i data-lucide="file-question" style="width: 18px; height: 18px;"></i>` : ''}
                            ${headerText} ${subHeaderText}
                        </div>
                        <div class="quiz-score">
                            初回スコア: ${firstPassScore}
                        </div>
                    </div>
                    <div class="quiz-progress-bar">
                        <div class="quiz-progress-fill" style="width: ${progress}%"></div>
                    </div>
                    <div class="quiz-body">
                        <div><span class="quiz-question-type">${q.type}</span></div>
                        <h3 class="quiz-question">${q.question}</h3>
                        ${imageHtml}
                        <div class="quiz-options">
                            ${optionsHtml}
                        </div>
                        <div id="explanation-box" class="quiz-explanation">
                            <!-- 解説がここに表示されます -->
                        </div>
                        <button onclick="nextQuestion()" id="next-btn" class="quiz-next-btn">
                            次の問題へ <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
                        </button>
                    </div>
                </div>
            `;
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 2. 答え合わせ
        function checkAnswer(selectedIndex) {
            if (isAnswered) return;
            isAnswered = true;

            const qIndex = activeQueue[queueIndex];
            const q = quizData[qIndex];
            const isCorrect = selectedIndex === q.correct;

            // 初回正解時のみスコア加算
            if (attempts[qIndex] === 0 && isCorrect) {
                firstPassScore++;
            }
            
            // 挑戦回数を増やす
            attempts[qIndex]++;

            // 間違えた場合は、復習キューに追加
            if (!isCorrect) {
                nextQueue.push(qIndex);
            }

            // 選択肢のUI更新
            for (let i = 0; i < q.options.length; i++) {
                const btn = document.getElementById(`opt-${i}`);
                const icon = document.getElementById(`opt-icon-${i}`);
                btn.disabled = true;
                
                if (i === q.correct) {
                    btn.classList.add('correct');
                    icon.innerHTML = '<i data-lucide="check-circle" style="width: 20px; height: 20px;"></i>';
                } else if (i === selectedIndex && !isCorrect) {
                    btn.classList.add('wrong');
                    icon.innerHTML = '<i data-lucide="x-circle" style="width: 20px; height: 20px;"></i>';
                } else {
                    btn.classList.add('disabled-fade');
                }
            }

            // スコアの更新
            document.querySelector('.quiz-score').innerText = `初回スコア: ${firstPassScore}`;

            // 解説ボックスの表示
            const expBox = document.getElementById('explanation-box');
            expBox.classList.add('show');
            if (isCorrect) {
                expBox.classList.add('correct-exp');
                expBox.innerHTML = `
                    <div class="exp-title"><i data-lucide="check-circle-2" style="width: 20px; height: 20px;"></i> 正解！</div>
                    <p>${q.explanation}</p>
                `;
            } else {
                expBox.classList.add('wrong-exp');
                expBox.innerHTML = `
                    <div class="exp-title"><i data-lucide="alert-circle" style="width: 20px; height: 20px;"></i> 不正解...</div>
                    <p style="margin-bottom: 8px;"><strong>正解は「${q.options[q.correct]}」です。</strong></p>
                    <p>${q.explanation}</p>
                `;
            }

            // ボタンの文言調整（キューの最後で、かつ復習問題がない場合は「結果を見る」）
            const nextBtn = document.getElementById('next-btn');
            if (queueIndex >= activeQueue.length - 1 && nextQueue.length === 0) {
                nextBtn.innerHTML = `結果を見る <i data-lucide="award" style="width: 18px; height: 18px;"></i>`;
            }
            nextBtn.classList.add('show');
            lucide.createIcons();
        }

        // 次の問題へ遷移（エンドレス復習ロジック）
        function nextQuestion() {
            queueIndex++;
            
            // 現在のキューを最後まで解き終わったか？
            if (queueIndex >= activeQueue.length) {
                if (nextQueue.length > 0) {
                    // 間違えた問題がある場合、それを新しいキューとして復習ループ開始
                    activeQueue = [...nextQueue];
                    nextQueue = [];
                    queueIndex = 0;
                    renderQuestionScreen();
                } else {
                    // 間違えた問題がゼロになれば完全クリア！結果画面へ
                    renderResultScreen();
                }
            } else {
                // まだ現在のキューが残っている場合は次へ
                renderQuestionScreen();
            }
        }

        // 3. 結果画面（全問正解完了時）
        function renderResultScreen() {
            const percentage = Math.round((firstPassScore / totalQuestions) * 100);
            let message = '間違えた問題もすべてクリアしました！確実に実力がついています。';
            
            appDiv.innerHTML = `
                <div class="quiz-container">
                    <div class="quiz-progress-bar">
                        <div class="quiz-progress-fill" style="width: 100%"></div>
                    </div>
                    <div class="quiz-center-content">
                        <div class="quiz-icon-large" style="background-color: #fef08a; color: #a16207;">
                            <i data-lucide="award" style="width: 50px; height: 50px;"></i>
                        </div>
                        <h2 class="quiz-main-title">全問クリア達成！</h2>
                        
                        <div class="result-score">${firstPassScore} <span style="font-size: 2rem; color: var(--text-muted);">/ ${totalQuestions}</span></div>
                        <div style="font-size: 1.2rem; color: var(--text-muted); font-weight: bold; margin-bottom: 32px;">初回正答率: ${percentage}%</div>
                        
                        <div style="background: var(--bg-color); padding: 24px; border-radius: 12px; margin-bottom: 40px; max-width: 500px; width: 100%; border: 1px solid var(--border-color);">
                            <p style="font-size: 1.1rem; font-weight: bold; color: var(--text-color);">${message}</p>
                        </div>
                        
                        <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; width: 100%; max-width: 400px;">
                            <button onclick="startQuiz()" class="btn-primary" style="width: 100%; justify-content: center;">
                                <i data-lucide="rotate-ccw" style="width: 20px; height: 20px;"></i> はじめから挑戦する
                            </button>
                            <a href="/n-kyozai/index.html" class="btn-secondary" style="width: 100%; justify-content: center;">
                                <i data-lucide="home" style="width: 20px; height: 20px;"></i> ホームへ戻る
                            </a>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ロードと同時に開始
        startQuiz();
    </script>
</body>
</html>
