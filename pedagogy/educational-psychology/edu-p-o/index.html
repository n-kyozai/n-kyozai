    <script>
        const lessons = [
            { id: 1, title: "第1回 教育心理学とは", icon: "book-open" },
            { id: 2, title: "第2回 発達と教育", icon: "baby" },
            { id: 3, title: "第3回 乳幼児期の発達", icon: "smile" },
            { id: 4, title: "第4回 児童期の発達", icon: "school" },
            { id: 5, title: "第5回 青年期の発達", icon: "user" },
            { id: 6, title: "第6回 行動論から見た学習", icon: "activity" },
            { id: 7, title: "第7回 認知論から見た学習", icon: "cpu" },
            { id: 8, title: "第8回 動機づけ", icon: "flame" },
            { id: 9, title: "第9回 パーソナリティ", icon: "fingerprint" },
            { id: 10, title: "第10回 適応の理解と支援", icon: "heart-handshake" },
            { id: 11, title: "第11回 教師と児童・生徒", icon: "users" },
            { id: 12, title: "第12回 学級集団", icon: "network" },
            { id: 13, title: "第13回 発達障害の理解", icon: "puzzle" },
            { id: 14, title: "第14回 教育評価", icon: "clipboard-check" }
        ];

        // 完全版クイズデータ（振り返り課題全問網羅）
        const quizData = [
            // 第1回
            { lesson: 1, q: "【問1】教育に関するテーマは、主として人間の理性的な志向によってその本質を見出していくという（　）からのアプローチで扱われてきた。", options: ["行動学", "哲学", "社会学", "倫理学"], answer: "哲学", exp: "教育学の源流はプラトンやアリストテレスなどの古代哲学にあります。彼らは「人間はどうあるべきか」という理想を追求しました。" },
            { lesson: 1, q: "【問2-1】教育の目的を倫理学に、教育の方法を心理学に求めた人物は？", options: ["ヴント", "ヘルバルト", "ソーンダイク", "プラトン"], answer: "ヘルバルト", exp: "ヘルバルトは「近代教育学の父」と呼ばれ、著書『一般教育学』の中で、教育学を体系化しました。" },
            { lesson: 1, q: "【問2-2】実験によって心を研究する方法を開発した人物たちは？", options: ["ヘルバルトとプラトン", "ヴント、エビングハウス、ジェームズ", "ソーンダイクとワトソン", "文部省"], answer: "ヴント、エビングハウス、ジェームズ", exp: "1879年、ヴントがライプツィヒ大学に世界初の心理学実験室を創設したことが、近代心理学の始まりとされています。" },
            { lesson: 1, q: "【問2-3】1910年に「The Journal of Educational Psychology」を創刊し、教育心理学を価値づけたのは？", options: ["ジェームズ", "ソーンダイク", "丸山良二", "ヘルバルト"], answer: "ソーンダイク", exp: "ソーンダイクは「教育心理学の父」と呼ばれ、測定と統計を用いた科学的なアプローチを確立しました。" },
            { lesson: 1, q: "【問2-4】第二次大戦後、日本で「教育心理」を発刊した組織は？", options: ["文部省", "厚生省", "内閣府", "日本心理学会"], answer: "文部省", exp: "1947年に当時の文部省から発刊され、日本の教育心理学の方向性に大きな影響を与えました。" },
            { lesson: 1, q: "【問3-1】一度に多数の対象者に調査を実施することができるが、質問の主旨の誤解などに対応が難しい研究法は？", options: ["実験法", "観察法", "質問紙法", "面接法"], answer: "質問紙法", exp: "アンケート調査のことです。効率的ですが、回答者が質問を読み違えても修正できない欠点があります。" },
            { lesson: 1, q: "【問3-2】対象者の意識や経験の全体を取り出しやすく質の良い情報を得やすいが、多人数への実施が難しい研究法は？", options: ["質問紙法", "面接法", "心理検査法", "実験法"], answer: "面接法", exp: "個別の深掘りに適していますが、一人ひとりに時間がかかるためコストが高いのが特徴です。" },
            { lesson: 1, q: "【問3-3】因果関係の検証に適しているが、変数のコントロール（統制）が難しい研究法は？", options: ["実験法", "観察法", "心理検査法", "面接法"], answer: "実験法", exp: "実験室以外の「フィールド実験」などでは、騒音や気温などの条件を一定に保つことが困難です。" },
            { lesson: 1, q: "【問3-4】あるがままの行動を理解することで興味深い仮説が見えてくることがあるが、内面の状態は確実に把握できない研究法は？", options: ["実験法", "観察法", "質問紙法", "心理検査法"], answer: "観察法", exp: "自然な行動を記録できますが、「なぜそうしたか」という内面までは推測の域を出ないことがあります。" },
            { lesson: 1, q: "【問3-5】観察だけではわからない内面の状態を理解する助けとなるが、結果の解釈には熟練が必要な研究法は？", options: ["面接法", "心理検査法", "実験法", "質問紙法"], answer: "心理検査法", exp: "知能検査や性格検査など。マニュアルに従った実施と、専門的な解釈が求められます。" },

            // 第2回
            { lesson: 2, q: "【問1】遺伝要因と環境要因が加算的に（足し算のように）影響しあうという考え方は？", options: ["環境閾値説", "成熟優位説", "輻輳説", "白紙論"], answer: "輻輳説", exp: "シュテルンが提唱。「遺伝＋環境＝発達」という考え方で、両方の要因を認めました。" },
            { lesson: 2, q: "【問2】「発達のプロセスは生まれながらにして備わっており、経験や学習は決定的ではない」とする説を唱えたのは？", options: ["ワトソン", "ピアジェ", "ゲゼル", "ローレンツ"], answer: "ゲゼル", exp: "成熟優位説。双生児の階段登りの実験で、レディネス（準備性）の重要性を証明しました。" },
            { lesson: 2, q: "【問3-1】「適切な環境さえあればどんな人間にも育てられる」と環境の重要性を強調したのは？", options: ["ロック", "ワトソン", "ゲゼル", "ヴィゴツキー"], answer: "ワトソン", exp: "環境優位説の代表者。「私に1ダースの健康な子供を与えよ」という言葉で有名です。" },
            { lesson: 2, q: "【問3-2】ワトソンの考えの背景にある「生まれたての心は白紙である」とする思想は？", options: ["ロックの白紙説", "ピアジェの認知発達", "ジェンセンの環境閾値", "臨界期"], answer: "ロックの白紙説", exp: "ジョン・ロックの「タブラ・ラサ（磨かれた板＝白紙）」説です。経験によって心に文字が書かれていくと考えました。" },
            { lesson: 2, q: "【問4】特定の訓練や好適な環境条件がない限り顕現しない特性もあるとする説は？", options: ["輻輳説", "環境閾値説", "成熟優位説", "敏感期"], answer: "環境閾値説", exp: "ジェンセンが提唱。身長などは環境の影響が少なく、絶対音感などは環境（訓練）が不可欠であるとしました。" },
            { lesson: 2, q: "【問5】心身が成熟し、学習が成立するために必要な準備が整った状態を？", options: ["敏感期", "臨界期", "レディネス", "社会化"], answer: "レディネス", exp: "学習準備性とも訳されます。早すぎる早期教育への警鐘となりました。" },
            { lesson: 2, q: "【問6】「自力可能な水準」と「援助により到達可能な水準」の間の領域を？", options: ["発達の最近接領域", "内言", "外言", "成熟領域"], answer: "発達の最近接領域", exp: "ヴィゴツキーのZPD。教育はこの領域に働きかけることで、発達を牽引できるとしました。" },
            { lesson: 2, q: "【問8】ある集団に属する個人として身に付けるべき技能や態度を何と言う？", options: ["社会化", "内言化", "社会性", "適応"], answer: "社会性", exp: "社会性を身につけていく過程を「社会化」と呼びます。" },

            // 第3回
            { lesson: 3, q: "【問1-1】ポルトマンは人間が未熟な状態で生まれることを何と呼んだ？", options: ["口唇期", "子宮外胎児期", "喃語期", "感覚運動期"], answer: "子宮外胎児期", exp: "人間は他の哺乳類と異なり、歩行もできない未熟な状態で生まれ、1年かけて子宮外で成熟するため「生理的早産」とも呼ばれます。" },
            { lesson: 3, q: "【問1-2-1】口元に触れた方向に頭を向ける反射は？", options: ["モロー反射", "バビンスキー反射", "探索反射", "把握反射"], answer: "探索反射", exp: "ルーティング反射とも言います。乳首を探して栄養を摂取するための原始反射です。" },

            { lesson: 3, q: "【問1-4】交流を持ちながら同じ遊びをするが、役割分担やルールがない段階は？", options: ["並行遊び", "ひとり遊び", "連合遊び", "協同遊び"], answer: "連合遊び", exp: "パーテンの遊びの発達段階。協同遊びの前段階にあたります。" },
            { lesson: 3, q: "【問2-1】幼児期は自己中心性が強く、直感的な判断に依存するとした人物は？", options: ["ボウルビー", "エリクソン", "ピアジェ", "フロイト"], answer: "ピアジェ", exp: "「前操作期」の特徴です。三つ山の課題などで、他者の視点に立てないことを示しました。" },
            { lesson: 3, q: "【問2-2】性的エネルギーが唇に集中する段階を唱えたのは？", options: ["エリクソン", "フロイト", "ハーロー", "ピアジェ"], answer: "フロイト", exp: "「口唇期」です。授乳を通じて快感を得る時期とされます。" },
            { lesson: 3, q: "【問2-3】特定の人との心理的絆を「愛着」という概念で表したのは？", options: ["ハーロー", "ボウルビー", "エリクソン", "ポルトマン"], answer: "ボウルビー", exp: "アタッチメント理論の提唱者です。愛着は生存のための本能的行動システムであると考えました。" },

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let currentRunMissed = [];
        let practiceMode = 'normal'; // 'normal' or 'wrong_only'

        window.onload = () => {
            renderLessonSelector();
        };

        function renderLessonSelector() {
            const selector = document.getElementById('lesson-selector');
            selector.innerHTML = '';
            lessons.forEach(l => {
                const card = document.createElement('div');
                card.className = 'lesson-card';
                card.onclick = () => startQuiz(l.id);
                // 本物の問題数を取得
                const realCount = quizData.filter(q => q.lesson === l.id).length;
                card.innerHTML = `
                    <i data-lucide="${l.icon}"></i>
                    <div>${l.title}</div>
                    <span style="font-size:0.7rem; color:#94a3b8;">${realCount}問</span>
                `;
                selector.appendChild(card);
            });
            lucide.createIcons();
        }

        function startQuiz(lessonId) {
            practiceMode = 'normal';
            if(lessonId === 'all') {
                currentQuestions = [...quizData].sort(() => Math.random() - 0.5);
                document.getElementById('main-title').textContent = "まとめテスト";
            } else {
                currentQuestions = quizData.filter(q => q.lesson === lessonId);
                const title = lessons.find(l => l.id === lessonId).title;
                document.getElementById('main-title').textContent = title;
            }
            initSession();
        }

        function initSession() {
            currentIndex = 0;
            score = 0;
            currentRunMissed = [];
            document.getElementById('selection-view').style.display = 'none';
            document.getElementById('quiz-view').style.display = 'block';
            document.getElementById('result-view').style.display = 'none';
            showQuestion();
        }

        function showQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('lesson-label').textContent = practiceMode === 'wrong_only' ? 'Review Mode' : `Lesson ${q.lesson}`;
            document.getElementById('counter-label').textContent = `${currentIndex + 1} / ${currentQuestions.length}`;
            document.getElementById('question-text').textContent = q.q;
            document.getElementById('progress-bar').style.width = `${(currentIndex / currentQuestions.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });

            // 解説エリアとボタンを初期化
            document.getElementById('explanation-box').classList.remove('show');
            document.getElementById('next-action-area').style.display = 'none';
        }

        function checkAnswer(selected, btn) {
            const q = currentQuestions[currentIndex];
            const isCorrect = selected === q.answer;
            const btns = document.querySelectorAll('.option-btn');
            
            btns.forEach(b => {
                b.disabled = true;
                if(b.textContent === q.answer) b.classList.add('correct');
            });

            const resultLabel = document.getElementById('result-label');
            if(isCorrect) {
                score++;
                resultLabel.textContent = "正解！";
                resultLabel.style.color = "#166534";
            } else {
                btn.classList.add('wrong');
                resultLabel.textContent = "不正解...";
                resultLabel.style.color = "#991b1b";
                currentRunMissed.push(q); // 間違えた問題を保存
            }

            document.getElementById('explanation-text').textContent = q.exp;
            document.getElementById('explanation-box').classList.add('show');
            
            // ボタン表示 (選択肢の上に配置したエリアを表示)
            const nextArea = document.getElementById('next-action-area');
            const nextBtn = document.getElementById('next-btn');
            nextArea.style.display = 'block';
            nextBtn.innerHTML = (currentIndex === currentQuestions.length - 1) 
                ? '結果を見る <i data-lucide="bar-chart-2"></i>' 
                : '次の問題へ <i data-lucide="arrow-right"></i>';
            lucide.createIcons();
        }

        function handleNext() {
            currentIndex++;
            if(currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult(interruptedCount = null) {
            document.getElementById('quiz-view').style.display = 'none';
            document.getElementById('result-view').style.display = 'block';
            document.getElementById('final-score').textContent = score;
            
            const total = interruptedCount !== null ? interruptedCount : currentQuestions.length;
            document.getElementById('total-q-display').textContent = total;
            
            let msg = "";
            const rate = total === 0 ? 0 : score / total;
            
            if(practiceMode === 'wrong_only' && currentRunMissed.length === 0) {
                msg = "弱点克服完了！素晴らしいです。";
            } else if(rate === 1) {
                msg = "完璧です！全問正解！";
            } else if(rate >= 0.8) {
                msg = "素晴らしい！合格圏内です。";
            } else {
                msg = "間違えた箇所を復習して再挑戦しましょう。";
            }
            
            document.getElementById('result-message').textContent = msg;

            // 間違えた問題がある場合のみボタン表示
            const retryBtn = document.getElementById('retry-wrong-btn');
            if (currentRunMissed.length > 0) {
                retryBtn.style.display = 'flex';
                // 前回のモードが通常なら「再挑戦」、既に再挑戦中なら「残りの間違いに挑戦」
                retryBtn.innerHTML = `<i data-lucide="rotate-ccw"></i> 間違えた ${currentRunMissed.length} 問に再挑戦`;
                lucide.createIcons();
            } else {
                retryBtn.style.display = 'none';
            }
        }

        function startWrongOnlyPractice() {
            if(currentRunMissed.length === 0) return;
            practiceMode = 'wrong_only';
            currentQuestions = [...currentRunMissed]; // 間違えた問題のみを新しいセットにする
            document.getElementById('main-title').textContent = "弱点克服演習";
            initSession();
        }

        function backToHome() {
            document.getElementById('result-view').style.display = 'none';
            document.getElementById('selection-view').style.display = 'block';
            document.getElementById('main-title').textContent = "教育心理 確認テスト";
            renderLessonSelector();
        }

        function restartCurrent() {
            // 現在のモードのまま最初から
            initSession();
        }

        // サイドバー制御
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const toggleSidebar = () => {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        };
        menuToggle.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
