<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教員採用試験対策まとめ - n-kyozai</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8fafc;
            --text-color: #334155;
            --sidebar-width: 200px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --header-height: 50px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            display: flex;
            min-height: 100vh;
        }

        /* --- サイドバー --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: white;
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            border-right: 1px solid #e2e8f0;
            overflow-y: auto;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 14px 16px;
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--primary-color);
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 768px) {
            .sidebar-header { padding-left: 60px; }
        }

        .nav-menu { padding: 6px 0; }
        .nav-category {
            padding: 8px 16px 2px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            font-weight: 600;
        }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 6px 16px;
            color: #64748b;
            text-decoration: none;
            transition: all 0.2s;
            font-size: 0.8rem;
        }
        .nav-item:hover { background-color: #f1f5f9; color: var(--accent-color); }
        .nav-item i { margin-right: 8px; width: 14px; height: 14px; }

        /* --- モバイル用トグルボタン --- */
        .mobile-toggle-btn {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 2000;
            width: 36px;
            height: 36px;
            background-color: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            color: var(--primary-color);
            align-items: center;
            justify-content: center;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 950;
            backdrop-filter: blur(2px);
        }
        .overlay.active { display: block; }

        /* --- メインコンテンツ --- */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s ease;
        }

        .banner-container {
            width: 100%;
            height: 180px;
            overflow: hidden;
            position: relative;
        }
        .banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 15%;
        }
        .banner-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.4));
            padding: 15px 40px;
            color: white;
        }
        .banner-overlay h2 { font-size: 1.2rem; text-shadow: 1px 1px 4px rgba(0,0,0,0.5); }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 0;
            flex: 1;
        }

        .site-title {
            font-size: 1.4rem;
            margin-bottom: 16px;
            color: var(--primary-color);
            border-left: 5px solid var(--accent-color);
            padding-left: 12px;
        }

        /* カテゴリーボタン（デスクトップ4列固定） */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .cat-btn {
            display: block;
            padding: 12px 5px;
            text-align: center;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            text-decoration: none;
            color: var(--primary-color);
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: var(--shadow);
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cat-btn:hover {
            border-color: var(--accent-color);
            background-color: var(--accent-color);
            color: white;
            transform: translateY(-2px);
        }

        /* --- セクションレイアウト --- */
        .sections-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .section-box {
            background: white;
            border-radius: 10px;
            padding: 16px;
            box-shadow: var(--shadow);
            border: 1px solid #e2e8f0;
        }

        .section-box.full-width {
            grid-column: 1 / -1;
        }

        .section-title {
            font-size: 0.95rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-color);
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 6px;
        }

        .info-list { list-style: none; }
        .info-item {
            padding: 6px 0;
            border-bottom: 1px dashed #e2e8f0;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .info-date { color: #94a3b8; font-size: 0.75rem; min-width: 85px; text-align: right; }
        .info-tag { background: var(--accent-color); color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; margin-right: 8px; }

        .loader { 
            color: #94a3b8; 
            font-size: 0.75rem; 
            text-align: center; 
            padding: 20px; 
            font-style: italic; 
            background: #f1f5f9;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        footer {
            background-color: white;
            border-top: 1px solid #e2e8f0;
            padding: 15px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.7rem;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .mobile-toggle-btn { display: flex; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .banner-container { height: 140px; }
            .container { padding: 16px; width: 100%; }
            .sections-wrapper { grid-template-columns: 1fr; gap: 15px; }
            .category-grid { grid-template-columns: repeat(2, 1fr); }
            .cat-btn { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <button class="mobile-toggle-btn" id="menuToggle">
        <i data-lucide="menu"></i>
    </button>

    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><i data-lucide="book-open"></i>メニュー</div>
        <nav class="nav-menu">
            <div class="nav-category">MAIN</div>
            <a href="/n-kyozai/index.html" class="nav-item"><i data-lucide="home"></i>ホーム</a>
            
            <div class="nav-category">教養・指導要領</div>
            <a href="/n-kyozai/general/index.html" class="nav-item"><i data-lucide="graduation-cap"></i>一般教養</a>
            <a href="/n-kyozai/pedagogy/index.html" class="nav-item"><i data-lucide="users"></i>教職教養</a>
            <a href="/n-kyozai/guidelines/index.html" class="nav-item"><i data-lucide="file-text"></i>指導要領</a>

            <div class="nav-category">専門科目</div>
            <a href="/n-kyozai/politics/index.html" class="nav-item"><i data-lucide="book-open"></i>専門科目</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="banner-container">
            <img src="n-kyozai_ホームページ_トップバナー.png" alt="バナー" class="banner-img" onerror="this.src='https://images.unsplash.com/photo-1497633762265-9d179a990aa6?auto=format&fit=crop&w=1200&q=80'">
            <div class="banner-overlay"><h2>教員採用試験対策</h2></div>
        </div>

        <div class="container">
            <h1 class="site-title">対策まとめ</h1>

            <div class="category-grid">
                <a href="/n-kyozai/general/index.html" class="cat-btn">一般教養</a>
                <a href="/n-kyozai/pedagogy/index.html" class="cat-btn">教職教養</a>
                <a href="/n-kyozai/politics/index.html" class="cat-btn">専門科目</a>
                <a href="/n-kyozai/guidelines/index.html" class="cat-btn">指導要領</a>
            </div>

            <div class="sections-wrapper">
                <section class="section-box">
                    <h2 class="section-title"><i data-lucide="bell"></i>新着情報</h2>
                    <ul class="info-list" id="news-list"><div class="loader">読み込み中...</div></ul>
                </section>
                <section class="section-box">
                    <h2 class="section-title"><i data-lucide="calendar"></i>教採カレンダー</h2>
                    <ul class="info-list" id="calendar-list"><div class="loader">読み込み中...</div></ul>
                </section>
                <section class="section-box full-width">
                    <h2 class="section-title"><i data-lucide="link"></i>お役立ちリンク</h2>
                    <div id="link-list" class="category-grid" style="margin-bottom: 0;"><div class="loader">読み込み中...</div></div>
                </section>
            </div>
        </div>

        <footer><p>COPYRIGHT 2026 © ALL RIGHTS RESERVED</p></footer>
    </main>

    <script>
        lucide.createIcons();

        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzZhvVExnkiseSTiPJDqYK4W6aMGy5kKT8uMW0z3nU2ZdWDeYVMd6FJttE0NSxZMhwr/exec"; 
        const CACHE_KEY = "n-kyozai-data-cache";

        // UIを描画する共通関数
        function renderData(data) {
            const newsEl = document.getElementById('news-list');
            const calEl = document.getElementById('calendar-list');
            const linkEl = document.getElementById('link-list');
            
            newsEl.innerHTML = ''; calEl.innerHTML = ''; linkEl.innerHTML = '';

            data.forEach(item => {
                const dateStr = item.date || "";
                if (item.section === 'news') {
                    newsEl.innerHTML += `<li class="info-item"><span><span class="info-tag">${item.tag || '更新'}</span>${item.title}</span><span class="info-date">${dateStr}</span></li>`;
                } else if (item.section === 'calendar') {
                    calEl.innerHTML += `<li class="info-item"><span>${item.title}</span><span class="info-date">${dateStr}</span></li>`;
                } else if (item.section === 'link') {
                    linkEl.innerHTML += `<a href="${item.url}" target="_blank" class="cat-btn" style="font-weight:normal; font-size:0.75rem;">${item.title}</a>`;
                }
            });

            if (newsEl.innerHTML === '') newsEl.innerHTML = '<div class="loader">新着情報はありません</div>';
            if (calEl.innerHTML === '') calEl.innerHTML = '<div class="loader">予定はありません</div>';
            if (linkEl.innerHTML === '') linkEl.innerHTML = '<div class="loader">リンクはありません</div>';

            lucide.createIcons();
        }

        async function fetchSheetData() {
            // 1. まずはキャッシュがあれば表示（超高速表示）
            const cachedData = localStorage.getItem(CACHE_KEY);
            if (cachedData) {
                try {
                    renderData(JSON.parse(cachedData));
                    console.log("Cached data rendered.");
                } catch(e) { console.error("Cache error", e); }
            }

            if (!GAS_WEB_APP_URL) return;

            // 2. 最新データを取得（バックグラウンド）
            try {
                const url = GAS_WEB_APP_URL + (GAS_WEB_APP_URL.includes('?') ? '&' : '?') + 't=' + new Date().getTime();
                const response = await fetch(url);
                if (!response.ok) throw new Error("Network response error");
                
                const freshData = await response.json();
                
                // 3. データを保存し、UIを更新
                localStorage.setItem(CACHE_KEY, JSON.stringify(freshData));
                renderData(freshData);
                console.log("Fresh data rendered and cached.");

            } catch (error) {
                console.error("Fetch error:", error);
                if (!cachedData) {
                    document.querySelectorAll(".loader").forEach(el => {
                        el.style.color = "#e74c3c";
                        el.innerText = "データの取得に失敗しました。";
                    });
                }
            }
        }

        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        const toggleSidebar = () => {
            const isActive = sidebar.classList.contains('active');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            menuToggle.innerHTML = isActive ? '<i data-lucide="menu"></i>' : '<i data-lucide="x"></i>';
            lucide.createIcons();
            document.body.style.overflow = isActive ? '' : 'hidden';
        };

        menuToggle.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);
        window.onload = fetchSheetData;
    </script>
</body>
</html>
