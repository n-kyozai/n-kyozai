                    "ざっくり日本政治史・日本経済史(1)1945年〜1948年", "ざっくり日本政治史・日本経済史(2)1948年〜1953年", "ざっくり日本政治史・日本経済史(3)1954年〜1972年", "ざっくり日本政治史・日本経済史(4)高度経済成長", "ざっくり日本政治史・日本経済史(5)1972年〜1980年", "ざっくり日本政治史・日本経済史(6)1980年〜1991年", "ざっくり日本政治史・日本経済史(7)安定成長期", "ざっくり日本政治史・日本経済史(8)バブル経済", "ざっくり日本政治史・日本経済史(9)日米貿易摩擦", "ざっくり日本政治史・日本経済史(10)1992年〜1993年",
                    "ざっくり日本政治史・日本経済史(11)1993年〜2001年", "ざっくり日本政治史・日本経済史(12)平成不況", "ざっくり日本政治史・日本経済史(13)2001年〜2006年", "ざっくり日本政治史・日本経済史(14)2006年〜2012年", "ざっくり日本政治史・日本経済史(15)2012年〜2020年", "ざっくり日本政治史・日本経済史(16)2020年〜"
                ]
            },
            {
                chapter: "第10章 公共・倫理分野",
                items: [
                    "青年期", "防衛機制", "無意識と欲求", "自然哲学・ソフィスト", "ギリシャ哲学(ソクラテス・プラトン・アリストテレス)", "世界の宗教", "中国思想", "人間中心主義と近代科学", "経験論と合理論", "ドイツ観念論(1)カント",
                    "ドイツ観念論(2)ヘーゲル", "功利主義・実存主義", "フランクフルト学派・他者尊重", "構造主義・現代のヒューマニズム", "正義論", "日本思想(1)仏教・儒教・国学", "日本思想(2)伝統文化・庶民思想・西洋思想の受容", "日本思想(3)日本の独創的思想", "生命倫理"
                ]
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('syllabus-container');
            
            // タブヘッダーの生成
            const tabsHeader = document.createElement('div');
            tabsHeader.className = 'tabs-header';
            
            // タブコンテンツ用コンテナの生成
            const tabsContentContainer = document.createElement('div');
            tabsContentContainer.className = 'tabs-content-container';

            // 各タブエリアの要素を保持する辞書
            const tabElements = {};

            // タブUIの構築
            tabConfig.forEach((tab, index) => {
                const btn = document.createElement('button');
                btn.className = `tab-button ${index === 0 ? 'active' : ''}`;
                btn.textContent = tab.name;
                btn.dataset.target = tab.id;
                btn.addEventListener('click', () => switchTab(tab.id));
                tabsHeader.appendChild(btn);

                const contentArea = document.createElement('div');
                contentArea.className = `tab-content ${index === 0 ? 'active' : ''}`;
                contentArea.id = tab.id;
                tabsContentContainer.appendChild(contentArea);
                
                tabElements[tab.id] = contentArea;
            });

            container.appendChild(tabsHeader);
            container.appendChild(tabsContentContainer);

            let globalCounter = 1; // 連番（pe1, pe2...）用カウンター

            // データの展開
            syllabusData.forEach((chapterData, index) => {
                // 現在の章がどのタブに属するか探す
                const targetTabConfig = tabConfig.find(t => t.chapters.includes(index));
                if (!targetTabConfig) return;

                const targetContentArea = tabElements[targetTabConfig.id];

                // フルオープンの章コンテナを作成
                const chapterContainer = document.createElement('div');
                chapterContainer.className = 'chapter-container';

                // 見出し（章タイトル）
                const chapterHeader = document.createElement('div');
                chapterHeader.className = 'chapter-header';
                chapterHeader.innerHTML = `
                    <div class="icon-wrapper"><i data-lucide="bookmark"></i></div>
                    ${chapterData.chapter}
                `;
                chapterContainer.appendChild(chapterHeader);

                // コンテンツ部分（リンクカードのグリッド）
                const contentDiv = document.createElement('div');
                contentDiv.className = 'chapter-content';

                chapterData.items.forEach((itemTitle) => {
                    const globalNumStr = String(globalCounter).padStart(3, '0');
                    const linkHref = `/n-kyozai/politics/sp-pe/pe${globalCounter}`;
                    const isPublished = publishedLessons.includes(globalCounter);
                    
                    const linkEl = document.createElement(isPublished ? 'a' : 'div');
                    if (isPublished) linkEl.href = linkHref;
                    
                    linkEl.className = 'lesson-link' + (isPublished ? '' : ' disabled');
                    
                    linkEl.innerHTML = `
                        <span class="lesson-num">${globalNumStr}</span>
                        <span class="lesson-title">${itemTitle}</span>
                        ${isPublished ? '<i data-lucide="chevron-right" class="lesson-arrow"></i>' : '<i data-lucide="lock" class="lesson-arrow" style="width:14px; height:14px; opacity: 0.5;"></i>'}
                    `;
                    
                    contentDiv.appendChild(linkEl);
                    globalCounter++; // 連番をカウントアップ
                });

                chapterContainer.appendChild(contentDiv);
                targetContentArea.appendChild(chapterContainer);
            });

            // 生成したDOMに対してアイコンをレンダリング
            lucide.createIcons();
        });

        // タブ切り替え関数
        function switchTab(tabId) {
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.target === tabId);
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.toggle('active', content.id === tabId);
            });
        }

        // サイドバー制御（モバイル用）
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        const toggleSidebar = () => {
            const isActive = sidebar.classList.contains('active');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            menuToggle.innerHTML = isActive ? '<i data-lucide="menu"></i>' : '<i data-lucide="x"></i>';
            lucide.createIcons();
            document.body.style.overflow = isActive ? '' : 'hidden';
        };

        if(menuToggle) menuToggle.addEventListener('click', toggleSidebar);
        if(overlay) overlay.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
