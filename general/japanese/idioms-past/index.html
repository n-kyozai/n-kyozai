    <script>
        lucide.createIcons();

        // サイドバー制御
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        const toggleSidebar = () => {
            const isActive = sidebar.classList.contains('active');
            sidebar.classList.toggle('active');
            sidebarOverlay.classList.toggle('active');
            menuToggle.innerHTML = isActive ? '<i data-lucide="menu"></i>' : '<i data-lucide="x"></i>';
            lucide.createIcons();
        };

        menuToggle.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        /* ============================

           ============================ */

            { k: "無理難題", y: "むりなんだい", m: "解決不可能な問題や要求。" },
            { k: "明鏡止水", y: "めいきょうしすい", m: "曇りのない鏡と静かな水面。邪念がなく澄み切った心。" },
            { k: "勇猛果敢", y: "ゆうもうかかん", m: "勇ましく決断力があること。" },
            { k: "油断大敵", y: "ゆだんたいてき", m: "油断は失敗のもとであるから、恐るべき敵である。" },
            { k: "羊頭狗肉", y: "ようとうくにく", m: "見かけは立派だが、中身が伴わないこと。" },
            { k: "余裕綽綽", y: "よゆうしゃくしゃく", m: "ゆったりして焦らないさま。" },
            { k: "利害得失", y: "りがいとくしつ", m: "利益と損失。" },
            { k: "離合集散", y: "りごうしゅうさん", m: "離れたり集まったりすること。" },
            { k: "理非曲直", y: "りひきょくちょく", m: "道理にかなっていることと、外れていること。" },
            { k: "流言飛語", y: "りゅうげんひご", m: "根拠のないうわさ。" },
            { k: "竜頭蛇尾", y: "りゅうとうだび", m: "初めは勢いがよいが、終わりは振るわないこと。" },
            { k: "臨機応変", y: "りんきおうへん", m: "その場の状況に合わせて適切な処置をとること。" },
            { k: "和気藹藹", y: "わきあいあい", m: "心と心が通じ合い、和やかな気分が満ちているさま。" },
            { k: "和魂漢才", y: "わこんかんさい", m: "日本固有の精神と、中国伝来の学問の才能を併せ持つこと。" }
        ];

        let currentMode = ''; 
        let quizSettings = { direction: 'idiom_to_meaning' };
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let wrongQuestions = [];
        let lastMode = '';
        let retryQueue = [];

        // DOM要素
        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const progressText = document.getElementById('progress-text');
        const questionText = document.getElementById('question-text');
        const yomiganaDisplay = document.getElementById('yomigana-display');
        const yomiBtn = document.getElementById('yomi-btn');
        const optionsContainer = document.getElementById('options-container');
        const homeQuizBtn = document.getElementById('home-quiz-btn');
        const gameModalOverlay = document.getElementById('game-modal-overlay');

        // 画面遷移
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            
            if (screenId === 'quiz-screen') {
                homeQuizBtn.style.display = 'block';
            } else {
                homeQuizBtn.style.display = 'none';
            }
        }

        function openHomeModal() {
            gameModalOverlay.classList.add('active');
        }

        function closeHomeModal() {
            gameModalOverlay.classList.remove('active');
        }

        function confirmBackToStart() {
            closeHomeModal();
            showScreen('start-screen');
        }

        function backToStart() {
            showScreen('start-screen');
        }

        // クイズ設定
        window.setQuizType = function(type, element) {
            quizSettings.direction = type;
            document.querySelectorAll('.toggle-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
        }

        // クイズ開始
        window.startQuiz = function(mode) {
            currentMode = mode;
            if (mode !== 'retry') lastMode = mode;
            
            currentIndex = 0;
            score = 0;
            wrongQuestions = [];
            currentQuestions = [];

            let questionCount = (mode === 'selection') ? 5 : 10;
            if (mode === 'retry') questionCount = retryQueue.length;

            if (mode === 'retry') {
                currentQuestions = [...retryQueue];
            } else if (mode === 'selection') {
                const shuffled = [...idiomsData].sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, questionCount);
                currentQuestions = selected.map(item => ({
                    type: quizSettings.direction,
                    data: item,
                    options: generateOptions(item, quizSettings.direction)
                }));
            } else if (mode === 'review') {
                const shuffled = [...idiomsData].sort(() => 0.5 - Math.random());
                const selected = shuffled.slice(0, questionCount);
                currentQuestions = selected.map(item => {
                    const r = Math.random();
                    let type = 'idiom_to_meaning';
                    if (r < 0.33) type = 'meaning_to_idiom';
                    else if (r < 0.66) type = 'fill_in_blank';
                    
                    return {
                        type: type,
                        data: item,
                        options: generateOptions(item, type),
                        blankIndex: (type === 'fill_in_blank') ? Math.floor(Math.random() * 4) : -1
                    };
                });
            }

            showScreen('quiz-screen');
            renderQuestion();
        }

        function generateOptions(correctItem, type) {
            const others = idiomsData.filter(i => i.k !== correctItem.k);
            const shuffledOthers = others.sort(() => 0.5 - Math.random()).slice(0, 3);
            const options = [correctItem, ...shuffledOthers];
            return options.sort(() => 0.5 - Math.random());
        }

        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            progressText.textContent = `第 ${currentIndex + 1} / ${currentQuestions.length} 問`;
            
            yomiganaDisplay.textContent = q.data.y;
            yomiganaDisplay.style.visibility = 'hidden';
            yomiBtn.textContent = "読みを表示";
            yomiBtn.style.display = (q.type === 'idiom_to_meaning' || q.type === 'fill_in_blank') ? 'inline-block' : 'none';

            optionsContainer.innerHTML = '';
            optionsContainer.classList.remove('short-text');

            if (q.type === 'idiom_to_meaning') {
                questionText.textContent = q.data.k;
                questionText.style.fontSize = '2.5rem';
                q.options.forEach(opt => createOptionBtn(opt.m, opt.k === q.data.k));

            } else if (q.type === 'meaning_to_idiom') {
                questionText.textContent = q.data.m;
                questionText.style.fontSize = '1.2rem';
                optionsContainer.classList.add('short-text');
                q.options.forEach(opt => createOptionBtn(opt.k, opt.k === q.data.k));

            } else if (q.type === 'fill_in_blank') {
                const chars = q.data.k.split('');
                const hiddenChar = chars[q.blankIndex];
                chars[q.blankIndex] = '〇';
                const maskedIdiom = chars.join('');

                questionText.textContent = maskedIdiom;
                questionText.style.fontSize = '2.5rem';
                optionsContainer.classList.add('short-text');

                const dummyChars = [];
                while(dummyChars.length < 3) {
                    const randomIdiom = idiomsData[Math.floor(Math.random() * idiomsData.length)];
                    const randomChar = randomIdiom.k.charAt(Math.floor(Math.random() * 4));
                    if (randomChar !== hiddenChar && !dummyChars.includes(randomChar)) {
                        dummyChars.push(randomChar);
                    }
                }
                const charOptions = [hiddenChar, ...dummyChars].sort(() => 0.5 - Math.random());
                charOptions.forEach(char => createOptionBtn(char, char === hiddenChar));
            }
        }

        function createOptionBtn(text, isCorrect) {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = text;
            btn.onclick = () => checkAnswer(btn, isCorrect);
            optionsContainer.appendChild(btn);
        }

        window.toggleYomigana = function() {
            const isVisible = yomiganaDisplay.style.visibility === 'visible';
            yomiganaDisplay.style.visibility = isVisible ? 'hidden' : 'visible';
            yomiBtn.textContent = isVisible ? "読みを表示" : "読みを隠す";
        }

        function checkAnswer(btnElement, isCorrect) {
            const buttons = optionsContainer.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            if (isCorrect) {
                btnElement.classList.add('correct');
                score++;
            } else {
                btnElement.classList.add('wrong');
                // 正解表示
                const q = currentQuestions[currentIndex];
                let correctText = "";
                if (q.type === 'idiom_to_meaning') correctText = q.data.m;
                else if (q.type === 'meaning_to_idiom') correctText = q.data.k;
                else if (q.type === 'fill_in_blank') correctText = q.data.k.charAt(q.blankIndex);

                buttons.forEach(b => {
                    if (b.textContent === correctText) b.classList.add('correct');
                });
                wrongQuestions.push(currentQuestions[currentIndex]);
            }

            setTimeout(() => {
                currentIndex++;
                if (currentIndex < currentQuestions.length) {
                    renderQuestion();
                } else {
                    showResultScreen();
                }
            }, 1200);
        }

        function showResultScreen() {
            showScreen('result-screen');
            const total = currentQuestions.length;
            document.getElementById('score-display').textContent = `${score} / ${total}`;
            
            let comment = "";
            if (score === total) comment = "素晴らしい！全問正解です！";
            else if (score >= total * 0.8) comment = "惜しい！あと少しです！";
            else comment = "復習してもう一度挑戦しましょう！";
            document.getElementById('score-comment').textContent = comment;

            const wrongContainer = document.getElementById('wrong-container');
            const wrongList = document.getElementById('wrong-list');
            const retryBtn = document.getElementById('retry-wrong-btn');

            wrongList.innerHTML = '';
            if (wrongQuestions.length > 0) {
                wrongContainer.style.display = 'block';
                retryBtn.style.display = 'inline-block';
                retryQueue = [...wrongQuestions];

                wrongQuestions.forEach(q => {
                    const div = document.createElement('div');
                    div.className = 'wrong-item';
                    let typeText = "";
                    if (q.type === 'idiom_to_meaning') typeText = "[意味当て]";
                    if (q.type === 'meaning_to_idiom') typeText = "[熟語当て]";
                    if (q.type === 'fill_in_blank') typeText = "[穴埋め]";

                    div.innerHTML = `
                        <div class="wrong-idiom">${q.data.k} <span style="font-size:0.8em; color:#666;">(${q.data.y})</span></div>
                        <div class="wrong-meaning">${typeText} ${q.data.m}</div>
                    `;
                    wrongList.appendChild(div);
                });
            } else {
                wrongContainer.style.display = 'none';
                retryBtn.style.display = 'none';
            }
        }

        window.retryWrongOnly = function() {
            startQuiz('retry');
        }
    </script>
</body>
</html>
