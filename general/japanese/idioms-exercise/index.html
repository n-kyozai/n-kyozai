    <script>
        lucide.createIcons();

        // 指定のGAS URL（共通機能用）
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzZhvVExnkiseSTiPJDqYK4W6aMGy5kKT8uMW0z3nU2ZdWDeYVMd6FJttE0NSxZMhwr/exec"; 

        // サイドバー制御
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        const toggleSidebar = () => {
            const isActive = sidebar.classList.contains('active');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            menuToggle.innerHTML = isActive ? '<i data-lucide="menu"></i>' : '<i data-lucide="x"></i>';
            lucide.createIcons();
            document.body.style.overflow = isActive ? '' : 'hidden';
        };

        menuToggle.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        /* =========================================
           以下、四字熟語演習クイズ用スクリプト
           ========================================= */
        const QUIZ_DATA = [
            // Group 1: 問15 - 問26
            {
                id: 15,
                group: 1,
                question: "次の文章の『ただし』と同じ種類及び用法の接続詞が使われているものを、下の1~4の中から1つ選びなさい。\n\n「図書館 月曜日が休館だ。ただし、祝日の月曜日は除く。」",
                options: [
                    "遠くで雷鳴がした。すると、雨がにわかに降り出した。",
                    "猫はかわいい。だが、家では飼えない。",
                    "ここにいようか。それとも、出かけようか。",
                    "待ち合わせに遅れた。なぜなら、渋滞していたからだ。"
                ],
                correctIndex: 1,
                explanation: "問題文の「ただし」は「補足（または条件付きの逆接）」の働き。「だが」も逆接で前文と対立する内容を導くため最も近い。\n1は順接（結果）、3は選択、4は説明（理由）。"
            },
            {
                id: 16,
                group: 1,
                question: "下線部分の意味として最も適切なものは、下の1~5のうちどれか。\n\n「身に余る処遇」",
                options: ["役不足な", "余分な", "応分な", "随分な", "過分な"],
                correctIndex: 4,
                explanation: "「身に余る」は、自分には良すぎてふさわしくない（過分だ）という意味。「役不足」は「能力に対して役目が軽すぎる」という意味なので誤り。"
            },
            {
                id: 17,
                group: 1,
                question: "次のA及びBの慣用句・ことわざの本来の意味の組み合わせとして最も適切なものを選びなさい。\n\nA. 気が置けない\nB. 情けは人のためならず",
                options: [
                    "A:気にかかる / B:自分に返ってくる",
                    "A:油断できない / B:人のためにならない",
                    "A:遠慮の必要がない / B:人のためにならない",
                    "A:遠慮の必要がない / B:自分に返ってくる",
                    "A:油断できない / B:必要のないこと",
                    "A:気にかかる / B:必要のないこと"
                ],
                correctIndex: 3,
                explanation: "A「気が置けない」は「遠慮や気配り（気）を置く必要がない＝親しい」という意味。\nB「情けは人のためならず」は「親切は巡り巡って自分に返ってくる」という意味。"
            },
            {
                id: 18,
                group: 1,
                question: "次の①~⑤の文のうち、下線部の言葉として誤って使用したものの組み合わせを選びなさい。\n\n① 素人なので力不足だ\n② 寸暇を惜しんで\n③ 一丸となって心血を傾けた\n④ 一言が琴線に触れて怒った\n⑤ 二つ返事で引き受けた",
                options: ["①と②", "②と③", "③と④"],
                correctIndex: 2,
                explanation: "③は誤り。「心血を注ぐ」が正しい。\n④は誤り。「琴線に触れる」は「感動する」意味。「逆鱗に触れる（怒る）」の誤用。\n①「力不足」は謙遜として正しい。"
            },
            {
                id: 19,
                group: 1,
                question: "次の短文のうち、敬語の使い方が適切なものを選びなさい。",
                options: [
                    "募金活動に、たくさんの保護者の方がご協力くださった。",
                    "校長先生の申したことに私は賛成します。",
                    "校長先生が、給食をお召し上がりになられる。",
                    "先生が来られるとき、雨は降っていらっしゃいましたか。"
                ],
                correctIndex: 0,
                explanation: "ア（正解）：「くださる」は尊敬語。\nイ：「申す」は謙譲語なので校長先生には使わない。\nウ：「お召し上がりになられる」は二重敬語。\nエ：雨に「いらっしゃる」は使わない。"
            },
            {
                id: 20,
                group: 1,
                question: "古語「うつくし」の意味として適切なものを選びなさい。",
                options: ["不思議だ", "大人びている", "かわいらしい", "情けない"],
                correctIndex: 2,
                explanation: "古語の「うつくし」は、小さいものや弱いものに対する「かわいらしい」「愛らしい」という意味。"
            },
            {
                id: 21,
                group: 1,
                question: "ことわざ・慣用句とその意味の組み合わせとして正しいものを選びなさい。",
                options: [
                    "案ずるより産むが易し……失敗しないよう前もって注意する",
                    "うそも方便……はっきり言わない方が味わいがある",
                    "果報は寝て待て……用心の上に用心を重ねる",
                    "紺屋の白袴……他人のために忙しく自分のことをかまう暇がない",
                    "のど元過ぎれば熱さ忘れる……苦しいときは何にでもすがりつく"
                ],
                correctIndex: 3,
                explanation: "「紺屋の白袴」は、染物屋が自分の袴を染める暇がないことから、他人のことばかりで自分のことがおろそかになること。"
            },
            {
                id: 22,
                group: 1,
                question: "次の慣用句の( )にあてはまる語の組み合わせとして正しいものを選びなさい。\n\nA ( )が切れる（頭の回転が速い）\nB ( )をかぶる（本性を隠す）\nC ( )を細める（うれしそうに笑う）\nD ( )を洗う（悪い仕事をやめる）",
                options: [
                    "頭、泥、目、肩",
                    "手、口、足",
                    "手、泥、口、肩",
                    "頭、猫、目、足"
                ],
                correctIndex: 3,
                explanation: "A:頭が切れる、B:猫をかぶる、C:目を細める、D:足を洗う。"
            },
            {
                id: 23,
                group: 1,
                question: "次の故事成語が正しく使われているものを選びなさい。",
                options: [
                    "まだ師匠ほど活躍できず、青は藍より出でて藍より青だと評価されている。",

                explanation: "正解は「ア:c, イ:a, ウ:e, エ:b, オ:d」です。\n\n緊褌一番(c:固い決意)\n行雲流水(a:成り行き任せ)\n首鼠両端(e:どっちつかず)\n韋編三絶(b:熟読)\n千載一遇(d:好機)"

            {

                options: ["序詞", "掛詞", "縁語", "枕詞", "本歌取り"],

            {

                question: "「ドーナツの穴を空白として捉えるか…あくまで形而上的な問題であって」\n形而上的の意味に最も近いものを選びなさい。",
                options: ["社会的", "形状的", "外面的", "精神的"],
                correctIndex: 3,
                explanation: "「形而上（けいじじょう）」は形がなく感覚で捉えられないもの、哲学・精神的なものを指します。"
            },
            // Group 2: 問27 - 問34 (追加問題)
            {
                id: 27,
                group: 2,
                question: "次の慣用句等の本来の意味のうち、正しいものはどれか。",
                options: [
                    "「しおどき」＝「ものごとが終わりに近づく時」",
                    "「失笑する」＝「おかしさをこらえることができず吹き出す」",
                    "「割愛」＝「不要なものを切り捨てる」",
                    "「十指の指す所」＝「多様な意見」",
                    "「姑息な手」＝「卑怯な手段」"
                ],
                correctIndex: 1,
                explanation: "「失笑」はあきれて笑うことではなく、笑ってはいけない場面で吹き出すこと。\n「しおどき」は好機。「割愛」は惜しいが省略すること。「姑息」はその場しのぎ。"
            },
            {
                id: 28,
                group: 2,
                question: "次の四字熟語とその意味の組合せのうち、明らかに誤っているものはどれか。",
                options: [
                    "一陽来復……よくない事の後にいい事がめぐってくる",
                    "偕老同穴……夫婦が愛情深く固く結ばれている",
                    "甲論乙駁……議論がいろいろあってまとまらない",
                    "夜郎自大……自分の力量を知らず威張っている",
                    "粒粒辛苦……さまざまな試練に見舞われること"
                ],
                correctIndex: 4,
                explanation: "「粒粒辛苦」はコツコツと苦労を重ねて努力すること。受動的な「試練に見舞われる」という意味ではない。"
            },
            {
                id: 29,
                group: 2,
                question: "故事成語の説明のうち、明らかに誤っているものはどれか。",
                options: [
                    "「画竜点睛」＝わずかなことで全体が生き生きする",
                    "「胡蝶の夢」＝夢と現実とを同一視する",
                    "「守株」＝伝統を大切に守り抜いて賞賛される",
                    "「出藍の誉れ」＝弟子が師よりも勝れる",
                    "「無用の用」＝役に立たないように見えるものが役に立つ"
                ],
                correctIndex: 2,
                explanation: "「守株（株を守る）」は古い習慣にとらわれて融通がきかないこと（愚かさの例え）。"
            },
            {
                id: 30,
                group: 2,
                question: "次の四字熟語の意味として、明らかに誤っているものを選びなさい。",
                options: [
                    "百家争鳴……いろいろな立場の人が盛んに議論しあう",
                    "虚心坦懐……心にわだかまりがなく穏やかな様子",
                    "不倶戴天……恨みが深いこと",
                    "針小棒大……少ない元手で多くの利益を手にすること",
                    "金科玉条……大切な規則のこと"
                ],
                correctIndex: 3,
                explanation: "「針小棒大」は小さいことを大げさに言うこと。「一攫千金」のような利益の意味はない。"
            },
            {
                id: 31,
                group: 2,
                question: "ことわざの本来の意味として誤っているものはどれか。",
                options: [
                    "「河童の川流れ」＝得意なことでも失敗する",
                    "「勘定合って銭足らず」＝この中に裏切り者がいる",
                    "「餅は餅屋」＝専門家が一番うまくやる",
                    "「寄らば大樹の陰」＝頼むなら勢力のある者がよい",
                    "「仏作って魂入れず」＝仕上げが抜けている"
                ],
                correctIndex: 1,
                explanation: "「勘定合って銭足らず」は、理論上合っていても実際にはうまくいかないことの例え。"
            },
            {
                id: 32,
                group: 2,
                question: "慣用句の意味として正しいものを選びなさい。",
                options: [
                    "腕を振るう……技術が上達するよう訓練する",
                    "手を尽くす……考えられる限りの方法を試す",
                    "頭が切れる……怒って興奮する",
                    "目に余る……人に見つからないようにする",
                    "手ぐすねを引く……力が及ばずどうすることもできない"
                ],
                correctIndex: 1,
                explanation: "「手を尽くす」はあらゆる手段を試すこと。\n「頭が切れる」は鋭いこと。「手ぐすねを引く」は準備して待つこと。"
            },
            {
                id: 33,
                group: 2,
                question: "次の四字熟語の意味の組み合わせとして正しいものを選びなさい。\n\nア:虚心坦懐 (a:さっぱり / b:意気消沈)\nイ:換骨奪胎 (a:努力 / b:古作の借用)\nウ:鶏鳴狗盗 (a:見掛け倒し / b:つまらない技能)\nエ:乾坤一擲 (a:団結 / b:大勝負)\nオ:鼓腹撃壌 (a:太平 / b:栄枯盛衰)",
                options: [
                    "ア:a, イ:b, ウ:b, エ:b, オ:a",
                    "ア:a, イ:a, ウ:b, エ:a, オ:b",
                    "ア:b, イ:b, ウ:a, エ:b, オ:a",
                    "ア:a, イ:b, ウ:a, エ:a, オ:b",
                    "ア:b, イ:a, ウ:b, エ:b, オ:a"
                ],
                correctIndex: 0,
                explanation: "正しい組み合わせは「a(さっぱり)-b(借用)-b(技能)-b(大勝負)-a(太平)」です。"
            },
            {
                id: 34,
                group: 2,
                question: "ことわざ・慣用句の意味として誤っているものを選びなさい。",
                options: [
                    "蟷螂の斧……弱者が強者に立ち向かうこと",
                    "ひそみにならう……善悪を考えずむやみに人真似をする",
                    "尻馬に乗る……無批判に便乗する",
                    "病膏肓に入る……病気は気持ち次第で重くも軽くもなる"
                ],
                correctIndex: 3,
                explanation: "「病膏肓に入る」は、病気が重く治る見込みがないこと、または趣味・悪癖に熱中して抜け出せないこと。「病は気から」とは異なる。"
            }
        ];

        // アプリケーションの状態
        let appState = {
            view: 'start', // 'start', 'quiz', 'result'
            activeQuestions: [],
            currentQuestionIndex: 0,
            userAnswers: [], // { questionId, isCorrect, selectedIndex, questionObject }
            showExplanation: false,
            selectedOption: null
        };

        const appContainer = document.getElementById('app');

        // --- 描画関数 ---

        function render() {
            appContainer.innerHTML = '';
            const container = document.createElement('div');
            // コンテナスタイルはCSSで #app に直接適用されているため、クラス付与不要だが念のため
            
            if (appState.view === 'start') {
                renderStartScreen(container);
            } else if (appState.view === 'quiz') {
                renderQuizScreen(container);
            } else if (appState.view === 'result') {
                renderResultScreen(container);
            }
            appContainer.appendChild(container);
        }

        function renderStartScreen(container) {
            const wrapper = document.createElement('div');
            wrapper.className = 'start-screen-wrapper';

            const card = document.createElement('div');
            card.className = 'card start-screen';

            const title = document.createElement('h1');
            title.textContent = '国語 演習クイズ';
            card.appendChild(title);

            const subtitle = document.createElement('p');
            subtitle.textContent = '問題セットを選択してスタートしてください';
            subtitle.style.marginBottom = '24px';
            subtitle.style.color = '#57534e';
            card.appendChild(subtitle);

            const btn1 = document.createElement('button');
            btn1.className = 'btn-start btn-primary';
            btn1.textContent = '▶ 問15 ～ 問26';
            btn1.onclick = () => startQuiz(1);
            card.appendChild(btn1);

            const btn2 = document.createElement('button');
            btn2.className = 'btn-start btn-secondary';
            btn2.textContent = '▶ 問27 ～ 問34 (追加問題)';
            btn2.onclick = () => startQuiz(2);
            card.appendChild(btn2);

            wrapper.appendChild(card);
            container.appendChild(wrapper);
        }

        function renderQuizScreen(container) {
            const currentQ = appState.activeQuestions[appState.currentQuestionIndex];
            const isLastQuestion = appState.currentQuestionIndex === appState.activeQuestions.length - 1;

            // ヘッダー
            const header = document.createElement('div');
            header.className = 'quiz-header';
            
            const homeBtn = document.createElement('button');
            homeBtn.className = 'btn-home-small';
            homeBtn.textContent = '🏠 メニューへ';
            homeBtn.onclick = goHome;
            header.appendChild(homeBtn);

            const title = document.createElement('div');
            title.style.fontWeight = 'bold';
            title.style.color = '#92400e';
            title.textContent = `問 ${currentQ.id}`;
            header.appendChild(title);

            const progress = document.createElement('div');
            progress.style.fontSize = '0.9rem';
            progress.style.color = '#a8a29e';
            progress.textContent = `${appState.currentQuestionIndex + 1} / ${appState.activeQuestions.length}`;
            header.appendChild(progress);

            container.appendChild(header);

            // クイズレイアウト (2カラム用ラッパー)
            const quizLayout = document.createElement('div');
            quizLayout.className = 'quiz-layout';

            // 左カラム: 問題と選択肢
            const quizMain = document.createElement('div');
            quizMain.className = 'quiz-main';

            const questionBox = document.createElement('div');
            questionBox.className = 'question-box';
            questionBox.textContent = currentQ.question;
            quizMain.appendChild(questionBox);

            const optionsList = document.createElement('div');
            optionsList.className = 'options-list';

            currentQ.options.forEach((optionText, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = `${idx + 1}. ${optionText}`;
                
                if (appState.showExplanation) {
                    btn.disabled = true;
                    if (idx === currentQ.correctIndex) {
                        btn.classList.add('correct');
                    } else if (idx === appState.selectedOption) {
                        btn.classList.add('wrong');
                    }
                } else {
                    btn.onclick = () => handleAnswer(idx);
                }
                optionsList.appendChild(btn);
            });
            quizMain.appendChild(optionsList);
            quizLayout.appendChild(quizMain);

            // 右カラム: 解説 (PC時) または下部 (SP時)
            const quizSide = document.createElement('div');
            quizSide.className = 'quiz-side';

            if (appState.showExplanation) {
                const feedbackArea = document.createElement('div');
                feedbackArea.className = 'feedback-area';

                const isCorrect = appState.selectedOption === currentQ.correctIndex;
                const resultBadge = document.createElement('div');
                resultBadge.className = `result-badge ${isCorrect ? 'is-correct' : 'is-wrong'}`;
                resultBadge.innerHTML = `
                    <span style="font-size: 1.5rem;">${isCorrect ? '●' : '×'}</span>
                    <div>
                        <div style="font-weight:bold; font-size:1.1rem;">${isCorrect ? '正解！' : '不正解...'}</div>
                        <div style="font-size:0.9rem;">正解は <b>「${currentQ.correctIndex + 1}」</b> です。</div>
                    </div>
                `;
                feedbackArea.appendChild(resultBadge);

                const explanationBox = document.createElement('div');
                explanationBox.className = 'explanation-box';
                explanationBox.innerHTML = `
                    <div class="explanation-label">解説</div>
                    <div style="white-space: pre-wrap;">${currentQ.explanation}</div>
                `;
                feedbackArea.appendChild(explanationBox);

                const nextBtn = document.createElement('button');
                nextBtn.className = 'btn-next';
                nextBtn.textContent = isLastQuestion ? '結果を見る' : '次の問題へ';
                nextBtn.onclick = nextQuestion;
                feedbackArea.appendChild(nextBtn);

                quizSide.appendChild(feedbackArea);
            }

            quizLayout.appendChild(quizSide);
            container.appendChild(quizLayout);
        }

        function renderResultScreen(container) {
            const wrapper = document.createElement('div');
            wrapper.className = 'result-wrapper';

            const correctCount = appState.userAnswers.filter(a => a.isCorrect).length;
            const totalCount = appState.userAnswers.length;
            const percentage = Math.round((correctCount / totalCount) * 100);
            const hasMistakes = correctCount < totalCount;

            const header = document.createElement('div');
            header.className = 'result-header';
            
            const title = document.createElement('h2');
            title.textContent = '結果発表';
            title.style.margin = '0';
            header.appendChild(title);

            const scoreDisplay = document.createElement('div');
            scoreDisplay.className = 'score-display';
            scoreDisplay.innerHTML = `${percentage}<span class="score-unit">%</span>`;
            header.appendChild(scoreDisplay);

            const countDisplay = document.createElement('p');
            countDisplay.textContent = `${totalCount}問中 ${correctCount}問正解`;
            countDisplay.style.opacity = '0.9';
            header.appendChild(countDisplay);

            wrapper.appendChild(header);

            const body = document.createElement('div');
            body.className = 'result-body';

            const message = document.createElement('p');
            message.style.marginBottom = '20px';
            message.style.fontWeight = 'bold';
            if (percentage === 100) {
                message.textContent = '素晴らしい！全問正解です！🎉';
                message.style.color = '#166534';
            } else {
                message.textContent = '復習して満点を目指しましょう！';
                message.style.color = '#78716c';
            }
            body.appendChild(message);

            if (hasMistakes) {
                const retryBtn = document.createElement('button');
                retryBtn.className = 'btn-retry';
                retryBtn.textContent = `🔄 間違えた問題（${totalCount - correctCount}問）に再挑戦`;
                retryBtn.onclick = retryIncorrect;
                body.appendChild(retryBtn);
            }

            const homeBtn = document.createElement('button');
            homeBtn.className = 'btn-home-large';
            homeBtn.textContent = '🏠 スタート画面に戻る';
            homeBtn.onclick = goHome;
            body.appendChild(homeBtn);

            wrapper.appendChild(body);
            container.appendChild(wrapper);
        }

        // --- ロジック ---

        function startQuiz(group) {
            const filtered = QUIZ_DATA.filter(q => q.group === group);
            appState.activeQuestions = filtered;
            appState.currentQuestionIndex = 0;
            appState.userAnswers = [];
            appState.showExplanation = false;
            appState.selectedOption = null;
            appState.view = 'quiz';
            render();
        }

        function handleAnswer(index) {
            if (appState.showExplanation) return;

            appState.selectedOption = index;
            appState.showExplanation = true;

            const currentQ = appState.activeQuestions[appState.currentQuestionIndex];
            const isCorrect = index === currentQ.correctIndex;

            appState.userAnswers.push({
                questionId: currentQ.id,
                isCorrect: isCorrect,
                selectedIndex: index,
                questionObject: currentQ
            });

            render();
        }

        function nextQuestion() {
            if (appState.currentQuestionIndex < appState.activeQuestions.length - 1) {
                appState.currentQuestionIndex++;
                appState.showExplanation = false;
                appState.selectedOption = null;
                render();
            } else {
                appState.view = 'result';
                render();
            }
        }

        function retryIncorrect() {
            const incorrectQuestions = appState.userAnswers
                .filter(ans => !ans.isCorrect)
                .map(ans => ans.questionObject);
            
            appState.activeQuestions = incorrectQuestions;
            appState.currentQuestionIndex = 0;
            appState.userAnswers = [];
            appState.showExplanation = false;
            appState.selectedOption = null;
            appState.view = 'quiz';
            render();
        }

        function goHome() {
            appState.view = 'start';
            appState.activeQuestions = [];
            appState.currentQuestionIndex = 0;
            appState.userAnswers = [];
            appState.showExplanation = false;
            appState.selectedOption = null;
            render();
        }

        // 初期描画
        render();

    </script>
</body>
</html>
