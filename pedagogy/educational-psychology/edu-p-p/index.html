<head>

    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #8b5cf6; /* 教育心理用アクセントカラー（Violet） */
            --bg-color: #f8fafc;
            --text-color: #334155;
            --sidebar-width: 200px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --header-height: 50px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            display: flex;
            min-height: 100vh;
        }

        /* --- サイドバー --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: white;
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            border-right: 1px solid #e2e8f0;
            overflow-y: auto;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 14px 16px;
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--primary-color);
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center; gap: 8px;
        }

        @media (max-width: 768px) {
            .sidebar-header { padding-left: 60px; }
        }

        .nav-menu { padding: 6px 0; }
        .nav-category {
            padding: 8px 16px 2px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            font-weight: 600;
        }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 6px 16px;
            color: #64748b;
            text-decoration: none;
            transition: all 0.2s;
            font-size: 0.8rem;
        }
        .nav-item:hover { background-color: #f1f5f9; color: var(--accent-color); }
        .nav-item i { margin-right: 8px; width: 14px; height: 14px; }
        
        /* activeクラスの定義（今回は使用しない） */
        .nav-item.active {
            color: #059669; 
            background-color: #ecfdf5;
            font-weight: bold;
            border-right: 3px solid #059669;
        }

        /* --- モバイル用トグルボタン --- */
        .mobile-toggle-btn {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 2000;
            width: 36px;
            height: 36px;
            background-color: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            color: var(--primary-color);
            align-items: center;
            justify-content: center;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 950;
            backdrop-filter: blur(2px);
        }
        .overlay.active { display: block; }

        /* --- メインコンテンツ --- */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s ease;
        }

        .page-header {
            background-color: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 24px;
        }

        .breadcrumb {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .breadcrumb a { color: #94a3b8; text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }

        .container {
            width: 95%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px 0;
            flex: 1;
        }

        /* メニューグリッド */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }

        .menu-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow);
        }

        .menu-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .icon-box {
            width: 48px;
            height: 48px;
            background: #f5f3ff; /* 薄い紫 */
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-color);
            flex-shrink: 0;
        }

        .card-info { flex: 1; }
        
        .card-title { 
            font-weight: bold; 
            color: var(--primary-color); 
            font-size: 1rem; 
            margin-bottom: 4px;
        }

        .card-arrow {
            color: #cbd5e1;
            transition: 0.2s;
        }

        .menu-card:hover .card-arrow {
            color: var(--accent-color);
            transform: translateX(4px);
        }

        /* セクションボックス */
        .section-box {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid #e2e8f0;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 1.1rem;
            margin-bottom: 16px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
        }

        /* Topへ戻るボタン */
        .scroll-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background-color: #374151; /* Dark Gray */
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 2000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
        }

        .scroll-to-top.show {
            opacity: 1;
            visibility: visible;
        }

        .scroll-to-top:hover {
            background-color: #1f2937;
            transform: translateY(-2px);
        }

        footer {
            background-color: white;
            border-top: 1px solid #e2e8f0;
            padding: 15px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.7rem;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .mobile-toggle-btn { display: flex; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .page-header { padding-left: 60px; }
            .container { padding: 16px; width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Topへ戻るボタン -->
    <button class="scroll-to-top" id="scrollToTopBtn" aria-label="ページ上部へ戻る">
        <i data-lucide="chevron-up"></i>
    </button>

    <script>
        lucide.createIcons();

        // サイドバー制御
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        const toggleSidebar = () => {
            const isActive = sidebar.classList.contains('active');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            menuToggle.innerHTML = isActive ? '<i data-lucide="menu"></i>' : '<i data-lucide="x"></i>';
            document.body.style.overflow = isActive ? '' : 'hidden';
            lucide.createIcons();
        };

        if(menuToggle) menuToggle.addEventListener('click', toggleSidebar);
        if(overlay) overlay.addEventListener('click', toggleSidebar);

        // Topへ戻るボタン制御
        const scrollToTopBtn = document.getElementById('scrollToTopBtn');

        // スクロール検知
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                scrollToTopBtn.classList.add('show');
            } else {
                scrollToTopBtn.classList.remove('show');
            }
        });

        // クリックイベント
        scrollToTopBtn.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });

    </script>
