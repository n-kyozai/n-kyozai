<!-- Canvas: ON, Preview: ON -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社会 - 教員採用試験対策まとめ</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* 社会科らしい落ち着いた色味（茶・オレンジ系）をアクセントに使用する場合はここを変更 */
            /* 今回は統一感を重視し、ベースカラーは国語と同じにしていますが、
               必要に応じて --accent-color を #d97706 (Amber) などに変更すると社会科っぽさが出ます */
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8fafc;
            --text-color: #334155;
            --sidebar-width: 200px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            display: flex;
            min-height: 100vh;
        }

        /* --- サイドバー --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: white;
            height: 100vh;
            position: fixed;
            left: 0; top: 0;
            border-right: 1px solid #e2e8f0;
            overflow-y: auto;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 14px 16px;
            font-size: 0.95rem;
            font-weight: bold;
            color: var(--primary-color);
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 768px) {
            .sidebar-header { padding-left: 60px; }
        }

        .nav-menu { padding: 6px 0; }
        .nav-category {
            padding: 8px 16px 2px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            font-weight: 600;
        }
        .nav-item {
            display: flex;
            align-items: center;
            padding: 6px 16px;
            color: #64748b;
            text-decoration: none;
            transition: all 0.2s;
            font-size: 0.8rem;
        }
        .nav-item:hover { background-color: #f1f5f9; color: var(--accent-color); }
        .nav-item i { margin-right: 8px; width: 14px; height: 14px; }
        
        .nav-item.active {
            color: var(--accent-color);
            background-color: #f1f5f9;
            font-weight: bold;
        }

        /* --- モバイル用トグルボタン --- */
        .mobile-toggle-btn {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 2000;
            width: 36px;
            height: 36px;
            background-color: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            color: var(--primary-color);
            align-items: center;
            justify-content: center;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 950;
            backdrop-filter: blur(2px);
        }
        .overlay.active { display: block; }

        /* --- メインコンテンツ --- */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s ease;
        }

        .page-header {
            background-color: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 24px;
        }

        /* パンくずリスト */
        .breadcrumb {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .breadcrumb a { color: #94a3b8; text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }

        .container {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 0;
            flex: 1;
        }

        .section-box {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid #e2e8f0;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 1rem;
            margin-bottom: 20px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
        }

        /* メニューグリッド */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .content-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: inherit;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: var(--shadow);
        }

        .content-card:not(.disabled):hover {
            transform: translateY(-4px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        /* 準備中（disabled）用スタイル */
        .content-card.disabled {
            opacity: 0.6;
            cursor: default;
            background-color: #f8fafc;
            border-style: dashed;
        }

        .icon-box {
            width: 48px;
            height: 48px;
            background: #f1f5f9;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-color);
            flex-shrink: 0;
        }
        
        /* 準備中のアイコン色 */
        .content-card.disabled .icon-box {
            color: #94a3b8;
            background: #e2e8f0;
        }

        .content-info { flex: 1; }
        .content-name { font-weight: bold; color: var(--primary-color); font-size: 1rem; margin-bottom: 4px; display: flex; align-items: center; gap: 8px;}
        .content-desc { font-size: 0.75rem; color: #64748b; line-height: 1.4; }

        /* バッジ */
        .badge-soon {
            font-size: 0.6rem;
            color: #ef4444;
            border: 1px solid #ef4444;
            border-radius: 4px;
            padding: 1px 6px;
            white-space: nowrap;
        }

        footer {
            background-color: white;
            border-top: 1px solid #e2e8f0;
            padding: 15px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.7rem;
            margin-top: auto;
        }

        @media (max-width: 768px) {
            .mobile-toggle-btn { display: flex; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; }
            .page-header { padding-left: 60px; }
            .container { padding: 16px; width: 100%; }
            .content-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- モバイル用トグルボタン -->
    <button class="mobile-toggle-btn" id="menuToggle">
        <i data-lucide="menu"></i>
    </button>

    <div class="overlay" id="overlay"></div>

    <!-- サイドバー -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><i data-lucide="book-open"></i>メニュー</div>
        <nav class="nav-menu">
            <div class="nav-category">MAIN</div>
            <a href="/n-kyozai/index.html" class="nav-item"><i data-lucide="home"></i>ホーム</a>
            
            <div class="nav-category">教養・指導要領</div>
            <a href="/n-kyozai/general/index.html" class="nav-item"><i data-lucide="graduation-cap"></i>一般教養</a>
            <a href="/n-kyozai/pedagogy/index.html" class="nav-item"><i data-lucide="users"></i>教職教養</a>
            <a href="/n-kyozai/guidelines/index.html" class="nav-item"><i data-lucide="file-text"></i>指導要領</a>

            <div class="nav-category">専門科目</div>
            <a href="/n-kyozai/politics/index.html" class="nav-item"><i data-lucide="book-open"></i>専門科目</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div class="breadcrumb">
                <a href="../../index.html">ホーム</a> ＞ <a href="../index.html">一般教養</a> ＞ 社会
            </div>
            <h1 style="font-size: 1.4rem; color: var(--primary-color);">社会 対策</h1>
        </div>

        <div class="container">
            <section class="section-box">
                <h2 class="section-title"><i data-lucide="book-marked"></i>学習メニュー</h2>
                <div class="content-grid">
                    
                    <!-- 世界史 -->
                    <a href="world-history/" class="content-card">
                        <div class="icon-box"><i data-lucide="globe-2"></i></div>
                        <div class="content-info">
                            <div class="content-name">世界史</div>
                            <div class="content-desc">古代文明から現代史まで。重要語句の暗記と通史の整理。</div>
                        </div>
                    </a>

                    <!-- 日本史（近日公開） -->
                    <!-- href="#" と class="disabled" で無効化 -->
                    <a href="#" class="content-card disabled" onclick="return false;">
                        <div class="icon-box"><i data-lucide="map"></i></div>
                        <div class="content-info">
                            <div class="content-name">日本史 <span class="badge-soon">近日公開</span></div>
                            <div class="content-desc">現在準備中です。公開までしばらくお待ちください。</div>
                        </div>
                    </a>

                    <!-- 地理 -->
                    <a href="geography/" class="content-card">
                        <div class="icon-box"><i data-lucide="compass"></i></div>
                        <div class="content-info">
                            <div class="content-name">地理</div>
                            <div class="content-desc">地形、気候、産業、統計データなど、地図やグラフ対策も充実。</div>
                        </div>
                    </a>

                    <!-- 政治・経済 -->
                    <a href="politics-economics/" class="content-card">
                        <div class="icon-box"><i data-lucide="landmark"></i></div>
                        <div class="content-info">
                            <div class="content-name">政治・経済</div>
                            <div class="content-desc">日本国憲法、政治機構、市場経済の仕組みと国際経済。</div>
                        </div>
                    </a>

                </div>
            </section>
        </div>

        <footer>
            <p>COPYRIGHT 2026 © ALL RIGHTS RESERVED</p>
        </footer>
    </main>

    <script>
        lucide.createIcons();

        // サイドバー制御
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        const toggleSidebar = () => {
            const isActive = sidebar.classList.contains('active');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            menuToggle.innerHTML = isActive ? '<i data-lucide="menu"></i>' : '<i data-lucide="x"></i>';
            lucide.createIcons();
            document.body.style.overflow = isActive ? '' : 'hidden';
        };

        if(menuToggle) menuToggle.addEventListener('click', toggleSidebar);
        if(overlay) overlay.addEventListener('click', toggleSidebar);
    </script>
</body>
</html>
